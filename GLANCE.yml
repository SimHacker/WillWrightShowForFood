  process: "yaml girder + generated *.md markup — pnpm run facades — process/markup-facades.yml"
  rooms: [repo-shows, characters, rigs, schemas, kernel, apps, packages]

dev_quickstart: "nvm use && corepack enable && pnpm install && pnpm run verify"

