# WillWrightShowForFood — GLANCE
# Public MOOLLM plugin world + Will Wright Repo Show. Browse without logging in.

what: "SimHacker/WillWrightShowForFood — polyglot MOOLLM microworld + pnpm monorepo (Repo Show for Will)"

status:
  repo: public
  monorepo: scaffolded
  will_invitation: draft_ready_not_sent
  consent: not_yet_asked

read_order:
  - README.md
  - process/VISION.md
  - SETUP.md
  - process/vision-and-ambition.yml
  - process/showmaker-network.yml
  - process/repo-show-format.yml
  - repo-shows/will-wright/README.md
  - CARD.yml

dev_quickstart: "nvm use && corepack enable && pnpm install && pnpm run verify"

cream_on_top:
  - repo-shows/will-wright/sources/1996-04-26-winograd-interfacing-to-microworlds/
  - repo-shows/will-wright/README.md
  - characters/don-hopkins/README.md

moollm:
  compose_with: https://github.com/SimHacker/moollm
  plugin: kernel/moollm-plugin.yml

chat: "PR or issue — github.com/SimHacker/WillWrightShowForFood/issues"
