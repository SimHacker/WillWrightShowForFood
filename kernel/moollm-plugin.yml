# MOOLLM composition — how this repo plugs in
#
# Open BOTH repos in Cursor (or future orchestrators):
#   SimHacker/moollm
#   SimHacker/WillWrightShowForFood
# → bootstrap reads skills from moollm; this world adds characters, shows, rooms.

moollm_plugin:
  name: WillWrightShowForFood
  version: 0.1.0
  requires:
    moollm: ">= main"
  optional:
    micropolis_core: https://github.com/SimHacker/MicropolisCore

activation:
  cursor:
    pattern: "Multi-root workspace or sibling clone under ~/GroundUp/git/"
    hot_files:
      - GLANCE.yml
      - .moollm/hot.yml          # local only, gitignored — copy from moollm bootstrap template
      - characters/INDEX.yml
      - repo-shows/will-wright/SHOW.yml
  bootstrap: "Read moollm skills/bootstrap/GLANCE.yml first; then this repo's GLANCE.yml"

paths:
  characters: characters/
  shows: repo-shows/
  skills: skills/
  examples: examples/
  apps: apps/
  packages: packages/
  scripts: scripts/

uri_scheme: "moollm://github/SimHacker/WillWrightShowForFood/"

future:
  cursor_sponsor: "Maybe someday Cursor sponsors us"
  other_orchestrators: "Port plugin manifest; make our own orchestrator"
  adventure_show: "Teach Will MOOLLM adventure rooms/skills — record live → examples/adventure-will/"
