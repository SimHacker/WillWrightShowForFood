# Terry Winograd × Don Hopkins — correspondence summary (public-safe)
# A tight, public-safe digest of a real exchange. NOT the full private thread.
# Standards: ../../schemas/portrayal-standards.yml

meta:
  with: terry-winograd
  curated_by: don-hopkins
  consent: not_yet_asked
  span: "2019–2023"
  provenance_private: SimHacker/DonHopkins/characters/don-hopkins/correspondence/terry-winograd.yml

gist: |
  Don corresponded with Terry Winograd about the Stanford **CS547 'People, Computers, and Design'**
  seminar video archive — the open, recorded, one-guest-a-week public seminar that is the direct
  forebear of the Repo Show. Two recordings are the anchors, and both are WILL-adjacent gold.

relationship: |
  Don and Terry were colleagues at Interval Research; Terry invited Don to the CS547 seminar where
  Will Wright gave the 1996 talk — the throughline that sent Don to Maxis. Terry's stewardship of the
  CS547 archive (and his help recovering the talk during COVID) makes him a quiet forebear of the
  whole quest. Deep gratitude.

verified_talks:
  will_wright_1996:
    date: "1996-04-26"
    title: "Interfacing to Microworlds"
    what: "Will's Dollhouse / The Sims preview — the talk Don credits with drawing him to Maxis"
    don_role: "Preserved the Stanford video, uploaded to YouTube, made a clean transcript, wrote the Medium retrospective"
    in_repo: ../../characters/will-wright/sources/1996-04-26-winograd-interfacing-to-microworlds/
  james_gosling_1995:
    date: "1995-12-01"
    title: "Bringing Behavior to the Internet"
    what: "Gosling's Java talk to the same class; Don attended and appears on camera (~1:00:30) asking Java-security questions"
    don_role: "Found it in Stanford's archive, uploaded to YouTube to generate a transcript"
    youtube: "https://www.youtube.com/watch?v=dgrNeyuwA8k"

full_archive:
  what: "The complete CS547 videorecording catalog (Stanford SC1217, 1990-2012) — 339 talks, the two anchors above among them."
  home: media/                    # catalog lives with Terry's character — pleasant surprise
  catalog_girder: media/cs547-archive.yml
  catalog_markup: media/cs547-ARCHIVE.md
  catalog_tsv: media/cs547-catalog.tsv
  show_seed: ../../repo-shows/terry-winograd/
  finding_aid: "https://oac.cdlib.org/findaid/ark:/13030/c82b926h"
  wwsff_guests_in_catalog: 11   # will-wright, james-gosling, alan-kay, ted-selker, scott-kim, ken-kahn, ben-shneiderman, margaret-minsky, brad-myers, ken-perlin, terry-winograd
  online_scans_known: 15        # SearchWorks digitizations cross-referenced from Don's HN inventory

why_it_matters: |
  CS547 IS the template: one luminary, open public access, recorded for posterity, real Q&A.
  The Repo Show is its descendant — and Terry is the curator of the trove that holds Will's
  own 1996 words, and 338 more talks (full catalog: media/cs547-archive.yml).

connects_in_repo:
  - { path: media/, why: "The full CS547 catalog — cs547-ARCHIVE.md + cs547-archive.yml + cs547-catalog.tsv" }
  - { path: ../../repo-shows/terry-winograd/, why: "Forebear show seed" }
  - { path: CHARACTER.yml, why: "Forebear bio + invitation status" }
  - { path: ../will-wright/, why: "The 1996 talk this archive preserved — flagship show" }
  - { path: ../james-gosling/, why: "1995 CS547 Java talk — NeWS/Java lineage" }
  - { path: ../../process/trails/archive-and-provenance.md, why: "Primary-source preservation trail" }

show_hooks:
  - "Screen the 1996 'Interfacing to Microworlds' talk and decode it live with Will"
  - "CS547 as the forebear of the Repo Show — open seminar, recorded, real Q&A"
