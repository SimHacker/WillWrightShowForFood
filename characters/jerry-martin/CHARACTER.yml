bio:
  summary: "**Jerry Martin** is a composer, producer, and sound designer best known for the music of **The Sims**, **SimCity 3000**, and **SimCity 4** — scores that gave those worlds their warm, lived-in feel. At the **Maxis** division of EA he was **Studio Audio Director and Lead Composer**. He founded **Musicontrol** (original music + sound for 200+ national TV/radio commercials — AT&T, Toyota, NBA, Honda), holds a BA from **CSU Hayward** and an MFA from the **Center for Contemporary Music at Mills College**, and now releases his own work as **Jerry Martin Music** and via his **BoomBamBoom** outlet (recent albums *The House Always Wins* and *Be Tonal*). Don's Maxis colleague on The Sims."

connections:
  the_sims: "Composed music for The Sims; the score that made digital houses feel like homes."
  simcity: "Composed the SimCity 3000 + SimCity 4 soundtracks (his own Maxis credits)."
  don: "Don's Maxis colleague — they worked together on **The Sims** (Jerry on music, Don on gameplay). Part of the original Sims team reunion (see ../../process/old-band-back-together.yml)."
  david_levitt: "Paired with David Levitt for a music + theory Repo Show."
  micropolis_music_use: "Recently Jerry gave Don permission to use a piece of his music — 'Chill Resolve' (from *Be Tonal*) — for **Micropolis**. Don performed live cellular automata with SimCity tile sets to it, and it fits PERFECTLY (https://www.youtube.com/watch?v=319i7slXcbI). A recent music-use permission, not a Maxis collaboration."
  yoot_tower_music_use: "Jerry also granted Don rights to use 'Tinker Toy Joy' as an exclusive Yoot Tower Kickstarter reward (and shared SimCity 4 cuts like 'Re-Development') — likewise music-use permissions, not collaborations."

boost:
  why: |
    Don is genuinely enthusiastic about Jerry — and Jerry **actively promotes his own EXCELLENT
    music**, so real exposure plus sincere praise and appreciation is exactly what he wants. Site:
    **jerrymartinmusic.com**; his **BoomBamBoom** outlet (boombamboom.com) even gives away the
    *Sims 1 Build Mode Music Pak* (320kbps MP3s + sheet music); recent albums *The House Always
    Wins* and *Be Tonal*. His Sims / SimCity scores are the warm, lived-in soul of those worlds.
  intent: "Genuine, generous amplification — welcomed; he markets his own work. His call on what's shared."

