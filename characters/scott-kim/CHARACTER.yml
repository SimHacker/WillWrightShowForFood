bio:
  summary: "**Scott Kim** (b. 1955) — puzzle designer, visual artist, and computer scientist. A co-discoverer of **ambigrams** (with John Langdon; the term was coined by his friend Douglas Hofstadter), famous for his 1981 book ***Inversions*** — words lettered to read the same upside down or mirrored. His Stanford PhD (Computers and Graphic Design, 1987, advised by **Donald Knuth**) was ***Viewpoint: Toward a Computer for Visual Thinkers*** — a pixel-based text/graphics editor built on a UI principle he called **'visibility'** (the screen's visual state IS the complete record). He designed the **Silicon Graphics logo**, was puzzlemaster for the game **Heaven & Earth** (1992, ~576 'Illusions' puzzles), and is a longtime puzzle columnist (*Games*, *Discover*, *Scientific American*) in the **Martin Gardner** recreational-math community."

