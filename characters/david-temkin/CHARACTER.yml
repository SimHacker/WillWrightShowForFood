bio:
  summary: "**David Temkin** — founder (and first CEO, then CTO/VP Engineering) of **Laszlo Systems** (2000–2009), creator of **OpenLaszlo**: the **LZX** XML+JavaScript language and Presentation Server for rich internet apps that compiled to Flash or DHTML/Ajax, open-sourced in 2004. Earlier Senior Director of Engineering at Excite@Home; later co-founded the mobile-communications company **Cola**. Brown undergrad. Don worked with him (and Henry Minsky and Oliver Steele) on OpenLaszlo."

openlaszlo_revival:
  fact: "David recently used AI to rewrite the OpenLaszlo Java code so it compiles and runs again — a striking retrocomputing feat that could bring LZX apps back to life."
  provenance: "Per Don, relayed from an email David sent Henry Minsky (June 2026)."
  why_it_matters: "Reviving the OpenLaszlo toolchain would let Don bring his old LZX apps + demos back — and anchors a whole OpenLaszlo Repo Show."

