bio:
  born: 1948
  summary: |
    **Brian Eno** is a musician, composer, record producer, and visual artist who pioneered
    **ambient music** (*Ambient 1: Music for Airports*, 1978) and has long championed
    **generative music and art** — systems that grow, never repeating, from simple rules (the
    "Bloom" app with Peter Chilvers; the *77 Million Paintings* generative visual work). As a
    producer he shaped landmark records by Roxy Music, David Bowie (the Berlin trilogy),
    Talking Heads, Devo, and U2. With Peter Schmidt he created the *Oblique Strategies* deck.
    He coined the phrase **"The Long Now"** and is a founding board member of the **Long Now
    Foundation**, where in 2006 he and **Will Wright** gave the talk *Playing with Time*.
  known_for:
    - Ambient music (Music for Airports)
    - Generative music & art (Bloom, 77 Million Paintings)
    - Producing Bowie, Talking Heads, U2, Roxy Music, Devo
    - Oblique Strategies (with Peter Schmidt)
    - The Long Now Foundation ("The Long Now")
    - Taking Tiger Mountain (By Strategy) (1974)

connections:
  long_now_2006: "Gave the Long Now talk *Playing with Time* with **Will Wright** (2006) — the through-line between generative music and generative simulation. Real credit to the **Long Now Foundation**: this talk is the seed event that put the whole circle (Don, Brian, Will, Scott Draves, Doug Hilsinger) in one room — it facilitated all of it."
  the_2006_evening: "In June 2006, after that talk (and a dinner with Will + Brian), Don introduced Brian to **Scott Draves**; the three met at Scott's San Francisco apartment and bounced ideas around. Brian saw Electric Sheep and the hour-per-frame Dreams in High Fidelity. Don hasn't seen Brian since that 2006 visit — the reunion is the dream, carried by the still-active Don ↔ Scott friendship."
  generative_kinship: "The natural fourth voice in a generative-systems conversation: Eno (music/art), Draves (evolutionary visual art), Wright (simulation/possibility space), Hopkins (interactive systems)."

