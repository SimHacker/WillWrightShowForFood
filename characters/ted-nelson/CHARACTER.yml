bio:
  summary: "**Ted Nelson** (b. 1937) — coined **hypertext** and **hypermedia**, founded **Project Xanadu**, and wrote **Computer Lib / Dream Machines** (1974). Champion of **transclusion**, visible parallel connections (Xanalinks vs jump-only weblinks), and **intertwingularity** — 'everything is deeply intertwingled.' A direct inspiration for Don's HyperTIES work at Maryland and a north star for the Repo Show."

