eulogy_note: |
  Ted calls his 7-minute eulogy for Doug Engelbart 'my best writing ever' — a love letter, an
  indictment of the industry that cast Doug aside, and a lament for the world. ('I feel like I've
  lost my best planet.') On his home page he asks viewers to ignore the audience's mystifying
  laughter, and notes his emotion was real: 'at the end, I could hardly speak.'

