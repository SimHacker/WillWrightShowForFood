  friendship: "A friend of Don's. Peter is writing a book about AI and has offered to include a chapter about Don's work."
  leela_orbit: "Open to a show with Don's Leela AI colleagues — Henry Minsky and others — on Society-of-Mind ideas in modern AI."
  twenty_one_days: "His essay 'Teach Yourself Programming in Ten Years' (deliberate practice over hype) is a touchstone Don loves — and a natural frame for a constructionist conversation about LLMs and skills."
  moollm_skills: "Curious about MOOLLM and skills as a way to author and teach AI behavior — the topic he can take in whatever direction he wants."

# Paraphrased from his recent public talks/interviews (2025) on how LLMs reshape programming.
# Themes only — no invented quotations; confirm exact wording with Peter before airing.
recent_thinking:
  ten_years_still_holds: "His view (per recent talks): generative AI hasn't killed the 10-year / deliberate-practice rule — it raised the ceiling. The hours shift from memorizing syntax/APIs to system design, architecture, and judgment."
  how_to_write_to_what_to_build: "Programming moves from 'how to write it' (syntax, loops, memory — now largely handled by AI) to 'what to build' — defining goals, constraints, and intent."
  vibe_coding_caution: "He's flagged the risk of 'vibe coding' / illusion of competence: an LLM is like a fast but mediocre grad student; if you don't understand the mechanism, you can't debug the subtle architectural flaw it buries."
  optimizing_for_intent: "His arc of CS history: 1950s optimized for hardware, 2010s for programmer time (Python), 2020s+ for intent — humans supply high-level logic, machines supply formal correctness and tests."

