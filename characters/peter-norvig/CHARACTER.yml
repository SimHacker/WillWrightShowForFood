bio:
  summary: "**Peter Norvig** — Director of Research at Google and one of the most widely read teachers in AI. With Stuart Russell he wrote *Artificial Intelligence: A Modern Approach* (AIMA), the standard AI textbook used by thousands of universities; he also wrote *Paradigms of Artificial Intelligence Programming* (PAIP, 1992), a deep tour of AI techniques in Common Lisp. Earlier he led the Computational Sciences Division at NASA Ames. In 2011 he and Sebastian Thrun taught a free online AI course to ~160,000 students — an early spark of the modern MOOC wave. He is a Fellow of the AAAI and the ACM, and an essayist whose pieces — *Teach Yourself Programming in Ten Years*, *How to Write a Spelling Corrector*, the *Gettysburg PowerPoint* parody — are programming-culture touchstones."

