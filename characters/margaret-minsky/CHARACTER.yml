  in_laws:
    - "Oliver Steele — Marvin's son-in-law (Laszlo Systems chief architect)"
    - "Milan Singh Minsky — Marvin's daughter-in-law (Henry's wife; VP Product, Leela AI)"
  note: "Daughter of Marvin Minsky — corrected from an earlier 'daughter-in-law' error (verified: MIT News 2016 obituary; NYT 'First Wired Family,' 1997). Marvin + Gloria Rudisch's three kids: Margaret, and twins Henry & Juliana."

