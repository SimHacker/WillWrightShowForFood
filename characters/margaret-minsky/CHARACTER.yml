bio:
  summary: "**Margaret Minsky** — haptics / force-feedback researcher (MIT Media Lab PhD; the **Sandpaper** texture-synthesis force-feedback system); Atari Cambridge Research Lab. Daughter of Marvin Minsky + Gloria Rudisch, she grew up in the MIT-AI-Lab 'first wired family' (her own net address at 14, in 1971). Gave the 1993 CS547 talk *Putting 'Feel' into 'Look and Feel'*. Warm \"Memory Lane\" correspondence with Don (2019); Logo history thread (2020); flagged Ken Kahn's Snap! AI blocks. Artifact pending: **White Board Graphs** memorabilia scan."

