bio:
  summary: "**Dan Ingalls** (b. 1944) — principal architect and implementer of five generations of Smalltalk; designed the byte-coded virtual machine that made Smalltalk practical in 1976, **invented BitBlt and pop-up menus**, co-created **Squeak** (a Smalltalk written in itself), built **Fabrik** (visual dataflow programming) and the **Lively Kernel** (live coding in the browser), and hosts the **Smalltalk Zoo** at the Computer History Museum. ACM Grace Murray Hopper and Software System awards."

