# Dan Ingalls × Don Hopkins — correspondence summary (public-safe)
# A tight, public-safe digest of a real exchange. NOT the full private thread.
# Standards: ../../schemas/portrayal-standards.yml

meta:
  with: dan-ingalls
  curated_by: don-hopkins
  consent: not_yet_asked
  span: "2008, 2018, 2021, 2023, 2026"
  provenance_private: SimHacker/DonHopkins/characters/don-hopkins/correspondence/daniel-ingalls.yml

gist: |
  Alan Kay introduced Don to Dan via the Fabrik paper (2018) — pop-up menus and gesture menus
  as cousins of pie menus. The thread deepened through the Pie Menus retrospective, Fabrik's
  modular-time dataflow, and (2021) Dan's reflection on the missed leap from Squeak to a
  web-borne live system — the lineage that became Lively, SqueakJS, and today's browser
  livecoding. Don shared UnityJS bridge notes (path expressions, query templates) with Dan and
  Vanessa Freudenberg, and compared **High Fidelity**'s distributed JavaScript plugin model (JSON
  message passing — Don shipped voting box and text chat there) to Croquet and Lively. Dan hosts the Smalltalk Zoo at CHM and continues the live-object thread
  at Ink & Switch on **Livelymerge** (with Alex Warth) — Smalltalk-like liveness on Automerge.

threads:
  fabrik_and_pie_menus:
    what: "Fabrik visual dataflow (Ingalls et al.) and pie menus — kindred direct-manipulation ideas; pop-up menus (Dan) and pie menus (Don) as cousins"
    via: "Introduced by Alan Kay, 2018"
  livelymerge:
    what: "Ink & Switch — Livelymerge with Alex Warth; Automerge live objects + Smalltalk-like liveness"
    flagship_topic: |
      Data representation, organization, workflows, collaboration in the LLM/GitHub/stream age —
      explored WITH Dan (not generic). YAML Jazz: comments as semantically meaningful overlay of
      intent and annotations (accessible/generatable by humans and LLMs). GitHub-as-MMORPG for durable
      async vs Automerge in-session. Can a Lively page become a yaml-jazz repo commit?
    trail: process/trails/yaml-jazz-collaboration-stack.md
    note: "Don applied to Ink & Switch Muse (2020); separate thread; Livelymerge is current Dan project"
  live_web_bridges:
    what: "UnityJS JSON bridge (path expressions, query templates) vs High Fidelity distributed JS plugins (JSON message passing — voting box, text chat) vs Croquet; Lively Kernel / SqueakJS as the live-in-browser endpoint"

