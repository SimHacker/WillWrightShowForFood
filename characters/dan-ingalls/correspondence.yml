# Dan Ingalls × Don Hopkins — correspondence summary (public-safe)
# A tight, public-safe digest of a real exchange. NOT the full private thread.
# Standards: ../../schemas/portrayal-standards.yml

meta:
  with: dan-ingalls
  curated_by: don-hopkins
  consent: not_yet_asked
  span: "2008, 2018, 2021, 2023, 2026"
  provenance_private: SimHacker/DonHopkins/characters/don-hopkins/correspondence/daniel-ingalls.yml

gist: |
  Alan Kay introduced Don to Dan via the Fabrik paper (2018) — pop-up menus and gesture menus
  as cousins of pie menus. The thread deepened through the Pie Menus retrospective, Fabrik's
  modular-time dataflow, and (2021) Dan's reflection on the missed leap from Squeak to a
  web-borne live system — the lineage that became Lively, SqueakJS, and today's browser
  livecoding. Don shared UnityJS bridge notes (path expressions, query templates) with Dan and
  Vanessa Freudenberg. Dan hosts the Smalltalk Zoo at CHM and continues the live-object thread
  at Ink & Switch on **Livelymerge** (with Alex Warth) — Smalltalk-like liveness on Automerge.

