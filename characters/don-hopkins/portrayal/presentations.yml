    not_dons_work: true
    title: "PIXIE: A New Approach to Graphical Man-Machine Communication"
    venue: "1969 CAD Conference, Southampton"
    citation: "IEEE Conference Publication 51, pp. 463–471"
    authors: [Neil E. Wiseman, Heinz U. Lemke, John O. Hiles]
    significance: "Deep prehistory of radial/pie menus on PDP-7/Titan — Wiseman, Lemke, and Hiles; Don does not claim authorship or the original presentation"
