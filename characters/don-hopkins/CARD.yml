# Connections index — James Burke thread (human mirror: README.md)
# Uniform ~24-word blurbs; each entry opens the next. Read clusters in order.
connections_index:
  narrator: |
    Forth on a 6502 opens ARPANET and Zork; PIXIE (1969) predates the pie menus Don cooked up
    PostScript and NeWS send code to glass; HyperLook SimCity (HyperCard-inspired) integrates
    scalable PostScript visualizations, UI editor, and graphics editors in one microworld; OLPC GPL-forks Micropolis; imaging walks to WebGPU; robots perform feeling at SFC;
    constraint solvers keep declarative UI honest; Kaleida ScriptX multimedia Lisp machine;
    MOOLLM makes the filesystem the game board.
  human_mirror: README.md
  machine_mirror: browse-the-bouquet.yml
  blurb_words: 24

  clusters:
    - id: identity
      title: Identity — enter the room
      era: meta
      bridge: Before the lineage runs, meet the host and the rules for what may be published.
      opens: gestural_verbs
      entries:
        - path: about-host.md
          blurb: Resume reimagined as a repo room — portfolio not pitch; one-screen map of the whole career arc.
          opens: media.md
        - path: media.md
          blurb: Photos and screenshots — Queen's Day LISP shirt, Sims era, Micropolis demos; face behind the frob panel.
          opens: career/lineage.yml
        - path: GLANCE.md
          blurb: Sniff card — five-line orientation; metadata SSOT paired with CARD.yml and CHARACTER.yml registry.
          opens: pie-menus-chi-88-and-beyond.md
        - path: CARD.md
          blurb: Trading-card view of abilities — documented work as collectible powers, not bragging; self-sovereign deck.
          opens: CARD.yml
        - path: CARD.yml
          blurb: Machine schema for this room — methods, abilities, and this connections_index; yaml girder under markdown.
          opens: browse-the-bouquet.yml
        - path: CHARACTER.yml
          blurb: Host registry entry — consent, signifier, cross-links to Repo Show and sibling characters in the deck.
          opens: pie-menus-chi-88-and-beyond.md
        - path: browse-the-bouquet.yml
          blurb: Filename advertisement index — semantic clusters for machines; narrative order lives in README and here.
          opens: gestural_verbs
        - path: sync-sources.yml
          blurb: Upstream sync manifest — dedupe rules, public-safe exports from adventure-4 and DonHopkins private archive.
          opens: career/INDEX.yml

    - id: gestural_verbs
      title: Gestural verbs — CHI'88 verb-picker
      era: "1988"
      bridge: PIXIE radial menus (1969, Heinz U. Lemke) predate CHI'88 — Don studied, implemented, evaluated, and shipped; pick a direction, not a distance.
      opens: send_code
      entries:
        - path: pie-menus-chi-88-and-beyond.md
          blurb: PIXIE 1969 prehistory — Don does not claim invention; CHI'88 empirical study and implementations steering SimCity, Sims, MOOLLM.
          opens: axis-of-eval-send-code-not-commands.md
        - path: portrayal/presentations.yml
          blurb: Verified papers and talks — CHI'88 links, BayCHI, DreamScape WWDC; receipts for every public claim above.
          opens: axis-of-eval-send-code-not-commands.md

    - id: send_code
      title: Send code, not commands — NeWS motherboard
      era: 1988–1995
      bridge: If menus are verbs, the window server must speak a language — HyperCard's stack model meets PostScript on NeWS.
      opens: interval_detour
      entries:
        - path: axis-of-eval-send-code-not-commands.md
          blurb: NeWS manifesto — X-Windows Disaster critique, Owen Densmore OOPS, the bet the web later cashed in.
          opens: hyperlook-news-postscript-simcity.md
        - path: hyperlook-news-postscript-simcity.md
          blurb: HyperCard-inspired HyperLook SimCity — integrated PostScript viz, UI editor, graphics editors; scalable microworld at DUX.
          opens: porter-duff-postscript-to-webgpu.md
        - path: porter-duff-postscript-to-webgpu.md
          blurb: Porter/Duff imaging braid — stencil-paint in the server through Cairo, Canvas 2D, nested WebGPU compositing.
          opens: kaleida-scriptx-dreamscape-multimedia-lisp-machine.md
        - path: kaleida-scriptx-dreamscape-multimedia-lisp-machine.md
          blurb: Kaleida ScriptX — object-oriented multimedia Lisp machine; DreamScape mirror-world; live authoring, absurdly fun.
          opens: interval-research-pluggers-and-mediaflow.md

    - id: interval_detour
      title: Interval detour — patterns before names
      era: 1992–1999
      bridge: Paul Allen's lab asks what people do with media — Pluggers, flows, Camelot echo NeWS and prefigure MOOLLM rooms.
      opens: microworld_franchise
      entries:
        - path: interval-research-pluggers-and-mediaflow.md
          blurb: Interval Research — Pluggers survey, MediaFlow, Camelot; hypermedia patterns echoing NeWS and MOOLLM rooms.
          opens: history/interval-research.yml
        - path: history/interval-research.yml
          blurb: Distilled era yaml — same Interval thread in machine-readable backbone form for cross-repo grep and sync.
          opens: history/README.md
        - path: history/README.md
          blurb: History subdir index — public-safe era distills; one room per research epoch, not raw correspondence dumps.
          opens: open-sourcing-simcity-for-olpc.md

    - id: microworld_franchise
      title: Microworld franchise — SimCity to Sims
      era: 1991–2007
      bridge: The city teaches cooperation; the dollhouse teaches motives; Transmogrifier hands authorship back to players.
      opens: robots_that_feel
      entries:
        - path: career/simcity-lineage.yml
          blurb: SimCityNet to OLPC to WASM timeline — yaml spine every SimCity topic file in this room telescopes from.
          opens: open-sourcing-simcity-for-olpc.md
        - path: open-sourcing-simcity-for-olpc.md
          blurb: December 2006 pitch to Rod Humble — mail arc clearing SimCity for OLPC and GPL Micropolis release.
          opens: career/contracts/README.md
        - path: career/contracts/README.md
          blurb: DUX Maxis EA OLPC paper trail — contracts making open source legally possible, not merely wished for.
          opens: will-wright-primary-sources-evidence-room.md
        - path: will-wright-primary-sources-evidence-room.md
          blurb: Curated map to Will Wright evidence room — Winograd centerpiece, Motive.c, Transmogrifier hub, OLPC mail arc.
          opens: the-sims-transmogrifier-mod-tools.md
        - path: the-sims-transmogrifier-mod-tools.md
          blurb: Maxis mod stack — Transmogrifier, RugOMatic, SimShow, VitaBoy; objects carrying behavior for community authors.
          opens: olpc-micropolis-python-pygtk.md
        - path: olpc-micropolis-python-pygtk.md
          blurb: Python Sugar adaptor — PyGTK Cairo Pango shell wrapping Tcl/Tk SimCity for the XO laptop classroom.
          opens: writing/INDEX.yml
        - path: writing/README.md
          blurb: Writing subdir readme — essays, Medium recreations, primary-source pointers; human face of writing/INDEX.yml.
          opens: writing/INDEX.yml
        - path: writing/INDEX.yml
          blurb: Essay and primary-source index — Will sources clusters, donhopkins.com links, evidence-room hub cross-refs.
          opens: career/stupid-fun-club.yml

    - id: robots_that_feel
      title: Robots that feel — Stupid Fun Club
      era: 2009–2014
      bridge: Will's lab asks how humans treat machines — waiter brains, broken robots, one-minute films as procedural argument.
      opens: constraint_platforms
      entries:
        - path: career/stupid-fun-club.yml
          blurb: SFC yaml backbone — Slats, Dents, MediaGraph, networked AR; employment thread behind the robot films above.
          opens: stupid-fun-club-empathy-and-servitude.md
        - path: stupid-fun-club-empathy-and-servitude.md
          blurb: Servitude and Empathy one-minute movies — procedural argument about reviews, breakdowns, and performed feeling.
          opens: talks/empathy-and-servitude.yml
        - path: talks/empathy-and-servitude.yml
          blurb: Talk package distill — public-safe Empathy Servitude show spine; links Will sources and Slats sidekick character.
          opens: ../slats/README.md

    - id: constraint_platforms
      title: Constraint solvers and living platforms
      era: 1992–2020s
      bridge: Every GUI generation reinvents the same idea — declare relationships in data; let the system keep them true.
      opens: micropolis_today
      entries:
        - path: garnet-to-svelte-constraint-ui-lineage.md
          blurb: Garnet to OpenLaszlo to Svelte braid — Brad Myers KR constraints to derived state; why MOOLLM YAML feels obvious.
          opens: nutritionquest-turbogears-genshi-alive-pd.md
        - path: nutritionquest-turbogears-genshi-alive-pd.md
          blurb: TurboGears decade at NutritionQuest — Zope romance distilled to SQLObject Genshi; still running in production.
          opens: yoot-tower-open-source-and-alan-kay-interview.md
        - path: yoot-tower-open-source-and-alan-kay-interview.md
          blurb: Yoot Tower OSS thread plus 1993 Alan Kay interview tree — tower preservation meets constructionist microworld history.
          opens: micropoliscore-design-docs-packages-code-content.md

    - id: micropolis_today
      title: Micropolis today — OSS, docs, WebGPU
      era: 2006–now
      bridge: The GPL release was the fork — everything after is browser-native, federation-minded, and design-doc driven.
      opens: import_self
      entries:
        - path: micropoliscore-design-docs-packages-code-content.md
          blurb: MicropolisCore map — design docs, packages, WASM engine, PieCraft, content pipelines; living implementation repository.
          opens: career/project-threads.yml
        - path: career/project-threads.yml
          blurb: Branch merge map — pie menus through Sims Micropolis Repo Show; how threads knot in one yaml diagram.
          opens: import-self-from-self.md

    - id: import_self
