# Interval Research — public distill
# Source: DonHopkins/characters/don-hopkins/history/interval-research.yml
# Paul Allen's lab; Don's oompa-loompa year before Maxis.

interval_research:
  name: Interval Research Corporation
  period: "1992–2000 (Don: mid-1990s staff)"
  founder: "Paul Allen"
  ceo: "David Liddle"
  don_reflection: |
    "Interval was an amazing place — like working as an oompa loompa in Willy Wonka's
    chocolate factory… Camelot." — Don Hopkins
  don_note: |
    MediaFlow and Bounce/Body Electric were separate but related — worked on both at once.
    Also Director plug-ins and Tom Ngo's ECG (Mouther). Camelot: visiting speakers; Don guest-
    lectured on pie menus + SimCity ~year before joining. MCL MediaFlow; Bounce live TV + COM wires.
  don_circle: |
    Don did not overlap at Interval with every name in the Camelot roster — but he was in that
    circle before and after: Kaleida/ScriptX, Terry's CS547 world, MIT/Lisp/visual-programming
    orbit, Maxis/The Sims, NeWS gang, Stanford HCI preservation, etc. Interval was one year
    staff (~mid-1990s); the relationships outlasted the building.
  sources:
    grokipedia: https://grokipedia.com/page/interval_research_corporation
    wikipedia: https://en.wikipedia.org/wiki/Interval_Research_Corporation
    private_roster: DonHopkins/characters/don-hopkins/contacts/interval-alumni.yml

don_projects:
  pluggers_survey:
    title: "An Overview of Plug-In Technology circa March 1996"
    url: https://donhopkins.com/home/interval/pluggers
    note: "COM, OLE, CORBA, OpenDoc, Java — component chaos captured on paper"
  ifc_vs_bongo:
    url: https://donhopkins.com/home/interval/ifc-vs-bongo.html
    full_text: ../ifc-vs-bongo-comparison.md
    method: "Don read/analyzed/reflecting from experience — IFC (bad) vs Bongo (good), in that order"
    bongo_lineage: "HyperCard → GoodNeWS → HyperNeWS → HyperLook → Bongo (Java)"
    architect: "Arthur van Hoff — Turing Glasgow, Java compiler, AWT, Marimba Castanet/Bongo"
    don_arthur: "Turing Institute Glasgow; later Jaunt VR Palo Alto"
  mediaflow:
    url: https://donhopkins.com/home/interval/mediaflow-design.html
    full_text: ../mediaflow-design-comments.md
    implementation: "Mac Common Lisp + QuickTime (Don; separate project from Bounce extensions)"
    note: "Marc Davis — hypermedia / temporal stream dataflow; design essay + MCL implementation"
    topics:
      - streams_and_sessions
      - control_data_codesign
      - plug_in_clay_types
      - visual_programming_philosophy
  bounce_body_electric:
    lineage: "David Levitt — VPL Body Electric visual programming"
    bounce_notes: https://www.donhopkins.com/home/archive/visual-programming/bounce-notes.txt
    don_work:
      - "Custom compositor replacing Macromedia Director player — animation/overlays on live video"
      - "Synchronized real-time closed-caption feed"
      - "TV-commentary bots — Rush Limbaugh, Jesse Jackson, house fly (MST3K-style)"
      - "Live editing of running Bounce simulations"
      - "Plug-in COM object data types on wires — Macromedia IMOADict / IMOAArray"
      - "Cross-platform COM on Mac (Metrowerks C++; IE-on-Mac era)"
    note: "Extended Bounce on Mac — not a Mac Common Lisp port (that was MediaFlow)"
  director_plugins:
    note: "Macromedia Director Xtra / plug-in development — same multimedia orbit as Bounce compositor"
  ecg_tom_ngo:
    title: Embedded Constraint Graphics
    patent: https://patents.google.com/patent/US5933150
    wwsff: ../tom-ngo-embedded-constraint-graphics-at-interval.md
    breakfast_simplex: ../breakfast-simplex-barycentric-direct-manipulation.md
    mouther: https://www.flong.com/archive/projects/mouther/
    hn_2016: https://news.ycombinator.com/item?id=12572696
    colleagues: [Golan Levin, Malcolm Slaney, Tom Ngo]
  camelot:
    don_prior_visit: "Guest talk ~year before employment — pie menus + SimCity"
    atmosphere: "Interesting people always visiting; exhilarating live simulation editing"

