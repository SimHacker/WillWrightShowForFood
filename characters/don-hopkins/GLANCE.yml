# Interface: CARD.yml · self-sovereign host portrayal.

title: Don Hopkins
iconic: "🌸 Don"
description: |
  Self-sovereign host — pie menus, Sims lineage, Micropolis, Repo Show, MOOLLM microworld.
  User Interface Flower Child; archive keeper; contracts and career yaml under career/.

