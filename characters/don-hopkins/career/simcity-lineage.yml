# Don Hopkins — SimCity / Micropolis lineage (public backbone)

simcity_lineage:
  - name: First encounter
    era: "1989"
    don_role: "Played SimCity on Mac; posted to comp.theory.cellular-automata same day"
    note: "Started 35+ year arc — cities as visual programming"

  - name: SimCity on NeWS (Sun)
    era: "1991–1992"
    don_role: "NeWS/HyperLook port with pie menus, PostScript UI, showcase package"
    runs_on: [NeWS, HyperLook]
    note: "Parallel to official Sun X11 port; Carol Adams 'SimCity NeWS' opportunity"

  - name: SimCity on X11 / TCL/Tk
    era: "1992–1993"
    don_role: "X11 port; pie menus; GIS/ToolTalk integration path"
    runs_on: [X11, TCL/Tk, Sun workstations]

  - name: SimCityNet
    era: "1993–1990s"
    don_role: "Cooperative multiplayer SimCity — shared cities, turn/sync model"
    runs_on: [X11 networked Unix]
    note: "Multiplayer ideas documented in MicropolisCore/notes/MultiPlayerIdeas.txt lineage"
    features:
      - Shared city state across clients
      - Voting and community decisions (precursor to MOOLLM session patterns)
      - Newspaper/storytelling hooks planned in design notes

  - name: SimCity 2000 era
    era: "1990s"
    don_role: "Maxis ecosystem; bridge to Dollhouse → The Sims"
    runs_on: [Mac, PC, many platforms]

  - name: The Sims (Maxis)
    era: "1997–2000"
    don_role: "UI, VitaBoy animation, mod tools, SimAntics/Edith advocacy"
    runs_on: [Windows, Mac]

  - name: Columbia / EA educational proposal
    era: "~2002"
    don_role: "Pushed open, modifiable SimCity for education — dropped by EA at the time"
    note: "Alan Kay black-box critique answered later by open source"

  - name: Micropolis (OLPC)
    era: "2006–2008"
    don_role: "Worked with Will Wright, EA, OLPC to GPL SimCity as Micropolis"
    runs_on: [Linux, OLPC XO Sugar, source distributions]
    repos:
      - https://github.com/SimHacker/micropolis
      - https://code.google.com/p/micropolis/ (historical)
    highlights:
      - EA donated source; Jim Gettys / Sugar integration
      - Pie menus on XO; constructionist education alignment
      - CellEngine CA bridge; Python scripting layer

  - name: MicropolisCore + web
    era: "2020s–"
    don_role: "C++ rewrite, embind, WebAssembly, SvelteKit, federation peer games"
    runs_on: [Web browser, native builds]
    repos:
      - https://github.com/SimHacker/MicropolisCore
    web_stack:
      - WASM engine + TypeScript/SvelteKit shell
      - Live debugging and Repo Show integration
      - Multiplayer/federation experiments with moollm

related_sims_tools:
  - Transmogrifier
  - RugOMatic
  - SimShow
  - OpenLaszlo SimFreaks prototype (unreleased web app)

moollm_parallel: |
  Micropolis multiplayer → MOOLLM sessions.
  Open the hood → YAML Jazz skills.
  Branching what-if cities → branching chat/crystal logs.

see_also:
