# Stupid Fun Club — Will Wright's creative laboratory (public backbone)

stupid_fun_club:
  what: |
    Will Wright's post-EA lab — robotics, videogames, television, toys.
    Berkeley/Oakland warehouse along the Amtrak tracks (~2009–2014 active band).
    "If you want to study humans, put robots among them."
  mission: Combine stupid fun with serious HCI — robots as probes of human nature

  don_role:
    title: Research Programmer / robot brain programmer
    periods: ["2002–2003", "2009–2014"]
    built:
      robots:
        - Slats — waiter personality, validation-seeking speech
        - Dents — broken robot, empathy probe
      speech:
        - Phoneloper expressive speech editor (Python+Tkinter+Flite; XML "Phonelopes" — drag diphones, bend pitch, rotoscope a real voice, hold space to sing). A standalone editing toy, NOT the Slats voice. Demo https://www.youtube.com/watch?v=qy5cqV8ypIs — source releasable, coming to this monorepo soon. See ../../../process/crazy-idea-jam.yml#phoneloper
        - "Slats voice stack: IBM ViaVoice first, then Microsoft SAPI, with several voices including Cepstral"
        - "Synthesizer genealogy: Festival (big Scheme/Lisp-scripted synth, CSTR Edinburgh) → Flite (CMU small embedded C version) → Cepstral (commercial embedded-voice product in that lineage)"
        - XML dialog scripting
      storytelling:
        - "PROGENITOR: Amsterdam Coffeeshops app (2009) + BONGO BINGO (Foursquare check-in bingo on Don's all-coffeeshops spreadsheet — bike around, GPS check-in, review what you tried). Built solo at TomTom to learn iPhone + web servers; Will saw it and knew it was what he needed for CurrentTV."
        - "CreationTV iPhone prototype → StoryMaker — collaborative branching storytelling for CurrentTV's Bar Karma (first online community-developed network TV series). Demo https://www.youtube.com/watch?v=Nb_-J1lv-B8 · https://en.wikipedia.org/wiki/Bar_Karma"
        - "StoryMaker full stack: MediaWiki front + Python back; Flash client embedded in wiki; geolocated scenes + Google Maps/KML overlays; admin CMS; iPad app (MapKit); Facebook app (album import/export); voice-synth story reading; Unity3D 3D branching-story visualizer"
        - "Urban Safari GPS storytelling — the geolocated branch of StoryMaker"
        - "MediaGraph music navigation (Unity3D; pie menus + roads + cellular automata, at Will's request). Demo https://donhopkins.medium.com/mediagraph-demo-a7534add63e5"
        - "Several client/server iterations including MediaWiki plugins and a Unity app"

  how_don_rejoined_will:
    what: |
      At TomTom Don built — solo, for fun, to learn iPhone + web-server programming — an Amsterdam
      Coffeeshops iPhone app (2009; photos + info on every coffeeshop, driven by his spreadsheet
      database) and BONGO BINGO (a Foursquare-API web game: bingo card of random coffeeshops, bike
      around, GPS-verified check-in, review what you tried, feed it back to the spreadsheet). He
      had also built iLoci (Memory Palace pie-menu network) earlier at TomTom/Bluebird and given a
      Mobile Dev Camp talk. Don showed these at an Amsterdam meetup where Will Wright was present.
    the_moment: "Will looked at it, realized it was EXACTLY what he needed for CurrentTV and other projects, and said: 'Hey, by the way, I'm leaving EA — want to work together again, remotely?' Don said yes, left TomTom, and went back to Stupid Fun Club projects. Coffeeshops + BONGO BINGO were the progenitor of StoryMaker / Bar Karma / Urban Safari."
    coffeeshops_app_video: "https://www.youtube.com/watch?v=nG90XG3STz8"
    iloci_video: "https://www.youtube.com/watch?v=03ddG3jWF98"
    reincarnate: "Don would love to reincarnate + reinvent the Coffeeshops app + BONGO BINGO — decades out of date, but a fun idea; all part of the tapestry."
    lineage: "DreamScape (1995 Kaleida) → iLoci (2008) → Coffeeshops/BONGO BINGO (2009) → StoryMaker/Bar Karma/Urban Safari (2011) → MediaGraph"
    ties:
      - ../../../process/crazy-idea-jam.yml#amsterdam_coffeeshops_app
      - ../../../process/crazy-idea-jam.yml#bongo_bingo
      - ../../../process/crazy-idea-jam.yml#creationtv_storymaker
      - ../../../process/crazy-idea-jam.yml#iloci_memory_palace
      - work-history.yml      # TomTom 2007–2009 → SFC 2009–2014
    one_minute_movies:
      films:
        - title: Servitude
          star: Slats
          youtube: https://www.youtube.com/watch?v=NXsUetUzXlg
          premise: Robot waiter — performance anxiety personality
        - title: Empathy
          star: Dents
          youtube: https://www.youtube.com/watch?v=KXrbqXPnHvE
          premise: Broken robot begs passers-by for help
      fate: "Never aired (NBC/SAG) — humans were real; robot dialogue was Don's brain"
      hn_thread: https://news.ycombinator.com/item?id=9104857

  drag_race_continuity:
    slats_today: ../../slats/CHARACTER.yml
    judge: ../../process/micropolis-ai-drag-race.yml
    note: "Slats waiter personality → celebrity judge — same lineage, fictional sidekick"

  connects_to:
    - maxis_sims thread in project-threads.yml
    - moollm_repo_show — live coding and character federation today
    - repo-shows/will-wright/ — Repo Show invitation context
    - repo-shows/will-wright/slats-reincarnation.yml — RoboResurrection quest

  public_artifacts:
    - https://donhopkins.com
    - https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/characters/real-people/don-hopkins

