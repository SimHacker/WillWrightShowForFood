# Don Hopkins -- the lineage: a bundle of ideas he keeps adding to, culminating in MOOLLM
# Public career artifact -- the story under the resume.
# Not one idea -- a growing repertoire of great ideas Don has been collecting, building,
# and cross-pollinating since the 1980s, all circling the same joy:
#   navigable, editable, directly-manipulable worlds (or minds) -- mirror worlds, mind
#   maps, method of loci, adventure-map editors, pie menus, gestural UIs -- made legible
#   and fun. Each project adds ideas to the bundle; MOOLLM is where they all come together.
# Two braids: `bundle` (the navigable worlds) + `tools_lineage` (the editors + constraint/
#   reactive UI he built them WITH -- Emacs/TECO -> Garnet -> OpenLaszlo -> Svelte).
# Third braid: `imaging_model_lineage` (Porter/Duff stencil-paint: PostScript -> Cairo/Pango
#   -> SVG/Canvas -- Illustrator not PhotoShop).

thesis: |
  Not a series of unrelated jobs, and not just one idea either -- a growing bundle of great
  ideas Don keeps learning, adding to, and braiding together: navigable/editable models of
  a world (or a mind), mirror worlds, mind maps, method of loci, adventure-map editors, pie
  menus, gestural navigation, direct manipulation. He learned many of these studying other
  people's work, and invented some himself -- but the real through-skill is the one Gosling
  brought to designing NeWS: step back, survey the whole range of approaches, and compare
  them honestly -- naming the failures as clearly as the successes, and always offering a
  better path. His X-Windows Disaster chapter (UNIX-HATERS Handbook) is the critique; NeWS,
  which he championed, was the generous alternative -- "send code, not commands" -- a bet
  that quietly came true as AJAX / JavaScript / the web (the thesis of his "Axis of Eval"
  manifesto). Each project adds to the pile; they compound; MOOLLM is the culmination where
  the whole bundle finally runs at once.

roots:   # the gateway, and the worlds that seeded the ideas -- roughly in order
  gateway: |
    It started with 6502 assembly on the Apple ][ -- the essential unlocker. Don hand-wrote
    his own ProDOS Forth in it, then used Forth's RPN 6502 assembler to build the terminal
    emulator,     graphics, and device drivers. That Forth + terminal got him onto the ARPANET
    and into the MIT-AI Lab -- and through that door came Zork, Emacs, Lisp, Logo, and email.
    Assembly unlocked Forth; Forth unlocked the whole networked world of text adventures and
    hacker culture; every idea in the bundle grew from there.
  played:   # in the order Don met them
    - { world: "Apple ][ 6502 assembly -> his own Forth", where: "home -- hand-written 6502 assembly first, then a ProDOS Forth (FIG-FORTH 83)", got: "assembly was the essential unlocker: he wrote the Forth in 6502, then used its RPN 6502 assembler for the terminal emulator, graphics, and device drivers -- and his first text adventures" }
    - { world: Zork,               where: "MIT-DM ITS PDP-10 (reached via ARPANET)", got: "rooms + objects + verbs -- the adventure-map grammar" }
    - { world: "Emacs / Lisp / Logo", where: "MIT-AI Lab",                           got: "programmable everything; Logo (LLogo in MACLISP) + Papert constructionism set his taste -- and led straight to his Terrapin Logo Adventure" }
    - { world: MUD1,               where: "Essex PDP-10 (Bartle & Trubshaw)",        got: "the original multi-user navigable world" }
    - { world: TinyMUD,            where: "the early internet",                      got: "build-the-world-while-you-play" }
    - { world: LambdaMOO,          where: "Xerox PARC",                              got: "user-PROGRAMMABLE objects; MOO = MUD Object-Oriented" }
  name_echo: "MOOLLM = MOO (from LambdaMOO) + LLM. The name carries the whole lineage."

bundle:   # each entry adds its own ideas to the pile; they cross-pollinate and compound
  - { project: "Logo Adventure",               era: "Terrapin Logo / C64",        thread: "adventure-map world editor using the Logo REPL as the text-adventure parser (the same trick MOOLLM now plays with the LLM chat REPL); PAID, shipped on the C64 Terrapin Logo Examples floppy; Papert constructionism, MIT-AI (LLogo) lineage", todo: "link the Medium article (or our cleaned-up recreation of it)" }
  - { project: "Pie menus",                    era: "UMD HCIL CHI'88 -> NeWS -> X11 -> The Sims -> OLPC -> web -> Unity", thread: "direct manipulation: fast, reliable gestural selection -- the verb-picker for a modeled world" }
  - { project: "HyperTIES / PSIBER Space Deck",era: "NeWS, late 1980s",           thread: "hypermedia as navigable space; live objects you can open, inspect, and edit" }
  - { project: "DreamScape",                   era: "Kaleida Labs (ScriptX)",     thread: "mirror-world / mind-map media environment -- a memory-palace precursor" }
  - { project: "SimCity / Micropolis",         era: "1989 -> GPL 2008 -> WASM/web",thread: "an editable simulated world; tile/parametric editing; multiplayer X11/Tcl/Tk shared-world city editing. Imaging: Porter/Duff stencil-paint (PostScript -> Cairo/Pango -> HTML/CSS/SVG/Canvas 2D -> WebGPU/WebGL holodeck, GPU preferred, nested compositing) -- Illustrator not PhotoShop. Weeks before Ben Shneiderman (UMD HCIL) visited Don and Brad Myers at CMU, Don implemented a Dynamic HomeFinder-style filter in multiplayer SimCity -- homage to Ben's HCIL demo (dynamic queries: sliders + map, instant feedback). https://www.cs.umd.edu/hcil/trs/92-01/92-01.html" }
  - { project: "The Sims",                     era: "Maxis/EA (core team)",       thread: "characters + objects-that-carry-their-own-behavior + architectural editing; author a world by placing and wiring objects" }
  - { project: "SFC MediaGraph",               era: "Stupid Fun Club (Will Wright)",thread: "zoomable, editable graph/map of media as navigable space" }
  - { project: "StoryMaker / Bar Karma / Urban Safari", era: "SFC / interactive TV", thread: "branching story maps; geocoded storytelling on a real-world map" }
  - { project: "iLoci",                        era: "iPhone",                     thread: "a method-of-loci memory palace, literally -- put ideas in places, walk back to them" }
  - { project: "Amsterdam Coffeeshops + LayAR + BONGO BINGO", era: "iPhone / AR", thread: "the real city as the map: content DB, AR overlay (a mirror world), check-in game layered on top" }
  - { project: "MOOLLM",                       era: "now: filesystem + YAML + LLMs + home automation", thread: "ALL of it at once -- rooms = directories, objects = YAML with live state, characters, inheritable skills, gestural editing, wired to the real world. It works; the way it works is fun" }

tools_lineage:   # the OTHER throughline -- the tools he built worlds WITH: extensible editors +
                 # constraint/reactive UI, across generations of GUI and web tech. "Everything old
                 # is new again" -- the same declarative-constraint idea keeps getting reinvented,
                 # and Don has ridden every generation of it. (Twin to the NeWS/Axis-of-Eval point.)
  arc:
    - { tech: "ITS Emacs (TECO macros)",                    era: "MIT-AI Lab",              idea: "the editor as a programmable environment -- extend it in its own macro language" }
    - { tech: "Gosling / UniPress Unix Emacs (MockLisp)",   era: "1980s",                   idea: "Gosling's Emacs; extension language was MockLisp -- a Lisp-ish macro language" }
    - { tech: "GNU Emacs (Emacs Lisp)",                     era: "1980s -> now",            idea: "a REAL Lisp as the extension language; a fully self-reprogrammable editor" }
    - { tech: "CForth embedded in CADroid (Sun internship, mentor Mitch Bradley)", era: "late 1980s", idea: "embedded CForth as a friendly macro/scripting language INTO a CAD circuit-capture-and-schematic editor -- programming-by-demonstration: capture user edits as replayable, editable Forth. Extensibility, applied by Don's own hand" }
    - { tech: "Garnet (KR constraints, CLX / X11, Common Lisp)", era: "CMU CSD ~1992 (Brad Myers)",   idea: "early reactive Lisp UI: prototype-based objects + KR constraints -- DECLARE relationships, system keeps them true. Don worked in Brad's lab (Opal graphics layer). Same declarative shape he later loved in OpenLaszlo and now in Svelte/MOOLLM" }
    - { tech: "TCL/Tk on X11 (multiplayer SimCity)",        era: "1990s",                   idea: "Tcl as an embedded extension language; a shared-world, network-multiplayer SimCity" }
    - { tech: "Python / PyGTK / Cairo / Pango / Sugar (OLPC Micropolis)", era: "2006–2008", idea: "Don dove into Python adapting SimCity for OLPC -- Python was the lifeblood of the platform (Sugar itself written in Python), built on PyGTK, gobject, Cairo, Pango. Wrapped TCL/Tk/X11 SimCity in a Python Sugar adaptor, then PyGTK desktop UI: Cairo for scalable printable graphics, Pango for beautiful scalable printable text -- natural migration from HyperLook PostScript tiles (same Porter/Duff stencil-paint model, better implemented). TODO: revive PyGTK shell around MicropolisCore C++ engine (PyGTK may still be viable; Don has not tracked GTK lately)" }
    - { tech: "SVG + HTML Canvas + CSS (web 2D)",           era: "Micropolis web -> MicropolisCore", idea: "Porter/Duff stencil-paint on the web -- vector illustration semantics (Illustrator), not (or not only) Photoshop bitmap paint; DOM/CSS/SVG/Canvas as the document and 2D layer" }
    - { tech: "WebGPU / WebGL (holodeck compositor)",       era: "MicropolisCore now",      idea: "GPU rendering on top of, underneath, or nested inside the HTML/CSS/SVG/Canvas/2D stack -- preferably GPU; @micropolis/render-core HolodeckStage layers simulation truth + tile overlays + pie menus + agents. Same stencil/paint compositing idea, hardware-accelerated" }
    - { tech: "SFC MediaGraph (Macintosh Common Lisp + QuickTime)", era: "Stupid Fun Club", idea: "constraint/graph media environment in MCL, driving QuickTime -- a navigable media map" }
    - { tech: "Zope / Plone / CMF (Python)",                  era: "2000s web CMS",           idea: "object publishing -- URL traversal to Python objects; CMF content types, workflows, permissions, through-the-web editing. Don did a lot of this (SimProv CMS, originalsims.com lineage). Same shape as MOOLLM rooms/skills -- without the Zopieness (no ZODB/acquisition maze)" }
    - { tech: "TurboGears / SQLObject / Genshi",               era: "2005+ NutritionQuest (decade+ romance)", idea: "abandoned Zope's mind-numbing complexity for a lean Python stack; Don developed, extended, and maintained Genshi templates and the Alive-PD platform for Torin Block / Block Dietary. Still running -- live demo; TODO: record walkthrough for YouTube (Torin would love it). Micropolis web used same TurboGears + OpenLaszlo thread" }
    - { tech: "OpenLaszlo (constraints)",                   era: "2000s (with Henry Minsky, pre-Leela)", idea: "declarative XML UI with a REAL constraint system -- Garnet's idea on the web (Flash/DHTML). Don enjoyed working on it; Henry connection predates Leela AI; band back together at Leela now" }
    - { tech: "SvelteKit (fine-grained reactivity)",        era: "now",                     idea: "$state / $derived -- the same declarative-constraint idea, modern web" }
  point: |
    Two braids run through it. Editors: from TECO macros to Emacs Lisp -- the tool should be
    reprogrammable in itself. UI: from Garnet through OpenLaszlo to Svelte -- you DECLARE the
    relationships and let the system keep them true, instead of hand-writing update code.
    Constraints and reactivity get reinvented every GUI generation; Don rode every one, which
    is exactly why MOOLLM's reactive YAML objects (declare state + relationships, let it settle)
    feel obvious to him. Everything old is new again -- the twin of the NeWS -> AJAX story.
  accuracy_note: |
    MockLisp was Gosling/UniPress Emacs's extension language; GNU Emacs uses real Emacs Lisp
    (not "MLisp"). The arc is deliberately "toy Lisp -> real Lisp -> constraint systems ->
    reactive web." Flag if you meant something more specific by GNU-Emacs "MLisp."
  extensibility_theme: |
    The deepest braid of all -- EXTENSIBILITY: extend a running system by shipping it code.
    Emacs (extend the editor in its own TECO then Lisp) -> NeWS (download PostScript INTO the
    window server) -> Tcl/Tk (embed a scripting language to extend the app) -> the web (download
    JavaScript INTO the page/browser; AJAX). "Send code, not commands" and "extend it in its
    own language" are the same instinct -- and it's exactly what MOOLLM does: LLM-scriptable
    objects and skills you extend from inside the world. NeWS got there first; the web proved
    it right. (Twin to the Axis-of-Eval thesis.) "Link Globally, Interact Locally"
    Don has applied this by his own hand since the start: as a Sun intern (mentor Mitch
    Bradley) he embedded CForth into the CADroid circuit editor as a friendly, macro-driven,
    programming-by-demonstration scripting language -- the earliest link in his own chain.
    The filesystem braid: Owen Densmore's class.ps (Smalltalk in PostScript) -> Owen + David
    Rosenthal's patent (Unix dirs + shell PATH as class hierarchy) -> Zope/Plone/CMF (object
    publishing + CMS workflows through the web) -> TurboGears/SQLObject/Genshi (lean Python
    stack after abandoning Zopieness; NutritionQuest decade+ platform, still live) -> MOOLLM
    (YAML + git, sans framework tax) -> GitHub social layer -> Repo Shows.

imaging_model_lineage:   # third braid -- Porter/Duff stencil/paint; Illustrator not PhotoShop
  thesis: |
    The imaging model Don keeps returning to is Porter/Duff stencil-and-paint compositing --
    the same model PostScript used, Cairo implements (same idea, better), and SVG + HTML
    Canvas carry forward on the web. MicropolisCore now layers **WebGPU/WebGL** (preferably
    GPU) on top of, underneath, or nested inside the HTML/CSS/SVG/Canvas/2D stack -- holodeck
    compositing, not either/or. Scalable, printable vector graphics and text -- the
    Illustrator world, not (or not only) the Photoshop pixel-pushing, filtering, compositing world.
  arc:
    - { tech: "NeWS / PostScript (HyperLook SimCity)", era: "1991–1992 DUX", idea: "PostScript tile renderer and UI -- stencil/paint imaging in the window server" }
    - { tech: "Cairo + Pango",                         era: "2006–2008 OLPC", idea: "natural migration: Cairo = scalable printable graphics; Pango = beautiful scalable printable text; same Porter/Duff model as PostScript, better library" }
    - { tech: "HTML / CSS / SVG / Canvas 2D",          era: "Micropolis web -> MicropolisCore shell", idea: "document + 2D illustration layer in the browser; Porter/Duff on the web" }
    - { tech: "WebGPU / WebGL holodeck",               era: "MicropolisCore now", idea: "GPU compositor nested with the 2D/DOM stack -- tile renderer plugins, overlay planes, pie menus; see unified-webgpu-renderer.md, @micropolis/render-core" }
  web_stack_layering: |
    Not a replacement stack -- a **nested** one: SvelteKit shell (HTML/CSS), SVG/Canvas 2D
    where software rendering or DOM chrome fits, WebGL/WebGPU where throughput matters (city
    tiles, agents, pie holodeck). GPU preferred; 2D stack still there for chrome, text, and
    illustration semantics, and most importantly accessibility.
  illustrator_not_photoshop: |
    Editing and rendering a simulated world as scalable geometry and type you can zoom, pan,
    and print -- not painting opaque pixels in a bitmap editor. Tiles, pie menus, and city
    maps belong to the illustration stack. 
    Don loves Blender's geometry and material nodes, and the Blender Render Pipeline, as expressions of the same ideas.

culmination_moollm:
  what: |
    MOOLLM is where the whole bundle finally comes together: an AI-orchestration microworld
    simulation OS built out of the filesystem itself. Directories are rooms you cd into; YAML
    files are objects and devices with live state; characters move through the space; skills
    are inheritable prototypes (Sims-style). Every idea above shows up here at once.
  live_digital_twin: |
    Don runs it as a live digital twin of a real place -- rooms as directories, devices as
    YAML objects, wired to home automation (solar, heat pumps, cameras). Simulation-as-a-
    service: triggers, alerts, scheduled summaries, monitoring. Robots and personal
    organization get modeled inside the same world.
  the_move: "The Sims for your filesystem; a MUD/MOO where the rooms are real and the LLM plays."
  works_and_fun: |
    It works — Don runs it daily. And the way it works is fun: navigate into rooms, read objects,
    inherit skills, wire the real house. Microworld OS only survives if operators want to
    live in the palace; fun is a feature, not frosting.
  power_of_simplicity: |
    MOOLLM's core value comes straight from the Self language's first paper -- "Self: The
    Power of Simplicity" (Ungar & Smith, OOPSLA 1987). Self's deepest lesson isn't prototypes,
    it's SIMPLICITY. JavaScript inherited Self's prototypes but neglected the simplicity and
    dropped multiple inheritance (oops). MOOLLM reintroduces multiple inheritance and mix-ins,
    keeps Self's radical simplicity, and empowers it with LLMs -- simple prototype objects a
    language model can read, extend, and reason about. Simplicity as a feature, not a sacrifice.
    See import_self_from_self below -- the constitution's `# import self from self`.
  import_self_from_self: |
    `# import self from self` -- the MOOLLM constitution effectively declares this: we import
    Self's prototype-based object model **from Self itself**, not from JavaScript's castrated
    projection of it.
    LLMs are excellent at pretending to be -- or being (jury out) -- JIT VMs that efficiently
    implement the Self object model as a **superset** of its bastardized projections into Java
    and JavaScript.
    That works in a filesystem directory tree with YAML files and artifacts following MOOLLM
    naming conventions and protocols: import and multiply-inherit from tangible, well-defined
    files you can bring into context -- at the cost of their level of detail in the **token mipmap
    pyramid** (GLANCE -> CARD -> SKILL -> README).
    But the **most efficient** multiple inheritance is naming well-known APIs, protocols, concepts,
    even people -- or describing and parameterizing them (generics, macro-metaprogramming) in
    natural language or whatever language or IDE is native and convenient. LLMs are universal
    language translators, intention compilers, and optimizers. So we can **verbally describe** the
    ideal LLM VM to simulate: as simple and powerful as Self, but with syntactic and natural-language
    pointers directly into training data -- drastically **decreasing prompt token count** by leaning
    on what the model already knows instead of inventing new arbitrary stories.
    Guardrail: inherit ideas, skills, and style -- never impersonate the person (representation-ethics).
    Don was on the **original Self mailing list**, **self-interest!** -- such a great pun (and there
    are more in the Self/MOO/MOOLLM stack). See self_pun_stack below.
    See: kernel/constitution-core.md, semantic image pyramid (GLANCE/CARD/SKILL), send-code-not-commands.md
  self_pun_stack: |
    Self wordplay Don has lived inside for decades -- load-bearing, not decoration:
    - **self-interest!** -- original Self language mailing list; Don was on it from the early days.
    - **self-ish** -- Don's prototype-based config systems (Leela, MOOLLM shape); not selfish, Self-ish.
    - **`# import self from self`** -- MOOLLM constitution (see import_self_from_self above).
    - **(oops)** -- triple pun in power_of_simplicity (JS mistake; Owen's OOPS; oops 2u2).
    - **consciencious objectors** -- coined with David Ungar at a Kaleida meetup (rig culture, not Self-only).
    - **Reflecting on Self: Narcissa's Mirror** -- proposed Repo Show episode title with David Ungar (dream guest); Self **mirrors** + narcissus wordplay (confirm spelling with David).
    - **Self: The Movie** -- Ungar & Smith's wry demo film; the community had a sense of humor about itself.
    TODO: Don to enumerate more puns on the Ungar Repo Show -- the stack runs deep.
  oops_pun: |
    KEEP "(oops)" in power_of_simplicity — intentional triple pun, not a typo:
    (1) JS dropped multiple inheritance — oops, mistake.
    (2) OOPS = Object Oriented PostScript (Owen Densmore's class.ps for NeWS): as simple as a
        PostScript dict stack, and it HAS multiple inheritance. Owen Densmore smiles quietly
        to himself.
    (3) oops 2u2.
    See characters/owen-densmore/, process/trails/send-code-not-commands.md
  filesystem_oop_thread: |
    The deeper thread behind MOOLLM's "directories are rooms, files are objects":
    Owen Densmore wrote NeWS's object system class.ps -- Smalltalk-style classes in pure
    PostScript (dict stack simplicity, multiple inheritance). Smalltalk (which Self later
    perfected, and which fed Java, JavaScript, Lua, CLR VMs) is the ancestry.
    Owen and David Rosenthal (NeWS co-architect; X11 ICCCM architect) patented using the
    Unix filesystem and shell PATH as an object/class programming system -- classes and
    instances as directories, path lookup as inheritance/method dispatch
    (US Patent 5,187,786). MOOLLM approaches the filesystem the SAME way -- and that
    filesystem is itself a projection of a point in git repo space (history, branches,
    blame). Layer on GitHub-as-MMO-RPG-and-social-network (fork, PR, issues, stars) and
    Repo Shows (conversation whose stage IS the repo) -- the stack Owen and David sketched,
    now with LLMs reading YAML skills off the dict stack.
    See: characters/owen-densmore/, characters/david-rosenthal/,
    process/trails/send-code-not-commands.md, repo-shows/
  zope_to_moollm: |
    Don spent years in Zope object publishing, Plone, CMF content management, Python
    workflows, and through-the-web editing -- navigable content trees, types, state
    machines, publish/submit/review. Then abandoned the mind-numbing complexity of Zope for
    a long romance with **TurboGears, SQLObject, and Genshi Templates** -- developed,
    extended, and maintained for **NutritionQuest / Block Dietary** (Torin Block) for more
    than a decade; **still running** (live demo available). Reference: Torin Block (contact
    on request). TODO: record demo walkthrough for YouTube -- Torin would love it.
    All of that applies to MOOLLM: rooms, YAML object types, skills as behaviors, git as
    the object store, LLM as the traversal engine. The IDEAS were right; Zopieness was the tax;
    TurboGears was the sane middle; MOOLLM is the lean end state.

why_it_matters: |
  These ideas share DNA and keep feeding each other: the RIGHT interface for a human to
  navigate, edit, and directly drive a system modeled in code -- and to make it legible and
  fun. Pie menus, method of loci, adventure-map editing, god-game single-operator-many-agents
  UIs, live digital twins. Forty years of collecting and combining great ideas; MOOLLM is
  the culmination. Don didn't stumble into it -- he's been building the bundle his whole career.

