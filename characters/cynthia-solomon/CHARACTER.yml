bio:
  summary: "**Cynthia Solomon** — one of the original designers of **Logo** (1967, at Bolt, Beranek & Newman, with Wally Feurzeig, Seymour Papert, Daniel G. Bobrow and Richard Grant; NSF-sponsored) and a lifelong pioneer of **computing for children**. She helped build the MIT Logo culture through the 1970s and worked at **Atari Cambridge Research** in the early 1980s on a children's computer (object-oriented Logo, gestural input, force feedback, music) alongside Alan Kay, Margaret Minsky, David Levitt and others. Author of *Computer Environments for Children: A Reflection on Theories of Learning and Education* (MIT Press, 1986) and co-author of the *History of Logo* (Proc. ACM HOPL, 2020). Honored with the Constructionism 2016 and FabLearn 2019 Lifetime Achievement Awards, and gave the inaugural **Seymour Papert Memorial Lecture** (CrossRoads 2018). On her YouTube channel she has shared a rare **treasure trove** of historical videos — Papert, Marvin and Margaret Minsky, kids programming turtles, and the Atari Cambridge lab."

connections:
  logo_origin: "A founding designer of Logo (BBN, 1967) and a central figure in the MIT Logo Group that Papert started in 1969 — the source of turtle graphics and constructionist learning."
  atari_cambridge: "Worked at Atari Cambridge Research (early 1980s); her uploaded videos document that lab — Alan Kay, Margaret Minsky, David Levitt, Ed Hardebeck, Gary Drescher's object-oriented Logo, and more."
  video_trove: "Her YouTube channel preserves footage that exists almost nowhere else: Seymour Papert describing the turtle, Marvin Minsky on his 1951 learning machine, Talking Turtle, children at the turtle — primary-source history."
  snap_logo: "A friend of the Snap!/Logo continuation; Don met her by video conference at the Snap! conference (Snap!Con) in Barcelona."

