alan_kay_window_history:
  what: |
    DSHR's *History of Window Systems* (2021) embeds Alan Kay's account of pre-Smalltalk
    windows — Sketchpad, Flex, viewport vs window naming — from a long /. comment DSHR
    preserved. Not a live Kay interview in repo; David's synthesis of Kay + Alvey + his own path.
  blog: https://blog.dshr.org/2021/03/history-of-window-systems.html

