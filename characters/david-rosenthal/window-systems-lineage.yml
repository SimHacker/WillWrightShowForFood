    participated: "Architecture + plenary discussions; later Sun NeWS + X11/ICCCM"
    show: "PIXIE Cambridge stack → Andrew → NeWS → X11 — his through-line, not Don's lecture"
  james_gosling:
    published:
      - "SunDew — A Distributed and Extensible Window System"
      - "A Window Manager for Bitmapped Displays and Unix (with Rosenthal)"
    participated: "Same workshop discussions; SunDew cited in architecture WG as programmable-WM indicator"
    after: "Renamed SunDew → NeWS; Rosenthal joined him at Sun (1985)"
    page: ../james-gosling/window-systems-lineage.yml
  don_hopkins:
    teitelman: |
      **Warren Teitelman** — invented **DWIM** (*Do What I Mean*) in Interlisp; Interlisp-D lineage;
