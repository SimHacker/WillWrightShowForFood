      **NeWS Toolkit** team (~1990–1991) — pie menus, PizzaTool, PostScript UI work.
    work_history: ../don-hopkins/career/work-history.yml
    pie_menus_siggraph: "Don loads pie menus at SIGGRAPH NeWS booth — DSHR blog *Pie Menus*"

teitelman_warren:
  interlisp: "Designed Interlisp at Xerox PARC; D-Lisp client–server windows; Undo/redo, advising"
  dwim:
    acronym: "Do What I Mean"
    what: |
      Warren Teitelman's famous Interlisp facility — correct trivial errors (typos, transpositions,
      missing parentheses, misspelled commands) instead of scolding the programmer and stopping.
      Philosophy he stated plainly: **people time is more valuable than computer time** — the
      system should act as an agent that interprets intent from context (Teitelman & Masinter,
      Interlisp environment papers).
    era: "Coined ~1966 in BBN Lisp PILOT; central to Interlisp by the 1970s"
    wikipedia: https://en.wikipedia.org/wiki/DWIM
    teitelman: https://en.wikipedia.org/wiki/Warren_Teitelman
    critics_joke: "Do What Teitelman Means — or Do What Interlisp Means"
    repo_meta:
      note: |
        Don said *DWIM of course* about YAML key `sun_news_toolkit` (headline *news*, not **NeWS**).
        Cursor agent fixed the spelling but skipped Warren's DWIM — then Don asked to **DWIM about
        DWIM**. Two senses: Teitelman's shipped Interlisp agent vs today's coding agents.
      show_beat: "Warren invented DWIM; Don reported to him on NeWS Toolkit — worth one straight-faced beat"
  alvey_1985:
    title: "Ten Years of Window Systems — A Retrospective View"
    covers: "Smalltalk, Interlisp-D, Tajo, Cedar Viewers, SunWindows, SunDew"
  sun_NeWS_toolkit:
    product: NeWS
    not: "Not headline news — Network extensible Window System"
    role: "Managed NeWS Toolkit team at Sun"
    don_hopkins: "Don's manager — pie menus, PizzaTool, NeWS UI (~1990–1991)"
  bridges:
    - "Interlisp DWIM → humane agents → window-system retrospectives → NeWS Toolkit management"
    - "Alvey retrospective named SunDew in same proceedings as Gosling + Rosenthal papers"
    - "Teitelman → Sun → NeWS Toolkit → Don's pie-menu work → CHI'88 → The Sims"

