# Window-systems lineage — DSHR's through-line (public sources)
# Show hook: not Don's lecture — David's lived arc from Cambridge stack to NeWS *and* X11.

meta:
  room: characters/david-rosenthal/
  curated_by: don-hopkins
  consent: not_yet_asked
  guest: david-rosenthal
  show:
    - ../../repo-shows/pixie-pie-menus-pdp7.yml
    - ../../repo-shows/david-rosenthal/

through_line: |
  **PIXIE distributed GUI → Andrew → NeWS → X11/ICCCM** — the lineage David uniquely bridges.
  What carried from Cambridge satellite graphics (PDP-7/340 + Titan) into networked window
  systems? NeWS vs X11 — what historians should get right (he built both sides).

pixie_cambridge_hook:
  what: |
    Undergrad ~1970 on same **PDP-7/340 + Titan** stack as PIXIE; met Wiseman. On the PIXIE
    group show: connect satellite-graphics / distributed-CAD zeitgeist to Andrew/NeWS/X — not
    as invention claim, as continuity question for David to answer.
  doc: ../heinz-lemke/cambridge-films-flight-of-the-bumblebee.md

alvey_workshop_1985:
  title: "Methodology of Window Management — Alvey Workshop"
  when: "29 April – 1 May 1985"
  where: "Cosener's House, Abingdon, UK (Rutherford Appleton Laboratory)"
  proceedings:
    springer: https://link.springer.com/book/10.1007/978-3-642-70919-7
    chilton_index: http://www.chilton-computing.org.uk/inf/literature/books/wm/index.htm
  format: |
    Day 1 — invited papers (Gosling, Rosenthal, Teitelman, …). Day 2 — split working groups
    (architecture, input, redraw, IPC); plenary keeps groups aligned. Day 3 — group reports +
    framework for future UK MMI work. Not just publication — **consensus-forging discussion**
    on panel/window nomenclature, client–server levels, programmable window managers, redraw policy.
  architecture_wg_report: http://www.chilton-computing.org.uk/inf/literature/books/wm/p020.htm
  note: |
    **Gosling** and **Rosenthal** both published papers and participated in the workshop
    discussions. **Teitelman's** retrospective surveyed a decade of window systems in the same
    room as **SunDew** (NeWS precursor) and **Andrew**. DSHR's *Recreational Bugs* post links
    the full proceedings via Chilton.

