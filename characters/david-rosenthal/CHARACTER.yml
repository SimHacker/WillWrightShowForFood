bio:
  summary: |
    **David S. H. Rosenthal (DSHR)** — Co-developer of **NeWS** with James Gosling at Sun
    (co-author of *The NeWS Book*), and — uniquely — also a key architect of its winning rival
    **X11** (he wrote the **ICCCM** and holds an X security patent). Worked on **Andrew** at CMU
    with Gosling; **employee #4 and chief scientist at Nvidia**; then **Chief Scientist of LOCKSS**
    at Stanford Libraries — long-term **digital preservation** (2025 Paul Evan Peters Award).
    Cambridge undergrad ~1970 on **PDP-7/340 + Titan** — same stack as PIXIE.

