  summary: "**Isabella Struckman** — AI/ML researcher. At **Leela AI** she works on **computer-vision model evaluation and training** (she built a fine-tuning technique for an object-detection pipeline that cut the resources needed to hold performance after camera movements by ~25%). MEng at **MIT CSAIL in the Mądry Lab**, researching **ML explainability** and **AI policy**; co-author of the **\"AI Supply Chains\"** work and lead author of **\"Why They're Worried\"** (a study of experts who signed the 2023 'pause letter'). MIT AI & Decision Making grad; has taught intro-AI to high-schoolers and facilitated MIT's Women's Technology Program."

