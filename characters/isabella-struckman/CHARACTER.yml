bio:
  summary: "**Isabella Struckman** — AI/ML researcher. At **Leela AI** she works on **computer-vision model evaluation and training** (she built a fine-tuning technique for an object-detection pipeline that cut the resources needed to hold performance after camera movements by ~25%). MEng at **MIT CSAIL in the Mądry Lab**, researching **ML explainability** and **AI policy**; co-author of the **\"AI Supply Chains\"** work and lead author of **\"Why They're Worried\"** (a study of experts who signed the 2023 'pause letter'). MIT AI & Decision Making grad; has taught intro-AI to high-schoolers and facilitated MIT's Women's Technology Program."

leela_colleagues:
  note: "Don's CURRENT colleagues at Leela AI — for a Leela / vision-AI episode showcasing present work (not a reunion)."
  with: ["henry-minsky (co-founder/CTO)", "Milan Singh Minsky (VP Product)", "Steve Kommrusch", "don-hopkins"]
  showcase: ../../process/vision-and-ambition.yml   # connectors_and_legacy#current_colleagues_showcase

why_invite: |
  Don is genuinely enthusiastic about having Isabella on a Repo Show — for the substance of it. She
  has a wealth of fascinating work and ideas to talk about and contribute: computer-vision model
  evaluation & training, ML explainability, and the AI-supply-chains research, plus a sharp,
  thoughtful take on where AI is going. That makes for a rich, original conversation — which is the
  whole reason to invite anyone. Plain respect for the work. Her call on what's shared; edit or
  remove anytime.

