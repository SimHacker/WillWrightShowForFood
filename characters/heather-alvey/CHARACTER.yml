bio:
  summary: "**Heather Alvey** (née **Castello**) — founder of **SimFreaks**, one of the longest-running, most respected Sims custom-content houses (a **~26-year** brand): original object suites, sophisticated SimAntics programming, and community leadership. With her husband **Steve Alvey** (**SimSlice** / **SliceCity** — SimCity running *inside* The Sims) she still ships **tour-de-force magnum-opus expansion packs** like **Zombie Sims** for The Sims 1. Don's longtime friend and collaborator."

connections:
  steve_alvey: "Married to **Steve Alvey** (**SimSlice / SliceCity** — a Lilliputian SimCity that fits in your Sims back yard: fan-coded SimCity inside The Sims; the shipped precedent for Will Wright's data-portability / games-nested-in-games vision, deep not cosmetic). The two have run active, respected ~26-year Sims-content brands as publishers, artists, programmers, and community leaders."
  don_collab: "Don worked with Heather, Steve, **SimBabes**, and other artists on the **SimProv Wedding Playset** (unreleased back then; Don has recently released it and is reorganizing/republishing it). They're the first customers for Don's **Micropolis content-management & publishing system** (for their huge artisanal back-catalogs + new streams)."
  zombie_sims: "Current magnum-opus expansion-pack work (Zombie Sims) feeds the Afterlife × ZombieSims show seed."
  will_gallium: "Heather & Steve also worked with **Will Wright at Gallium Studios** (the indie studio Will founded with Lauren Elliott; AI life-sim **Proxi**, in Unity)."

support:
  why_it_matters: "Heather & Steve are **independent creators** who've paid the mortgage for years on **subscriptions + content sales + side jobs**. The Repo Show should drive **real fans and subscribers** to them — non-extractive lift (sincere praise that sends people to buy)."
  how: "Feature the SimFreaks catalog live; link the store/subscriptions as storefronts; the Micropolis publishing system to keep the back-catalog + new content thriving."

