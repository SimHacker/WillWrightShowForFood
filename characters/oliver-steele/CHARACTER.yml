bio:
  summary: "**Oliver Steele** — **Chief Software Architect at Laszlo Systems** (2002–2007): designed the **LZX** XML interface language, implemented the XML + JavaScript compilers and runtime, and launched the **OpenLaszlo** open-source project (founding its Boston office). Known for **instance-first development** and reactive-programming ideas, and open-source work like Functional JavaScript and PyWordNet. Later at **Apple** (QuickDraw GX), **Nest** (Learning Thermostat backend), and teaching at NYU Shanghai and Olin College. Don worked with him on OpenLaszlo."

