bio:
  summary: "**Eric Hedman (\"Irk\")** — Sims 1 character animator. Hand-tuned walk cycles, idles, gestures for the vitaboy pipeline. Famous wiggle incident (Don checked in canWiggle debug — they're still great buddies). Great interview subject; YouTube channel pending URL."

why_invite: |
  Don would love to have Eric on a Repo Show for the substance of it: hand-crafted character
  animation is a huge part of what gives The Sims its soul, and Eric's stories about tuning walk
  cycles, idles, and gestures for the vitaboy pipeline (plus the legendary canWiggle incident) are
  gold — funny, specific, and full of craft. A great, original conversation, and a chance for more
  people to see the artistry behind those little Sims. Plain respect for the work; his call on
  what's shared.

