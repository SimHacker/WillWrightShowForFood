story_seeds:
  # Rich, first-hand anecdotes from his retrospectives — easily several Repo Shows' worth.
  - "The mechanical bull ('my baby'): designing a big 'magic' party object (start → loop → thrown-off variations → recover), informed by his years as a nightclub bouncer at raves/themed nights."
  - "The cross-discipline object-prototyping template (developed on The Sims): build a simplified 3D object, render it as a full stand-in with all needed states, hand off to specialist artist/animator/programmer; iterate same-day in the sandbox."
  - "Broad 'pantomime' animation under a frame budget — you'd lose half your frames to unknown CPU speed, so motions had to read big."
  - "Tim LeTourneau's open, buy-in design process; the happy little 'fishbowl' crew vs. SimCity-side resource tension; the Maxis → EA 'electronic-artsification'."
  - "The Drew Carey Show tie-in: animating Sims vignettes + a laser blaster; nearly dancing Marion Ross into the floor at a TV-moms ball."
  - "Aether HeXXen: a 'space witch' visual novel — a Night-Witches homage with strong capable women, ancient XX-keyed alien tech, a fish-out-of-water lead."

