bio:
  summary: "**Eric Hedman (\"Irk\")** — animator, artist, and game designer. A **character animator on the original The Sims** (hand-tuned walk cycles, idles, and gestures for the vitaboy pipeline; the legendary canWiggle incident — Don checked in the debug; they're still great buddies), he went on to **lead design on Sims expansion packs** (House Party — where he animated vignettes and a laser blaster for the Drew Carey Show tie-in — plus Livin' Large, Unleashed), then worked at **Disney, Jim Henson, Nickelodeon**, and others. Today he's an **independent creator** making adventures, visual novels, games, and VR/AR/MR — including **Aether HeXXen** (a 'space witch' visual novel) — mostly hand-crafted 2D/3D art and animation. His YouTube channel **@irkinteraction** is full of warm, funny, detailed Sims-development stories."

why_invite: |
  Eric is an **independent contractor artist** (project- and hourly-based; not looking for 9-to-5
  work), so exposure is welcome — Don wants to **drive people to his YouTube channel
  (@irkinteraction)** and his indie projects. And the substance is gold: hand-crafted character
  animation is a huge part of what gives The Sims its soul, and Eric's stories — the vitaboy
  pipeline, the canWiggle incident, the expansion packs, the Drew Carey Show tie-in, his years at
  Disney / Henson / Nickelodeon — are funny, specific, and full of craft. There are **easily
  several Repo Shows' worth** here, and he'd likely love it. His call on what's shared.

indie_work:
  current: "Aether HeXXen — a 'space witch' visual novel / game (Act 1: Death Space Requiem); plus adventures, games, and VR/AR/MR experiences. Hand-made 2D/3D art + animation."
  support: "Patreon + Ko-fi (also open for commissions)."

