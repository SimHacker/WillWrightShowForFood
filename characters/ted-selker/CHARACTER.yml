bio:
  summary: "**Ted Selker** — HCI researcher and inventor best known for the **TrackPoint** pointing stick (the red nub on IBM ThinkPad keyboards). He led IBM Almaden's User Systems Ergonomics Research group and its **New Paradigms for Using Computers (NPUC)** workshops, taught at the **MIT Media Lab** (Context-Aware Computing; 'considerate computing'), and co-directed the **Caltech/MIT Voting Technology Project**."

