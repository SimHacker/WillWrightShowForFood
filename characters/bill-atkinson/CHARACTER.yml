bio:
  summary: "**Bill Atkinson** (1951–2025) — Apple employee #51 and architect of the Mac's graphical soul: **QuickDraw**, **MacPaint** (FatBits, the selection lasso, marching ants), the menu bar, **Atkinson dithering**, and **HyperCard** — the hypermedia stack-of-cards that put programming in non-programmers' hands and prefigured the web. EFF Pioneer Award (1994); later a renowned nature photographer."

