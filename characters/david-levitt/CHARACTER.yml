  summary: "**David Levitt** is a good friend of Don's who works at the intersection of **music, AI, and interactive media**. He earned his **MIT PhD advised by Marvin Minsky**, with a thesis on **AI music generation and jazz improvisation**; worked at **Atari Cambridge Research**; and was part of **Lynn Conway's** pioneering **VLSI design course** alongside James Clark, Guy L. Steele, and other now-legendary names. Don has paired him with composer **Jerry Martin** for a *music + theory* Repo Show."

