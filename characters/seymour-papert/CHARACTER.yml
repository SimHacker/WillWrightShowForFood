bio:
  summary: "**Seymour Papert** (1928–2016) — South-African-born mathematician, computer scientist, and educator who reshaped how we think about **children and computers**. After working with **Jean Piaget** in Geneva, he came to MIT and **co-founded the AI Lab with Marvin Minsky**. He co-created **Logo** (1967, with Wally Feurzeig and Cynthia Solomon) — the language of the **turtle** — and coined **constructionism**: the idea that people learn best by *building* things they care about and can share. His **Mindstorms** (1980) is a foundational text of educational computing; **LEGO Mindstorms** is named after it. His influence runs straight through **Scratch**, **One Laptop Per Child**, and this project's own constructionist mission."

