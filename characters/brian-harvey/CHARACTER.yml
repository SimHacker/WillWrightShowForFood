bio:
  summary: "**Brian Harvey** (he/him) — UC Berkeley CS educator (Teaching Professor Emeritus), a lifelong force in **computer science education**. Developed **Berkeley Logo**, co-developed **Snap!** (design + documentation) with Jens Mönig, and co-created **The Beauty and Joy of Computing (BJC)** curriculum with Dan Garcia. Author of *Computer Science Logo Style* (3 vols, MIT Press) and *Simply Scheme* (with Matthew Wright, foreword by Hal Abelson); taught the legendary SICP-based **CS 61A**. Karlstrom Outs"

