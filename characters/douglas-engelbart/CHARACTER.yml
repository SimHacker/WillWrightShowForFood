# Douglas Engelbart — memorial portrayal (in memoriam). NOT Douglas Engelbart.
# Memorial mode: represent + discuss, never interview. Standards: ../../schemas/portrayal-standards.yml#memorial_mode

character:
  id: douglas-engelbart
  name: "Douglas Engelbart"
  type: memorial
  signifier: "🕯️"
  status: deceased
  field: "Augmenting human intellect — NLS, the mouse, hypertext, the Mother of All Demos (1968)"
  home: characters/douglas-engelbart/

representation:
  governed_by: ../../schemas/portrayal-standards.yml
  consent_level: 5
  authored_by: don-hopkins

invitation:
  status: memorial
  consent: not_yet_asked
  document: memorial.md
  note: "deceased (1925–2013) — represent + discuss; invite people who knew him"

memorial:
  mode: represent_and_discuss
  rule: "Represent and discuss his documented work and stories. Do not interview, do not speak as him, invent no inner life or quotes."
  who_can_discuss:
    - { who: ted-nelson, why: "Xanadu/hypertext peer; Engelbart officiated Ted's wedding to Marlene" }
    - { who: alan-kay, why: "PARC lineage; recalled the 1968 demo's impact (Yoot Saito interview)" }
    - { who: yoot-saito, why: "Interviewed Alan Kay for the 25th anniversary of Engelbart's 1968 demo" }
    - { who: don-hopkins, why: "Cherishes an Engelbart keyset; augmentation thesis underlies the show's PITM" }
  draw_on_for_shows:
    - "The Mother of All Demos (Dec 9, 1968) — NLS, the mouse, hypertext, video conferencing, collaborative editing in one sitting"
    - "'Augmenting Human Intellect: A Conceptual Framework' (1962) — bootstrapping, the augmentation thesis"
    - "Augmentation NOT automation — the spine of the Crazy Idea Jam's Player-in-the-Middle"
    - "The 1968 demo's 25th anniversary → Yoot Saito's Alan Kay interview (in this repo)"

bio:
  summary: "**Douglas Engelbart** (1925–2013) — visionary of **augmenting human intellect**. At SRI's Augmentation Research Center he invented the **computer mouse** (with Bill English), pioneered **hypertext**, on-screen windows, and real-time collaborative editing, and unveiled them all in the 1968 **'Mother of All Demos.'** His 1962 framework 'Augmenting Human Intellect' and his idea of **bootstrapping** still frame how humans and machines should work together. ACM Turing Award (1997)."

sources:
