bio:
  summary: "**David Ungar** — co-creator (with Randall Smith) of **Self**, the prototype-based object language that dropped classes entirely. Pioneered **generation-scavenging** GC and **adaptive/dynamic JIT** (direct HotSpot lineage); **mirrors**, Stage Magic Principle, Idea Scavenging. Very open and influential — Don credits him with a huge share of where we are. Self doesn't run on everybody's phone; **in spirit it does** (JS object model, MOOLLM directories-as-prototypes, modern VMs). Kaleida **Conscientious Objectors** meetup with ScriptX object-system team. **self-interest!** mailing list (Don was on it). Proposed show: **Self × MOOLLM** — *Reflecting on Self: Narcissa's Mirror*."
  don_credit: |
    David was generous, open, and cross-pollinating — Conscientious Objectors, mailing lists,
    papers, humor (Self: The Movie). Don: huge credit owed even if Self never shipped on every device;
    the ideas did.

