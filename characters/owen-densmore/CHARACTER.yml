bio:
  summary: |
    **Owen Densmore** — 30+ years across **Xerox, Apple, and Sun Microsystems**. At Sun he created the
    **object-oriented PostScript class system (`class.ps`)** for **NeWS** (the Network/extensible Window
    System) — showing that **PostScript dictionaries alone** could implement a Smalltalk-style class
    mechanism (inheritance, methods, instances) with **no changes to the interpreter** ("Object
    Oriented Programming in NeWS," 1986; "A User-Interface Toolkit in Object-Oriented PostScript," with
    David Rosenthal, 1987 — one of the toolkits earned a **patent in language design**). Earlier, at
    **Apple**, he worked on Mac/Lisa hardware+software and the **Macintosh Printing Architecture**;
    later he was a **Chief Scientist at Sun** and led the **Java Car** concept work. After the
    **Santa Fe Institute** Complex Systems Summer School (2000) he moved into **complexity science** and
    co-founded the **Redfish Group** (agent-based modeling; a pillar of the NetLogo community).
  known_for:
    - "NeWS object-oriented PostScript — class.ps (Smalltalk-style classes in pure PostScript)"
    - "'Object Oriented Programming in NeWS' (1986); 'A User-Interface Toolkit in Object-Oriented PostScript' (with David Rosenthal, 1987)"
    - "Apple Macintosh Printing Architecture; Sun Chief Scientist; Java Car"
    - "Redfish Group / Santa Fe Institute — agent-based modeling, complexity science"

connections:
  the_og_flower_child: "**Owen is the original 'User Interface Flower Child'** — Don shamelessly took his own title as an homage. One of the great, kind elders of the **Silicon Valley Hippie Mafia**."
  news_gang: "Core of the **NeWS gang** with James Gosling, David Rosenthal, Arthur van Hoff (and Don) — the 'send code, not commands' window system. Natural co-guest for the NeWS reunion."
  send_code_philosophy: "His class.ps is the proof of NeWS's bet: ship **programs**, not command streams — PostScript for code, data, AND graphics. See ../../process/trails/send-code-not-commands.md."
  warnock_lineage: "PostScript runs from **John Warnock** (Adobe; d. 2023) → NeWS (Gosling) → Owen's object PostScript. The thread to discuss: Warnock's idea of PostScript as a **linguistic motherboard** (graphics card + networking card in software, more cards to come)."
  don_primary_source: "Don hosts Owen's 1986 NeWS OOP paper at donhopkins.com/home/monterey86.pdf."

