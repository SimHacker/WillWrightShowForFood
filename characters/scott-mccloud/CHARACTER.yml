bio:
  summary: "**Scott McCloud** is a cartoonist and comics theorist best known for **_Understanding Comics: The Invisible Art_** (1993), followed by **_Reinventing Comics_** (2000) and **_Making Comics_** (2006), and the graphic novel **_The Sculptor_** (2015). His ideas — **closure** (the imagination filling the gap between panels), **masking** (abstract characters in detailed worlds), and **amplification through simplification** — reshaped how creators think about reader participation and identification."

connections:
  the_sims: "Understanding Comics was a 'bible' for The Sims team. Masking (photorealistic environments + abstract Sims), identification, empathy, and engaging the player's imagination to fill the gaps were lessons woven directly into the game — Don credits McCloud in the Transmogrifier documentation."
  micropolis: "The same idea drives simulation games: the sparse model on screen, the rich model the player's imagination builds to fill it in."
  don: "A patron saint of Don's design thinking on The Sims and Micropolis."

