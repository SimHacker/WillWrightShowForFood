# Scott Draves ("Spot") × Don Hopkins — correspondence summary (public-safe)
# A tight, public-safe digest of a long real friendship + email thread. NOT the full private thread.
# Standards: ../../schemas/portrayal-standards.yml

meta:
  with: scott-draves
  curated_by: don-hopkins
  consent: not_yet_asked
  span: "early 1990s (Silicon Valley) → early–mid 1990s (CMU) → 2006 → 2026"
  provenance: "Don's own recollection + personal email archive with Scott (2006–2026). Personal source — quote only with Scott's OK."
  to_verify_with_scott:
    - "Exact earliest dates (Don recalls c. 1990–1992; Scott's LinkedIn doesn't reach back that far)."
    - "Where Scott was working in the Bay Area at the time (Don doesn't recall — Nick introduced them; their real collaboration was co-writing *fnord* at Brown)."

vibe: |
  Don's framing of the era: the Bay Area before it enshittified — when there was a ton of fun,
  weird, generous stuff going on and the hippies hadn't yet been priced/driven out. A techno-hippie
  diaspora followed (Don among them) — to Amsterdam and elsewhere. Good color for the show.

gist: |
  Don and Scott **met in the Bay Area in the early 1990s through Don's housemate Nick Thompson**
  (Brown '90), who knew Spot from the Brown Graphics Group and was then at **SGI** — Nick brought
  Scott home, introduced them, and the three hung out regularly. Don ran Scott's early Fractal Flame
  work on his SparcStation II while building his CAM6 cellular-automata performance platform, the
  three bonding over interactive performance-art graphics. Don then went to the **Turing Institute**
  in Glasgow and on to **CMU**, where Scott was deep in his CS PhD (Andy Witkin early on, then
  Peter Lee). Over the next three decades the thread runs through generative and evolutionary art,
  distributed systems, cellular automata, and AI: Don introduced Brian Eno to Scott in 2006, traded
  BitTorrent/libtorrent notes while at TomTom, swapped cellular-automata and Sandspiel rabbit holes,
  and reconnected to help build the Electric Sheep / Unity client. In 2026 Scott relaunched the
  Sheep as Infinidream and Don beta-tested it.

threads:
  silicon_valley_origins:
    when: "early 1990s (c. 1990–1992) — exact dates to confirm"
    what: "Met in the Bay Area while Don was at Sun Microsystems — Don's housemate Nick Thompson (then at SGI) brought Scott home and introduced them, and the three hung out regularly. Don ran Scott's early Fractal Flame screensaver on his SparcStation II (Sun employee discount) and they bonded over interactive performance-art graphics — while Don built his CAM6 cellular-automata emulator on the Sun: NeWS PostScript UI + HyperLook Control Stack + LavaLamp Shaped Window + C simulator engine + Mitch Bradley's FORTH as a CAM6-software-compatible (per the CAM6 book) FORTH-programmable CAM orchestrator and lookup-table rule compiler (later ported to many platforms and used as SimCity DRM and Micropolis Space Inventory). (Scott himself also used SGI supercomputers as an intern in Tokyo in 1991 and at NTT-Data in 1993 — where he finished the Fractal Flame.)"
  nick_thompson_bridge:
    when: "Brown (1980s) → SGI (Jun 1990–Jun 1992)"
    what: "Nick Thompson (Brown '90) worked in Andy van Dam's Brown Graphics Group and for **Thomas Banchoff** (confirmed — the 'CG professor' Don remembered), and **co-wrote `fnord` with Scott Draves** — a functional language for describing mathematical objects that became the workhorse for Banchoff's higher-dimensional-geometry artwork (and an animation in an episode of Star Trek: The Next Generation). 'fnord' is literally the title of Scott's Brown BS thesis. Nick's SGI software produced the rendered CG imagery for Banchoff's book ***Beyond the Third Dimension*** (Scientific American Library, 1990) — incl. its cover/torus imagery (the interior line art was Davide Cervone's). Nick then joined SGI (SF Bay Area, Jun 1990–Jun 1992) and helped build Open Inventor. He was **Don's housemate** c.1990–92 and the one who **brought Scott home and introduced him to Don** — the bridge between them. Verified: math.brown.edu/tbanchof/TFBCON2003/students/NickThompson.html"
  the_6heads_house:
    when: "c.1990, Mountain View — everyone's first post-college jobs"
    what: "How Don met Scott was the whole **'6Heads' house** — Don's Mountain View household, nicknamed for six plastic anatomical human heads with removable skull panels (drug-rep swag for **ELAVIL** / amitriptyline HCl — a 1974 MSD/Merck gift to doctors) left in the garage when they moved in, lined up along the mantelpiece. Housemates: Don + **Nick Thompson** (SGI; who brought Scott by) and **Steve Zellers** (worked with Don at **Sun**, and with **Dave Winer** on *More* and what became **Frontier** — Zellers was a longtime UserLand engineer on Frontier/Radio UserLand). They lived **next door to Joy Mountford** (Head of Apple's Human Interface Group 1986–94; Don later got to know her at **Interval Research**). Don, Nick, and Steve were fresh out of college in their first Silicon Valley jobs; **Scott was the visiting friend, about to start his CMU PhD** — the grad-school-bound one, not a first-jobber. The wonderful 1990 Silicon Valley zeitgeist — the Bay Area before it enshittified. Photos of the model: media/6heads/."
    open_q: "Was the Mountain View hang the summer of 1990 (between Brown and CMU), or a later visit while Nick was still at SGI (1990–92)? — ask Scott."
  cmu_origins:
    when: "early–mid 1990s"
    what: "Reconnected at Carnegie Mellon — Scott in his CS PhD (advised by Andy Witkin & Dana Scott 1990–92, then Peter Lee through 1997; thesis 'Automatic Program Specialization for Interactive Media'), Don with Brad Myers (Lisp UI), porting SimCity from NeWS→X11/Tcl/Tk, making it multi player, and writing the Unix-Haters X-Windows chapter."
  brian_eno_2006:
    when: "June 2006, San Francisco"
    what: "After Brian Eno + Will Wright's Long Now talk 'Playing with Time', Don introduced Brian Eno to Scott; the three met at Scott's apartment and bounced ideas around. Brian saw Electric Sheep and the hour-per-frame Dreams in High Fidelity. Scott photographed the evening (Brian with Electric Sheep 'on his head')."
  bittorrent_tomtom:
    when: "2007"
    what: "Don, newly at TomTom, asked Scott about libtorrent (used by the Electric Sheep client) for distributing big maps; integrated it into xulrunner as an XPCOM plug-in with HTTP fallback; demoed to TomTom founder Pieter Geelen."
  cellular_automata:
    when: "2013–2023"
    what: "Long-running exchange on cellular automata (Don's CAM6 simulator, Norman Margolus/Toffoli), the Moveable Feast Machine (Dave Ackley), Sandspiel / Sandspiel Studio, video feedback, and music-reactive visuals."
  electric_sheep_unity:
    when: "c.2020–2023"
    what: "Reconnected to build a cross-platform Electric Sheep / Unity client (seamless video playback, music sync, WebGPU/Metal). With Joshua Goldberg and Anton Marini (Syphon)."
  infinidream:
    when: "2026"
    what: "Scott relaunched Electric Sheep as Infinidream (Generation 248, 1080p/60fps, phone remote, generative-AI platform, open source). Don beta-tested, filed UI/auth bug reports, and shared his self-aware image pipeline work."

