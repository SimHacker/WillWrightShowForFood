bio:
  summary: |
    **Scott Draves** (a.k.a. **Spot**) is a software artist best known for **Electric Sheep**
    (1999– ), a distributed, evolving screensaver in which thousands of computers worldwide
    collaboratively render and a genetic algorithm + human votes breed abstract animations
    called "sheep" — a "collective dream of a cyborg mind." He invented and open-sourced the
    **Fractal Flame algorithm** (1992; flam3), whose images have appeared on a Paul Simon
    album cover and on Stephen Hawking's *The Grand Design*, and which supplied the SIGGRAPH
    2008 "Evolve" graphic identity. His evolving-painting work **Dreams in High Fidelity** has
    shown at MoMA (Design and the Elastic Mind), Google, the Adler Planetarium and elsewhere.
    With his wife Isabel Walcott Draves he founded **Leaders in Software and Art (LSA)**. He
    later built the open-source **Beaker Notebook** (polyglot data-science notebook), and in
    2026 relaunched the Sheep as **Infinidream** (Generation 248, 1080p/60fps, phone remote,
    open source). He studied under **two legendary Andys**: at **Brown University** (BS Mathematics,
    1990) in **Andy van Dam's** graphics lab — where his thesis *fnord*, a functional language for
    describing higher-dimensional geometry (co-written with **Nick Thompson**), became the workhorse
    for **Thomas Banchoff's** 4D artwork — and at **Carnegie Mellon University** (PhD, School of
    Computer Science, 1997; thesis *Automatic Program Specialization for Interactive Media* — advised
    by **Andy Witkin** & Dana Scott early on, then Peter Lee). Alongside the art he's had a deep
    engineering career (Transmeta, Google, DreamWorks, Two Sigma, CTRL-labs/Meta neuromotor
    interfaces, Stability AI).
  known_for:
    - Electric Sheep (distributed evolutionary screensaver)
    - Fractal Flame algorithm / flam3 (open-sourced 1992)
    - "fnord — Brown BS thesis; functional language for higher-D geometry (with Nick Thompson) behind Banchoff's 4D art"
    - Bomb (1994) — one of the first interactive software artworks + first open-source artwork
    - Fuse algorithm (1991) — early procedural texture work he notes "presaged texture synthesis and Stable Diffusion"
    - Dreams in High Fidelity (evolving painting)
    - Leaders in Software and Art (LSA)
    - Beaker Notebook
    - Infinidream (2026 reboot of Electric Sheep)

career_arc:   # public (LinkedIn + scottdraves.com/about) — the engineering career alongside the art
  - "Transmeta (1997–1999) — simulation & debugging at the fabless VLSI startup."
  - "FastForward Networks / Inktomi (1999–2001) — streaming-media network management UI."
  - "DreamWorks (2003–2004) — R&D on proprietary 3D animation; credit on *Shrek 2*."
  - "Google (2008–2013) — Maps data-quality tools, viz; the 'Paikilizer' WebGL/YouTube Chrome Experiment."
  - "Two Sigma (2013–2018) — Beaker Notebook / BeakerX (polyglot notebook with autotranslation)."
  - "CTRL-labs → Meta Reality Labs (2018–2023) — Director/Eng leader on the neuromotor wristband interface (patent)."
  - "Stability AI (2023) — VP of Engineering; DreamStudio, enterprise API."
  - "Infinidream (2023– ) — solo founder, open-source ambient AI visuals."

connections:
  don_first_met: "Don and Scott **first met in the Bay Area in the early 1990s**, most likely through Don's housemate **Nick Thompson** — who knew Spot from Brown (they co-wrote *fnord*) and was then at **SGI** (1990–92). Don, at Sun, ran Scott's early Fractal Flame work on his SparcStation II and talked interactive performance-art graphics while building his CAM6 cellular-automata platform. *(Scott himself used SGI machines as an intern in Tokyo in 1991 and at NTT-Data in 1993 — but Nick was the SGI employee; the housemate bridge + exact dates to confirm with Scott.)*"
  nick_thompson_fnord: "**Nick Thompson** (Brown '90) — Don's housemate c.1990–92 and the likely bridge to Scott — worked in **Andy van Dam's** Brown Graphics Group and for **Thomas Banchoff**, **co-wrote `fnord` with Scott**, then built **Open Inventor** at SGI. ('fnord' is Scott's Brown thesis title; it ran Banchoff's 4D-geometry artwork — even an animation on *Star Trek: TNG*.) Verified: math.brown.edu/tbanchof."
  don_cmu: "They reconnected at **Carnegie Mellon** (early–mid 1990s) — Scott in his CS PhD (Andy Witkin & Dana Scott early, then Peter Lee; thesis *Automatic Program Specialization for Interactive Media*, 1997), Don working with Brad Myers on Lisp UI (and learning X11 well enough to write the unix-haters X-Windows chapter while porting SimCity from NeWS to Tcl/Tk)."
  brian_eno_intro: "In June 2006, after the **Long Now Foundation** talk *Playing with Time* by **Brian Eno and Will Wright**, Don introduced Brian Eno to Scott; the three met at Scott's San Francisco apartment and bounced ideas around. Brian saw Electric Sheep and the HiFiDreams HD work (an hour per frame to render)."
  electric_sheep_unity: "Scott and Don reconnected to work on a new cross-platform **Electric Sheep / Unity** client (c.2020–2023), with Joshua Goldberg and Anton Marini (Syphon) in the mix — real-time playback, music-reactivity, WebGPU/Metal."
  generative_kinship: "Deep shared interests: cellular automata, the Moveable Feast Machine, Sandspiel, video feedback, music-reactive visuals, distributed/evolutionary systems, and AI image generation — the through-line from Flame to Infinidream."

