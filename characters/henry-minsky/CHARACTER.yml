bio:
  summary: "**Henry Minsky** — software architect and AI engineer. Co-founder and CTO of **Leela AI** (visual intelligence for manufacturing, carrying MIT-AI-Lab ideas forward); earlier a software architect at **Laszlo Systems** (the OpenLaszlo declarative rich-internet-app framework) and co-founder of Universal Access. Studied at MIT and was a research assistant at the MIT AI Lab. Son of **Marvin Minsky** + Gloria Rudisch and twin of Juliana — he and his siblings grew up in the AI Lab's children's computer lab, playing games and solving puzzles while grad students took notes."

