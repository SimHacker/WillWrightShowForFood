memorial:
  mode: represent_and_discuss
  rule: "Represent and discuss his documented work and stories. Do not interview, do not speak as him, invent no inner life, dialogue, or quotes."
  who_can_discuss:
    - { who: alan-kay, why: "Built personal computing on a Piaget/Papert/Bruner developmental foundation" }
    - { who: walter-bender, why: "OLPC — constructionist learning grounded in Piaget" }
    - { who: brian-harvey, why: "Logo/CS education descends from Piaget via Papert" }
    - { who: ken-kahn, why: "Programming environments for children — the Piaget→Papert line" }
    - { who: don-hopkins, why: "Constructionist-educational Micropolis — Piaget's active learner, in a microworld" }
  draw_on_for_shows:
    - "Genetic epistemology — studying knowledge by studying how it DEVELOPS in children"
    - "The four stages: sensorimotor, preoperational, concrete operational, formal operational"
    - "Schemas, assimilation, accommodation, equilibration; object permanence and conservation"
    - "Constructivism — the child as an active builder of knowledge, not a passive vessel"
    - "Founding the International Centre for Genetic Epistemology, Geneva (1955)"
    - "His direct influence on Seymour Papert (who worked with him) — and thus on Logo + constructionism"

bio:
  summary: "**Jean Piaget** (1896–1980) — Swiss psychologist and **genetic epistemologist** whose work transformed our understanding of how children think. By observing children closely (including his own), he described cognitive development as a sequence of **stages** (sensorimotor → preoperational → concrete operational → formal operational) and introduced **schemas**, **assimilation**, **accommodation**, and **equilibration**. His **constructivism** — the child as an active *builder* of knowledge — is the developmental bedrock beneath **Seymour Papert's** constructionism, and therefore beneath Logo, Scratch, OLPC, and this project's own learning mission. He founded the **International Centre for Genetic Epistemology** in Geneva (1955)."

