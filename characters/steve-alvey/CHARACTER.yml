  will_gallium: "Worked with **Will Wright** at **Gallium Studios** (the indie studio Will founded with Lauren Elliott; AI life-sim **Proxi**, built in Unity)."
  don_collab: "Don's longtime friend/collaborator — **SimProv Wedding Playset** (with Heather, SimBabes, others) and the first user of Don's **Micropolis content-management & publishing system** for his back-catalog + new content."

support:
