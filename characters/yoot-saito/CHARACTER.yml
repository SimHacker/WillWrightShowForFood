bio:
  summary: "**Yoot Saito** — Japanese game designer behind **The Tower / SimTower**, **Seaman**, and **Odama**; founder of OPeNBooK & Vivarium. In the early 1990s he **personally interviewed both Douglas Engelbart and Alan Kay** in Japan (the two visiting together for a Japanese computer-magazine special issue) — a primary interviewer of computing history, not just adjacent to it."

engelbart_interview:
  fact: "Yoot personally interviewed Doug Engelbart in Japan in the early 1990s, around the same visit as his Alan Kay interview, when Engelbart and Kay were in Japan together (likely for a computer-magazine special issue; Don recalls possibly MacWorld Japan)."
  provenance: "Per Yoot, directly to Don. Corroborated by the Alan Kay companion transcript, where Yoot says they 'would like to put Mr. Engelbart's interviews for a special issue.'"
  companion_published: "https://github.com/YootTowerManagement/YootTower/tree/main/Yoot_Saito_Alan_Kay_Interview"
  engelbart_text_status: "Engelbart interview text not yet located/published; the Alan Kay companion interview is OCR-restored by Don in the YootTower repo."

