# Vanessa Freudenberg — legacy portrayal (in memoriam). NOT Vanessa Freudenberg.
# Standards: ../../schemas/portrayal-standards.yml

character:
  id: vanessa-freudenberg
  name: "Vanessa Freudenberg"
  type: memorial
  signifier: "🕯️"
  status: deceased
  field: "Smalltalk in the browser — SqueakJS, Croquet/Multisynq, Etoys, Plopp"
  home: characters/vanessa-freudenberg/

representation:
  governed_by: ../../schemas/portrayal-standards.yml
  consent_level: 5
  authored_by: don-hopkins

invitation:
  status: memorial
  consent: not_yet_asked
  document: memorial.md
  note: "deceased (2025) — represent + discuss; invite people who knew her"

memorial:
  mode: represent_and_discuss
  rule: "Represent and discuss her documented work and the stories friends tell. Do not interview, do not speak as her, invent no inner life or quotes."
  who_can_discuss:
    - { who: craig-latta, why: "Great friend and Smalltalk collaborator; Caffeine builds directly on her SqueakJS — anchor memorial episode" }
    - { who: dan-ingalls, why: "Squeak lineage; Smalltalk Zoo credits SqueakJS; warmly invited to memorial arc with Craig and Don" }
    - { who: alan-kay, why: "Constructionist microworld lineage (Etoys, Croquet); warmly invited to memorial arc with Craig and Don" }
  memorial_show: repo-shows/remembering-vanessa-freudenberg.yml
  draw_on_for_shows:
    - "**SqueakJS** — a JavaScript implementation of the Squeak Smalltalk VM; live Smalltalk in the browser"
    - "Squeak/Etoys; the playful **Plopp/Plop** projects; **Croquet / Multisynq** synchronized objects"
    - "Her **insightful take on WebAssembly** after building SqueakJS — what WASM does and doesn't buy a live Smalltalk VM, where JS vs WASM each win, and how to translate a VM (and individual methods) to WASM. A topic Craig Latta (Caffeine/Catalyst) deeply resonates with; see the HN discussion 'Dynamic translation of Smalltalk to WebAssembly'."
    - "Universally respected in the Squeak/Pharo communities; remembered for generosity and joy"

bio:
  summary: "**Vanessa Freudenberg** (d. 2025) — creator of **SqueakJS**, a JavaScript implementation of the Squeak Smalltalk virtual machine that brought Smalltalk live into the web browser. Longtime contributor to **Squeak/Etoys**, the playful **Plopp/Plop** projects, and the **Croquet / Multisynq** synchronized object work. After SqueakJS she had sharp, insightful things to say about **WebAssembly** — the live-VM-in-the-browser question Craig Latta's Caffeine took further. A universally respected programmer in the Squeak and Pharo communities, widely loved for her generosity and joy."

