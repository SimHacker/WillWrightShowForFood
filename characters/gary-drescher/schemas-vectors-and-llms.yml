through_line: |
  One question runs through all three threads: how does an agent keep a usable model of the world and
  reason FORWARD in it? Drescher's answer (1991) was schemas learned from experience — but it stalled
  on symbol grounding. Vectors (hypervectors / Schema Networks) bought transfer and noise-tolerance
  but mostly assumed the ontology. NCAs show robust emergent structure but not deliberate planning.
  LLMs finally bring grounded meaning and commonsense — yet the car wash shows they default to the
  COMMON CASE instead of simulating a plan. The synthesis the thread circles: LLM grounding +
  schema-style forward prediction & pruning. That's the MOOLLM bet (see SimHacker/moollm
  skills/schema-mechanism — "Why LLMs Complete Drescher's Vision").

open_questions:                      # carry-forward fuel for the Repo Show
  - "Can an LLM be given a cheap, always-on 'predict-and-prune' loop (schemas) so planning beats the common case by default — without unscalable 'try harder' prompting?"
  - "Hardwired vs learned ontology: can an LLM LEARN Drescher's object/attribute carve-up instead of assuming it?"
  - "Is CatAttack distractibility the flip side of no world-state filter? (No one tells you what's material in the real world.)"
  - "Do NCAs (local view, async updates, self-repair) hint at training pressures that yield hierarchical abstraction?"
  - "Cost-aware schemas (Henry's 'MOOLAH'): track not just success but COST of an action in context."

show_hooks:
  - "The 200-foot car wash: common-case vs. plan — live, across models."
  - "Made-Up Minds, remade: LLM grounding + schema forward-prediction, built on Henry's Python schema factory."
  - "Hardwired vs learned ontology — Gary's one-sentence critique, 30 years on."
  - "Self-assembly & self-repair: NCAs next to schemas."

