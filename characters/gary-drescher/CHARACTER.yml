bio:
  summary: "**Gary Drescher** — AI researcher and philosopher. In **Made-Up Minds: A Constructivist Approach to Artificial Intelligence** (MIT Press, 1991) he built the **schema mechanism**: an agent that, like a Piagetian infant, learns from raw sensorimotor experience by discovering **schemas** (context → action → result), using **marginal attribution** to find reliable regularities and **synthetic items** to invent new concepts — constructivism, made to run. His later **Good and Real** (MIT Press, 2006) takes the same rigor to determinism, choice, and ethics (including acausal/subjunctive cooperation). An MIT AI Lab alumnus in the Minsky orbit."

connections:
  leela: "An adviser to Leela AI and a longtime friend of Henry Minsky."
  henry_python: "Henry Minsky has built a Python implementation of Drescher's schema mechanism (a 'schema factory') — a living substrate to build on."
  schema_lineage: "The through-line: Piaget's constructivism → Drescher's schema mechanism → Leela's Piaget-schema learning (Steve Kommrusch, Henry Minsky)."

