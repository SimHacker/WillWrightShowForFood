bio:
  summary: "**Gary Drescher** — AI researcher and philosopher. In **Made-Up Minds: A Constructivist Approach to Artificial Intelligence** (MIT Press, 1991) he built the **schema mechanism**: an agent that, like a Piagetian infant, learns from raw sensorimotor experience by discovering **schemas** (context → action → result), using **marginal attribution** to find reliable regularities and **synthetic items** to invent new concepts — constructivism, made to run. Developed as his **MIT PhD** work in Marvin Minsky's orbit — Minsky hailed it as a landmark in the foundations of theories of learning. His later **Good and Real** (MIT Press, 2006) takes the same rigor to determinism, choice, and ethics (including acausal/subjunctive cooperation)."

connections:
  leela: "Adviser to Leela AI and a longtime friend of Henry Minsky. Leela is one of the original old-school **constructivist / constructionist** AI companies — its approach is deeply rooted in Drescher's *Made-Up Minds*."
  henry_python: "Henry Minsky has built a Python implementation of Drescher's schema mechanism (a 'schema factory') — a living substrate to build on."
  schema_lineage: "The through-line: Piaget's constructivism → Drescher's schema mechanism → Leela's Piaget-schema learning (Steve Kommrusch, Henry Minsky)."
  neuro_symbolic: "The frame for a show together: Leela does **neuro-symbolic AI** — conscientiously combining 'scruffy'/symbolic and 'neat'/neural approaches (two independent-but-correlated axes). Neural vision models are powerful but **black boxes**; symbolic reasoning (schemas, frames, reversible inference) can answer **'why'**. Layered and synthesized, each reinforces the other and mitigates the other's weaknesses — Drescher's constructivist schema mechanism meeting modern deep learning. Deep hands-on experience; lots to talk about."
  llm_breakthrough: "The timely part — a whole new ballgame. Drescher's schema mechanism hit hard practical walls, above all the **symbol-grounding problem**: items were opaque tokens it had to correlate from scratch, with no world knowledge. **LLMs change everything** — they bring grounded meaning + commonsense, so schemas can reason about *why*, generalize, and plan instead of merely correlating, breaking through the walls that stalled real-world applications. MOOLLM unifies the two (see SimHacker/moollm `skills/schema-mechanism/` — 'Why LLMs Complete Drescher's Vision'; Henry Minsky's pyleela.brain schema factory). Exactly what Leela has hands-on with."

