memorial:
  mode: represent_and_discuss
  rule: "Represent and discuss his documented work and the stories friends tell. Do not interview, do not speak as him, invent no inner life or quotes."
  who_can_discuss:
    - { who: ted-nelson, why: "Hugh worked closely with Ted on Xanadu" }
    - { who: don-hopkins, why: "Hacked NeWS together (Grasshopper Group); dear friend" }
    - { who: john-gilmore, why: "Grasshopper Group; brought Hugh's ashes to Amsterdam (not a repo character — a name in the story)" }
  draw_on_for_shows:
    - "Project **Xanadu** with Ted Nelson — first seen at MIT 545 Tech Square in a winged Xanadu cap"
    - "Early **sysop of The WELL** (c. 1985) — one of the people who proved online community could have real heart"
    - "**GoodNeWS** — helped distribute the NeWS-based Macintosh-look-alike window manager (HyperCard-/MacDraw-like tools) that became HyperNeWS, and then Arthur van Hoff's **HyperLook** (the lineage SimCity later ran inside)"
    - "**NeWS** hacking with Don (Grasshopper Group, with John Gilmore)"
    - "Project manager of **FreeS/WAN** (John Gilmore's Linux IPsec project)"
    - "A natural social hub — last birthday: a fluorescent rice-crispy cake with glowing LEDs"
    - "Ashes scattered in the Amsterdam Jordaan (Brouwersgracht × Lijnbaansgracht); more planned for space"
    - "The Hugh + Ted + Don triangle — Xanadu / hypertext / NeWS lineage"

bio:
  summary: "**Hugh Daniel** (1962–2013) — hacker, evangelist, and irreplaceable social connector. He was an early **sysop of The WELL** (c. 1985), worked closely with **Ted Nelson on Project Xanadu**, helped distribute **GoodNeWS** (the NeWS-based Macintosh-look-alike that became HyperNeWS → van Hoff's **HyperLook**), hacked **NeWS** with Don Hopkins in the Grasshopper Group (with John Gilmore), and managed John Gilmore's **FreeS/WAN** Linux IPsec project. First spotted at MIT's 545 Tech Square in a winged Xanadu cap; remembered with a glowing LED rice-crispy cake and ashes scattered along an Amsterdam canal."

