gist: |
  Caitlyn Meeks-Ferragallo introduced Don to Philip Rosedale and Ryan Downe Karpf (High Fidelity /
  Second Life founders) for a C++ generalist role (Jan 2016). Don pitched Pantomime, Sims demos,
  Micropolis, StoryMaker, MediaGraph; recruiting replied US-only. Don became a **worklist.net**
  contractor (2017): **voting box** (#21257), **range-based text chat** (#21280) — Philip QA'd and
  approved; **Fancy Voting Box** was his favorite. Additional bids: doppleganger mirror, text
  entities, laser pointer, dodge ball, coin flip. Don compared HiFi's **JavaScript-everywhere /
  JSON message-passing** plugin model to UnityJS and Croquet in the Dan Ingalls thread (2021). Don and
  Philip **design-jammed** on Don's **VR diffusion-limited aggregation** simulation in HiFi (CAM6
  lineage). **High Fidelity** later wound down; Philip's focus returned to **Second Life**.

