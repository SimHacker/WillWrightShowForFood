bio:
  summary: |
    **Philip Rosedale** — co-founder of **Linden Lab** and creator of **Second Life**; co-founder of
    **High Fidelity** (open, distributed VR — historical chapter; platform later wound down). Built
    **worklist.net** — contractors shipping in-world JavaScript apps via **JSON message passing**.
    Don shipped voting box and text chat there (2017); Philip QA'd. Design-jammed with Don on **VR
    diffusion-limited aggregation** (CAM6 / DLA lineage) — Philip keen on **cellular automata** in
    worlds. Natural Repo Show partner for **MOOLLM**: **YAML Jazz** representation, **GitHub-as-MMORPG**
    workflows, LambdaMOO heritage, **Second Life avatar import/export** as character souls, and the
    **Dan Ingalls** live-object comparison arc.
  don_credit: |
    Philip ran a serious distributed-scripting platform and paid attention — QA on Don's voting box,
    "Fancy one is my favorite." Don never forgot the worklist era or the JSON plugin joy. They
    design-jammed on Don's **VR diffusion-limited aggregation** simulation in HiFi — Philip is
    genuinely into **cellular automata** as world substrate (Dave Ackley thread, 2017). **High
    Fidelity** later wound down; Philip's public focus returned to **Second Life** — where the
    user-created economy still lives.

