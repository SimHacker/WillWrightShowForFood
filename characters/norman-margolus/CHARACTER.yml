connections:
  cam6_kinship: "The direct link: Don built a **CAM6 emulator** — a CAM6-software-compatible (per the *Cellular Automata Machines* book) FORTH-programmable CAM orchestrator + lookup-table rule compiler on the Sun (NeWS + C), later ported widely. Norman & Toffoli's CAM-6 and book are literally the source Don's work follows."
  henry_minsky: "A good friend of **Henry Minsky** (MIT). Don met Norman a few years ago while visiting Henry in **Boston**, and they talked through exactly this web of ideas — cellular automata, reversible computing, the physics of computation. Henry is the natural bridge."
  mit_nexus: "MIT CSAIL; the Fredkin–Toffoli–Knight reversible-computing lineage — part of the broader MIT AI/CS nexus Henry connects into."
  generative_kinship: "Cellular automata as a shared language with Scott Draves (generative art) and Jim Crutchfield (edge of chaos, evolving CA)."

