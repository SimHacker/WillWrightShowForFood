bio:
  summary: "**Scott Adams** (b. 1952) pioneered the **microcomputer text adventure**. In 1978 he wrote **Adventureland** on a TRS-80 -- the first commercially sold text adventure for a home computer -- and founded **Adventure International**, one of the earliest game companies. His key invention was engineering, not just design: a compact, portable **data-driven adventure engine** -- each game stored as a *database* of rooms, items, and verb/noun *actions*, executed by a small interpreter/'driver' that was re-implemented per machine. That let one adventure ship across the TRS-80, Apple ][, Atari 8-bit, VIC-20, Commodore 64, and more, with a whole game squeezed into ~16K and a two-word (verb-noun) parser. Classic titles include **Pirate Adventure** (co-written with Alexis Adams), Secret Mission, Voodoo Castle, The Count, Strange Odyssey, Mystery Fun House, Pyramid of Doom, Ghost Town, and the licensed Marvel **Questprobe** series (Hulk, Spider-Man). His engine and games shaped the entire adventure genre."

  don_connection: |
    Scott Adams' "compile the adventure to portable DATA + a tiny VM" architecture is the direct
    ancestor of Don's ADVENTURE COMPILER idea and of Don's Terrapin **Logo Adventure** (Logo REPL
    as parser). Reconnected via HN (thread 29330901); Jan 2026 Scott on MOOLLM: "sucked me in,"
    "tremendous potential." Parallel projects: Scott's biography (NotebookLM + Gemini over
    thousands of emails/interviews) structured as **mini-adventures on webpages** — play to unlock
    narrative — and he is "also thinking about MOOLLM." Don builds adventure-compiler tooling
    Scott can use; ideal Repo Show guest.
    provenance: VERIFIED via Don correspondence (Jan-Feb 2026). Confirm before broadcast quotes.

