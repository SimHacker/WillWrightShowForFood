# Tight public-safe digest. NOT the full private thread.
# Standards: ../../schemas/portrayal-standards.yml

meta:
  with: heinz-lemke
  curated_by: don-hopkins
  consent: not_yet_asked
  span: "~2020–present"
  provenance_private: SimHacker/DonHopkins/characters/don-hopkins/correspondence/heinz-lemke.yml

gist: |
  Don found Heinz through Bill Buxton's research trail. Warm, long-running exchange: PIXIE paper
  and 1969 film (Cambridge Univ Library digitization via David Chapman), Don's *Flight of the PIXIE*
  homage edit (Bumblebee score; pie menus as rapid flight — not Don's paper or original film), CARS congress and model-guided medicine, Will Wright modelling talk, YouTube captioning
  workflow for Heinz's conferences, Black Forest farmhouse (Bechtersbohl), Mario Cypko patient-
  modelling video in the barn. CARS 2025 Berlin workshop proposal on game thinking for healthcare
  interfaces. Don wants CHM oral history for Heinz while first-hand memory remains.

threads:
  chapman_cambridge_films:
    what: |
      David Chapman (Cambridge Univ Library Reference) tracked two PIXIE films via Rainbow group,
      coordinated digitisation (ref #91692), published July 2019. Without this, Don could not
      have made *Flight of the PIXIE* (Bumblebee edit). Buxton had promised digitization for years
      but never delivered to Don.
    doc: cambridge-films-flight-of-the-bumblebee.md
    export_msgs: ["msg-403", "msg-407", "msg-409", "msg-410", "msg-413", "msg-414"]
  pixie_history:
    what: "1969 PIXIE paper + film; Wiseman/Hiles co-authors; radial menus on PDP-7"
  flight_of_pixie:
    what: "Don's Yuja Wang Bumblebee score edit — highlights of Chapman's digitized films"
    production: will-wright/sources/don-youtube-jDrqR9XssJI-flight-of-pixie/production-notes.md
  rosenthal_same_pdp7:
    what: |
      David Rosenthal Cambridge undergrad ~1970 on same PDP-7/340 + Titan; met Wiseman;
      Don proposed DSHR interview Heinz for CHM. Line to NeWS/X11/Andrew.
    export_msgs: ["msg-408"]
    doc: cambridge-films-flight-of-the-bumblebee.md
    character: ../david-rosenthal/
  electronics_magazine_1969:
    what: |
      McGraw-Hill Electronics (Apr 28 1969) PIXIE article; Gilmore scan; Heinz photo at PDP-7.
      Ask Heinz: US research-lab trip story behind the magazine piece.
    export_msgs: ["msg-384", "msg-385", "msg-393"]
    pull_in: pull-in-gaps.yml#electronics_magazine_1969_pdf
