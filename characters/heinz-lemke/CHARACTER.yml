bio:
  summary: |
    **Heinz U. Lemke** — co-author of **PIXIE: A New Approach to Graphical Man-Machine
    Communication** (1969 CAD Conference; with Neil E. Wiseman and John O. Hiles). PhD on the
    PIXIE user interface. Retired Professor of Computer Graphics and Computer Assisted Medicine,
    TU Berlin. Founder/chair of **CARS** (Computer Assisted Radiology and Surgery); model-guided
    medicine and patient-specific modelling. Lives in the Black Forest (Bechtersbohl). Don's warm
    correspondence since ~2020; Flight of the PIXIE film edit; CARS workshop proposals.

