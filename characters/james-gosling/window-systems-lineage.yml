gosling_papers:
  sundew:
    title: "SunDew — A Distributed and Extensible Window System"
    note: "Renamed NeWS; programmable WM — cited in Alvey architecture WG discussions"
    venue: "Alvey Workshop (1985); *The NeWS Book* (1989)"
  andrew_window_manager:
    title: "A Window Manager for Bitmapped Displays and Unix"
    coauthor: david-rosenthal
    venue: "Same Alvey workshop; CACM *Andrew* paper (March 1986)"

