through_line: |
  **Andrew (CMU) → SunDew → NeWS** — PostScript-programmable, network-transparent windows.
  At the **1985 Alvey Methodology of Window Management** workshop, Gosling published **SunDew**
  (NeWS precursor) and co-authored the **Andrew window manager** paper with **David Rosenthal**
  — same proceedings as **Warren Teitelman's** ten-year retrospective. Both **published and
  participated** in the architecture working-group discussions that shaped window-system vocabulary
  and UK MMI planning.

