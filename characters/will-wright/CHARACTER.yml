bio:
  born: 1960
  summary: |
    Co-founded Maxis; created SimCity and The Sims; pioneered microworlds, emergent
    simulation, and player-as-storyteller design. Public figure — portrayal draws on
    documented talks, games, and press; no impersonation.
  known_for:
    - SimCity
    - The Sims
    - Spore
    - Proxi
    - Dollhouse
    - microworlds
    - data portability
    - Stupid Fun Club
  relation_to_show: |
    First invited Repo Show guest — topic-less kickoff orbiting the 1996 Stanford
    Winograd talk (Dollhouse preview). Crown jewel thread: data portability.

