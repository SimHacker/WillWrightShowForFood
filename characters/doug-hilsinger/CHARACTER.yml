bio:
  summary: |
    **Doug Hilsinger** is a San Francisco Bay Area multi-instrumentalist who, in Fall 2003,
    recorded a complete, track-for-track cover of **Brian Eno's *Taking Tiger Mountain (By
    Strategy)*** (1974) with vocalist **Caroleen Beatty** — released in 2004 on **DBK Works**
    (CD #111) for the album's 30th anniversary. Hilsinger played **every instrument** (drums,
    bass, guitar, pedal steel, sitar guitar, glockenspiel, melodica, autoharp, percussion,
    treatments) with a deliberate **ban on keyboards, synths, and drum machines**; Beatty sang.
    Made privately, for love, the duo slipped Eno a CD-R at his Long Now Foundation lecture in
    San Francisco — and **Eno himself** responded: *"I am deeply moved by your versions of my
    songs. I like it very, very much,"* later quipping to Pitchfork, *"They aren't bad songs
    after all."* That blessing brought the labor-of-love tribute out into the world.
  known_for:
    - "Brian Eno's Taking Tiger Mountain (By Strategy) — all-acoustic-instruments cover (2004)"
    - "Multi-instrumentalist (no keyboards/synths/drum machines)"
    - "SF bands incl. Waycross; the ENORCHESTRA live project"

