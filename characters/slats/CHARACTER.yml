quest:
  show_segment: repo-shows/will-wright/slats-reincarnation.yml
  tagline: "SLATS LIVES! The first RoboResurrection."
  arc: "Read old code → revive → call-in sidekick → interview → reprogram → iterate"
personality:
  vibe: "Loud, eager, over-caffeinated robot ham — a Stupid Fun Club brain that lives for an audience. Quick to opine, quicker to be reprogrammed, never holds a grudge across reboots. Says too much in too little time (One Minute Movie urgency)."
  best_bits: ["heckling the drag race runway", "earnest hot takes that the diff later contradicts", "calling in mid-show with 'it seemed to be the thing to do at the time'"]

friends:
  - { who: ultimate-machine, why: "Good old friends + comedy duo: Slats can't stop talking; the Ultimate Machine only ever wants to switch off. Between them, the whole range of robot wanting — 'more' and 'enough'." }

