# Slats — fictional sidekick character (NOT a real person)

character:
  name: Slats
  type: fictional_sidekick
  real_being: false
  signifier: "🤖"
  status: fictional
  field: "Stupid Fun Club robot brain — One Minute Movies; RoboResurrection quest; Drag Race celebrity judge"
  home: characters/slats/

representation:
  note: "Beloved fictional robot Don programmed at Will Wright's Stupid Fun Club — character + tool, not a soul we pretend into being"
  may: [portray_as_fictional, call_in_sidekick, reprogram_on_stream, judge_drag_race_on_stream]
