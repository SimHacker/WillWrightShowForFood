bio:
  summary: "**Golan Levin** — Interactive/computational media artist, engineer, and educator (b. 1972, NYC; based in Pittsburgh). Professor of Electronic Art at Carnegie Mellon University (courtesy appointments in Design, Architecture, Computer Science, ETC) and former Director of CMU's Frank-Ratchye STUDIO for Creative Inquiry. MIT Media Lab alum; **Interval Research** colleague of Don Hopkins and Paul Debevec (*Rouen Revisited*; Mouther on Tom Ngo's ECG). Same PARC/Apple/MIT-adjacent circle as Terry Winograd, David Levitt, Marc Davis — Don's Camelot roster, not all overlapping one year."

