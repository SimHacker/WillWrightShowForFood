# REPO-SHOWS.yml — metadata for this repo-show COLLECTION
#
# Declares that EVERY file and directory in this collection is an instance of the
# repo-show skill (/skills/repo-show). "Self all the way down": seeds, planted
# instances, and the artifacts inside them are all repo-show objects.
#
# Naming: this collection follows MOOLLM conventions — a collection directory
# (repo-shows/) with an UPPERCASE manifest (REPO-SHOWS.yml) naming the skill it
# instantiates. "repo-show" is the brand (specific, viralizable); "show" alone is
# too generic an ambiguous noun/verb.

collection:
  name: micropolis-moollm-repo-shows
  of: Micropolis Class
  instance_of: repo-show          # the skill every member instantiates
  status: seeding                 # most shows are still seeds (single files)
  last_reviewed: 2026-06-26

# IMPLICIT INHERITANCE — the key declaration
inherits_from:
  skill: repo-show
  path: ../skills/repo-show
  mode: implicit
  declaration: |
    EVERY file and directory in this collection (repo-shows/) IS AN INSTANCE of the
    repo-show skill — IMPLICITLY, with no per-file declaration required. A seed
    (single <name>.yml) is a repo-show; a planted <name>/ directory is a repo-show;
    each numbered artifact inside inherits the instance's discipline. A file MAY
    explicitly override its parent if needed. The coherence-engine TENDS implicit
    declarations toward explicit over time, but implicit parenthood is fully
    supported by default.
  self_all_the_way_down: "Seeds are repo-shows. Planted instances are repo-shows. Artifacts within inherit the instance's discipline. Repo-shows all the way down."

# SEED vs PLANTED
states:
  seed: "A single <name>.yml file = a whole show in miniature. Most entries here are seeds."
  planted: "A <big-endian-name>/ directory cloned from the templates; the seed stays beside it, kept synced (RESEED)."
planted_shows:
  will-wright/: "★ First planted show. Topic-less kickoff with Will Wright (Will IS the topic; topical shows flow from it). Seed: will-wright-series.yml."
  steve-wozniak/: "Topic-less kickoff with Steve Wozniak. Apple II, 6502, open hardware, and browser-based emulators."
  terry-winograd/: "★ Forebear show. Terry Winograd (the dragon) + the CS547 treasure trove archive. Stands on his shoulders and the shoulders of all his guests (Will 1996, Gosling 1995, Joy Mountford 1994, etc.). Archive recovery, runnable seeds, Micropolis Class, Connections series. (Pie menus = Don's own thread.)"
naming: "Planted directories use symbolic BIG-ENDIAN names (category-first) for coherent browsing. Seeds may be renamed to big-endian when planted."

templates:
  - _TEMPLATE.yml             # the seed/instance template

