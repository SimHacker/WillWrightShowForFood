# TicketPR — questions for this show
# Required for every TicketPR. Pairs with MOOLLM stack — see CHARACTER.md
# Spec: ../../../process/ticket-pr.yml · Tree schema: ../../../schemas/question-tree.yml

ticket:
  show: "<show-slug>"
  github: "@YOUR-GITHUB-USERNAME"
  attend_live: true
  merged: false
  submitted: YYYY-MM-DD

character_ref: CHARACTER.yml

relationship: |
  One line — big fan | first-time caller | your game changed my life | here's my story | …

# questions.yml = sparse orchestration tree (SSOT for the show). Optional `ref` per node points
# at one GitHub issue or comment (any repo). `children` are sub-questions — same schema.

# SIMLISH (optional): questions in ENGLISH (thoughts). Simlish is SPOKEN live by Don Philahue.
# speaks: simlish
# simlish_voice: "Sul sul!"

questions:
  # --- no ref — pure YAML orchestration ---
  - id: 1
    to: will-wright
    status: open
    question: "Question for air — no GitHub attachment required"

  # --- ref → whole issue (cross-repo OK) ---
  - id: 2
    to: will-wright
    status: open
    question: "Your framing in this character's voice — may differ from issue title"
    ref:
      repo: SimHacker/WillWrightShowForFood
      # issue: 42
    children:
      - question: "Cherry-pick this reply for air"
        to: will-wright
        ref:
          repo: SimHacker/WillWrightShowForFood
          issue: 42
          # comment: 9876543210

  # --- legacy shorthand ---
  - id: 3
    to: any
    status: open
    question: "Open floor"
    # issue: https://github.com/SimHacker/WillWrightShowForFood/issues/NNN

comments_for_guest: |
  Appreciation, context, homefun branch, rig declaration (see ../../../rigs/).
  Persistent discussion: open a GitHub issue (any repo), comment there, attach `ref` in this tree.

homefun:
  branch: null
  pr: null

costume_ref: costume.yml

meta:
  moollm_stack:
    - CHARACTER.yml
    - CARD.yml
    - GLANCE.yml
    - SIMULATION.yml
  question_tree_schema: ../../../schemas/question-tree.yml
