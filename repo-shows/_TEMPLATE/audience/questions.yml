# TicketPR — questions for this show
# Required for every TicketPR. Pairs with MOOLLM stack — see CHARACTER.md
# Spec: ../../../process/ticket-pr.yml · Tree schema: ../../../schemas/question-tree.yml

ticket:
  show: "<show-slug>"
  github: "@YOUR-GITHUB-USERNAME"
  attend_live: true
  merged: false
  submitted: YYYY-MM-DD

character_ref: CHARACTER.yml

relationship: |
  One line — big fan | first-time caller | your game changed my life | here's my story | …

# questions.yml = sparse orchestration tree (SSOT).
# Optional `repo_pointer` (whole repo/namespace) and `discussion` (issue + comment) — separate.
# Optional `context_lasers:` — many pointers at files, dirs, lines, anchors, MOOLLM facets.

# SIMLISH (optional): questions in ENGLISH (thoughts). Simlish is SPOKEN live by Don Philahue.
# speaks: simlish
# simlish_voice: "Sul sul!"

questions:
  # --- no ref — pure YAML orchestration ---
  - id: 1
    to: will-wright
    status: open
    question: "Question for air — no GitHub attachment required"

  # --- discussion → issue thread (cross-repo OK); legacy `ref` normalizes here ---
  - id: 2
    to: will-wright
    status: open
    question: "Your framing in this character's voice — may differ from issue title"
    discussion:
      repo: SimHacker/WillWrightShowForFood
      # issue: 42
    children:
      - question: "Cherry-pick this reply for air"
        to: will-wright
        discussion:
          repo: SimHacker/WillWrightShowForFood
          issue: 42
          # comment: 9876543210

  # --- repo_pointer → whole repo or namespace (no issue required) ---
  - id: 5
    to: will-wright
    status: open
    question: "About the pub arcade — module pointer, no issue yet"
    repo_pointer:
      repo: SimHacker/moollm
      path: examples/adventure-4/pub/arcade
      label: "Gezelligheid Grotto arcade alcove"

  # --- context_lasers — typed arrays (directory = whole object; interface = one facet) ---
  - id: 4
    to: will-wright
    status: open
    question: "About the whole room vs one interface facet"
    context_lasers:
      directory:
        - url: https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/characters/animals/monkey-palm
          label: "Whole character object"
      interface:
        - repo: SimHacker/moollm
          path: examples/adventure-4/characters/animals/monkey-palm
          interface: CARD
          facet: methods.PHILOSOPHIZE
      file:
        - https://github.com/SimHacker/moollm/blob/main/examples/adventure-4/pub/stage/palm-nook/study/palm-on-being-palm.md
      line:
        - url: https://github.com/SimHacker/moollm/blob/main/examples/adventure-4/pub/stage/palm-nook/study/palm-on-being-palm.md#L1-L40
          label: "Opening lines only"

  # --- legacy shorthand ---
  - id: 3
    to: any
    status: open
    question: "Open floor"
    # issue: https://github.com/SimHacker/WillWrightShowForFood/issues/NNN

comments_for_guest: |
  Appreciation, context, homefun branch, rig declaration (see ../../../rigs/).
  Persistent discussion: open a GitHub issue (any repo), comment there, attach `discussion` on a node.
  Point at whole repos with `repo_pointer` — separate from where the thread lives.

homefun:
  branch: null
  pr: null

costume_ref: costume.yml

meta:
  moollm_stack:
    - CHARACTER.yml
    - CARD.yml
    - GLANCE.yml
    - SIMULATION.yml
  question_tree_schema: ../../../schemas/question-tree.yml
