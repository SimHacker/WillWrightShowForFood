# TicketPR — questions for this show
# Required for every TicketPR. Pairs with MOOLLM stack — see CHARACTER.md
# Spec: ../../../process/ticket-pr.yml · Tree schema: ../../../schemas/question-tree.yml

ticket:
  show: "<show-slug>"
  github: "@YOUR-GITHUB-USERNAME"
  attend_live: true
  merged: false
  submitted: YYYY-MM-DD

character_ref: CHARACTER.yml

relationship: |
  One line — big fan | first-time caller | your game changed my life | here's my story | …

# queues:
#   output: this file — questions you want asked (root list below)
#   input:  optional inbound.yml — @mentions; replies usually live as children on asker's tree

# SIMLISH (optional, Sims characters): write questions in ENGLISH — they're thoughts (direct
# perception). Simlish is SPOKEN, rendered live by Don Philahue. Add one `simlish_voice`
# catchphrase below if you want a signature spoken phrase. Don't write whole questions in
# Simlish — it ruins readability and the joke. Schema: ../../../schemas/language-simlish.yml
# speaks: simlish
# simlish_voice: "Sul sul!"

questions:
  - id: 1
    to: will-wright
    status: open
    text: "Question you want asked on air (guest can read this before accepting the invite)"
    children: []
    # After air — append under children (see question-tree.yml):
    # - kind: answer
    #   by: will-wright
    #   at: 2026-07-01T20:00:00Z
    #   on_air: true
    #   text: "Guest's answer, committed when spoken or shortly after."
    #   children:
    #     - kind: me_too
    #       by: fictional-bella-goth
    #       text: "Mortimer asks this every loading screen."
    #     - kind: follow_up
    #       by: "@YOUR-GITHUB-USERNAME"
    #       text: "Thanks — one more thing…"

  - id: 2
    to: any
    status: open
    text: "Open-floor question — any guest or audience expert may answer in your thread"
    children: []

comments_for_guest: |
  Appreciation, context, link to homefun branch, rig declaration (see ../../../rigs/).

homefun:
  branch: null
  pr: null

costume_ref: costume.yml

meta:
  moollm_stack:
    - CHARACTER.yml
    - CARD.yml
    - GLANCE.yml
    - SIMULATION.yml
  question_tree_schema: ../../../schemas/question-tree.yml
