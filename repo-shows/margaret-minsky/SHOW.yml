  first_wired_family: "Daughter of Marvin Minsky; had her own net address at 14 (1971), a terminal at home before video displays existed. Living memory of the AI Lab as a household."
  logo_and_education: "Atari Cambridge Research / education + Logo history; a warm 'Memory Lane' correspondence with Don."

