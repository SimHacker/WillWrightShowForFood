# Walter Bender — OLPC Stone Soup + open-sourcing SimCity

*Show seed — constructionist education, Sugar, EA GPL negotiation.*

## Why Walter

- OLPC President (Software & Content) when **SimCity → Micropolis** was negotiated  
- Offered **Eben Moglen** to help EA relicense under GPL  
- Sugar stack (Python, Cairo, Pango, mesh, journaling) — Don's Dec 2006 roadmap partner  
- Stone Soup / Constructionist learning — bridge to Papert memorial shows

