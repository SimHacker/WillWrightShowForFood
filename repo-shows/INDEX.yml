# SIMOPOLIS HUB — the architecture under every bridge (hub-and-spoke; "fly through Atlanta")
bridges_architecture:
  hub: "Simopolis is the HUB that all bridges lead to — a git-checked-in store holding many facets of each character in high-fidelity, round-trippable data."
  spokes: "Each game bridges to/from Simopolis (a spoke). 'Proxi <-> Sims' really means Proxi <-> Simopolis <-> Sims; any game-to-game path routes THROUGH the hub. Hub-and-spoke — like flying through Atlanta."
  player_layer: "At a higher level, players define syncing workflows, constraints, and transformations between games and the hub (and onward to other games)."
  decoupling: "In principle a game need not know about any other game — only how to round-trip its own facets with Simopolis. In practice a game MAY look for specific data it recognizes from a compatible game and special-case importing it."
  phasing:
    - "1. Generic hub/spoke first — every game round-trips cleanly with Simopolis."
    - "2. Then shortcut optimizations + mutual schema recognition between compatible games (direct fast paths, special-cased imports)."
  note: "So the bridge seeds below are all spokes on this hub; the ⇔ in each is shorthand for ⇔ Simopolis ⇔."
  the_frame: "The deep frame for all of this is biological: ../process/character-endosymbiosis.yml (games as cells, content as organelles in permeable membranes, Simopolis as the shared cytoplasm, schema mapping as currency exchange). Life builds complexity by merger — so do we."

axes_note: "A person appears in multiple shows (solo + group + bridge). Will especially anchors several. The collection holds multiple FORMATS: design-interview, series, group, bridge, game-show, and REUNION ('get the old band back together' — see ../process/old-band-back-together.yml: NeWS gang, Sims team, David Levitt crew, OpenLaszlo, the 2006 Eno circle)."

