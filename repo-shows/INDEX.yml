# SHOWS — one document per show proposal
#
# Each show is a streamed conversation that FOLLOWS THROUGH to implementation
# (Micropolis Class methodology). Two axes:
#   solo:  one person × one topic (a person can do SEVERAL shows on different
#          topics — especially Will Wright).
#   group: multiple people × one topic.
#
# Add a show: copy _TEMPLATE.yml → <slug>.yml, fill it in, list it here.
# Roster + consent: ../process/collaborators.yml. Method: ../process/design-in-public.yml.

meta:
  status: proposals
  last_reviewed: 2026-06-25
  standard_shape: "Per episode: (1) explain WHY the design works, (2) implement it from scratch with MOOLLM + Cursor."
  github_native: "Each show's durable artifact is a PUBLIC GitHub repo: participants upload + review beforehand, edit live, viewers file HN-style discussion issues in real time. See ../process/design-in-public.yml github_native."

