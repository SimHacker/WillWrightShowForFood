# SHOW PROPOSAL — PIXIE Pie Menus on the PDP-7 (Don and buds interview Heinz U. Lemke)
# The deep prehistory of pie/radial menus. PDP-7 + Type 340 display ↔ Titan.

show:
  id: pixie-pie-menus-pdp7
  title: "PIXIE: Pie Menus on the PDP-7 (1969)"
  type: group
  host: Don Hopkins
  dialect:
    voice: stoner_techno_hippie
    terms:
      guest: bud
      guests: buds
      co_guest: co-bud
    on_air_opener: "This show's buds are…"
    voice_ref: characters/don-hopkins/portrayal/voice.yml
    note: "User Interface Flower Child host voice — warm, deadpan, never corporate 'guest panel'."
  guests: ["Heinz U. Lemke", "Lars Brinkhoff", "David S. H. Rosenthal"]
  buds: ["Heinz U. Lemke", "Lars Brinkhoff", "David S. H. Rosenthal"]
  bud_roles: &bud_roles
    heinz_u_lemke: "First-hand PIXIE history — Cambridge lab, 1969 film, light pen, Titan link, CARS arc"
    lars_brinkhoff: "PDP-7 + Type 340 display hardware; preservation and emulation — make PIXIE runnable again today"
    david_s_h_rosenthal: "Same Cambridge PDP-7/340 + Titan stack ~1970; met Wiseman; distributed GUI → NeWS/X11 lineage; LOCKSS preservation"
  guest_roles: *bud_roles
  character: characters/heinz-lemke/
  co_characters:
    - characters/lars-brinkhoff/
    - characters/david-rosenthal/
  topic: "PIXIE — radial/pie menus on PDP-7/Titan (Heinz bud) + same-machine memory (DSHR bud) + emulating the iron (Lars bud)."
  status: proposed
  urgency: "Preserve first-hand history while we can; warm correspondence with Heinz."

buds:
  opener: |
    This show's buds are: Heinz U. Lemke, who drew the first radial menus on a PDP-7 before
    most of us were born; Lars Brinkhoff, who makes dead iron boot again; and David S. H.
    Rosenthal, who sat at the same Cambridge stack a year later and went on to wire the world.
  introductions:
    heinz_u_lemke:
      name: "Heinz U. Lemke"
      signifier: "🥧"
      slug: heinz-lemke
      one_liner: |
        First bud — PIXIE co-author, light pen, Titan link, *in* the 1969 film. Black Forest
        farmhouse correspondence; CARS and model-guided medicine today. Neil Wiseman and John
        Hiles through his voice.
      invite: characters/heinz-lemke/invitation.md
    lars_brinkhoff:
      name: "Lars Brinkhoff"
      signifier: "🖥️"
      slug: lars-brinkhoff
      one_liner: |
        Second bud — Gothenburg preservation hacker. PDP-10/ITS from source; SIMH toolchain;
        maps Type 340 vector display + light pen so radial menus run on stream, not just in
        telecine archaeology.
      invite: characters/lars-brinkhoff/invitation.md
    david_s_h_rosenthal:
      name: "David S. H. Rosenthal"
      signifier: "🗄️"
      slug: david-rosenthal
      one_liner: |
        Third bud — Cambridge ~1970 on the same PDP-7/340 + Titan; met Wiseman. Built NeWS with
        Gosling *and* architected X11. LOCKSS: lots of copies keep stuff safe — films, papers,
        emulators, one preservation story.
      invite: characters/david-rosenthal/invitation.md
  segment: introductions
  order: [heinz_u_lemke, lars_brinkhoff, david_s_h_rosenthal]
  telecine_slate: "Cambridge jiggle lower-third — bud name + signifier on each intro"

history:
  hardware: "PDP-7 + Type 340 display (graphics satellite) ↔ Titan (Cambridge Multiple Access System)"
  distributed_cad: "Rainbow group; interactive drawing on PDP-7, application/analysis on Titan over Wiseman's high-speed link"
  paper: "PIXIE: A New Approach to Graphical Man-Machine Communication. Proc. 1969 CAD Conference, Southampton. IEEE Conf. Pub. 51, pp. 463–471."
  authors: ["Neil E. Wiseman", "Heinz U. Lemke", "John O. Hiles"]
  film: "1969 film demonstrating an early GUI, made to accompany the PIXIE paper."
  archive: "David Chapman, Cambridge University Library — tracked Rainbow-group copies, coordinated digitisation (2019)."
  flight_of_pixie: "Don's Bumblebee edit — only possible after Chapman published the digitized films."
  youtube: "https://www.youtube.com/watch?v=jDrqR9XssJI"
  evidence_room: characters/heinz-lemke/cambridge-films-flight-of-the-bumblebee.md
  type_340_manual: "http://bitsavers.trailing-edge.com/pdf/dec/graphics/7-13_340_Display_Programming_Manual.pdf"
  living_pdp7_340: "https://www.youtube.com/watch?v=V4oRHv-Svwc"

why_these_buds:
  lars_brinkhoff:
    preservation: "PDP-10/ITS restoration lead; SIMH toolchain hacker; make-it-so on stream."
    pixie_fit: "Maps Type 340 vector display + light pen to emulators we can ship in the repo."
    segment_goal: "Boot PDP-7/340 (or closest faithful rig); demo radial menus runnable today."
  david_rosenthal:
    cambridge: "Undergrad ~1970 on same PDP-7/340 + Titan; met Wiseman; saw PIXIE-era demos."
    lineage: "PIXIE distributed GUI → Andrew → NeWS → X11/ICCCM — rare witness to both sides of the window-system wars."
    preservation: "LOCKSS chief scientist — films, papers, and runnable emulators as one preservation story."
    chm_hook: "Don proposed DSHR interview Heinz for Computer History Museum oral history."

interview_center:
  chapman_films_bumblebee:
    ask: "What was it like when the 1969 films surfaced again? Who is in the footage? How did the light pen + radial menus feel?"
    doc: characters/heinz-lemke/cambridge-films-flight-of-the-bumblebee.md
  rosenthal_cambridge_pdp7:
    ask: "Heinz + David Rosenthal — same machine, different years. What did the lab feel like? What carried into NeWS and X11?"
    with: characters/david-rosenthal/
    prompts:
      - "Heinz programmed PIXIE; DSHR arrived ~1970 — overlap in hardware, different projects"
      - "Wiseman from two perspectives"
      - "Distributed graphics satellite + Titan link as ancestor of networked window systems"
  neil_wiseman:
    ask: "What was Neil E. Wiseman like to work with — technically, personally, and as a research leader?"
  cambridge_zeitgeist:
    ask: "What was the Cambridge computer graphics / CAD / HCI zeitgeist in the late 1960s?"
  engelbart_demo_zeitgeist:
    ask: "1968 Mother of All Demos ↔ 1969 PIXIE film — same light-pen era, different labs. What did Heinz see on the US trip? Demo culture vs distributed CAD?"
    doc: characters/douglas-engelbart/GLANCE.md
    memorial: "Discuss Engelbart in memorial mode — never interview"
    sponsor_gag: repo-shows/ideas/gags/cambridge-gag-credits.yml#light_pen_bureau_sponsor
  us_research_labs_trip:
    ask: "What was Heinz's trip to the US research labs like, and what did he see there?"
  medical_automation_today:
    ask: "How does Heinz see the line from early graphical interaction/CAD to his later medical-computing work?"
    bridge: "PIXIE was graphical man-machine communication for design; CARS is model-guided human-computer assistance in medicine."
  lars_pdp7_type340_emulation:
    ask: "What did the PDP-7 + Type 340 + light pen actually do — and how do we emulate it faithfully today?"
    with: characters/lars-brinkhoff/
    prompts:
      - "Walk the Type 340 Display Programming Manual — vector refresh, display list, pen hits"
      - "SIMH / simh.org / community paths to a bootable PDP-7 with 340 option"
      - "Living hardware vs emulator — Munching Squares on PDP-7/340; what transfers to PIXIE"
      - "Titan link as distributed CAD — emulate graphics satellite first, batch link later?"
      - "Make-it-so deliverable: rig yaml + SETUP.md forkable from repo-shows/lars-brinkhoff/"
    homefun: "Boot closest faithful stack; one radial-menu interaction captured on stream"

format:
  live: true
  audience_qa: true
  production_style: "Relaxed Studio Session (recorded video call) or Live Twitch Event."
  notes: "Open with buds introductions (telecine slates). Heinz bud leads history; DSHR bud holds Cambridge ~1970 + lineage; Lars bud leads emulation. Intercut 1969 film + live emulator. Honor Wiseman and Hiles."
  segment_order_suggestion: [introductions, heinz_history, rosenthal_same_machine, lars_emulation, heinz_cars, open_qa]
  post_production:
    look: cambridge_telecine_jiggle
    spec: process/post-production/cambridge-telecine-jiggle.yml
    pipeline: characters/will-wright/sources/don-youtube-jDrqR9XssJI-flight-of-pixie/production-notes.md
    what: |
      After Effects — reuse the exact motion track + blur/glow from Don's *Flight of the PIXIE*
      Bumblebee edit on Repo Show titles, credits, bud slates, segment cards, jokes, and
      dedication blocks. Match Chapman digitized 1969 film jiggle so packaging looks like the
      same old Cambridge University reel as the archival inserts.
    applies_to: [opening_title, bud_slates, introductions, segment_cards, lower_thirds, jokes, dedication, end_credits, gag_credits]
    gag_credits: repo-shows/ideas/gags/cambridge-gag-credits.yml
    gag_credits_anchor: "Department of Research Simulation"
    consulting: Ground Up Software
    sponsor_spot:
      id: light_pen_bureau_sponsor
      after: "Computing Laboratory — Light Pen Bureau"
      opener: "And now, a word from our sponsors."
      url: https://lightpenisland.net/
      url_repeat: "I repeat, lightpenisland.net. Surf carefully."
      spec: repo-shows/ideas/gags/cambridge-gag-credits.yml#light_pen_bureau_sponsor

