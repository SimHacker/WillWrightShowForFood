comic_register:
  surface: |
    **Straight-faced normalcy** — deadpan late-web custom pen shop, serif caps, wood specialty,
    real products, brother site to penisland.net. Every line defensible as literal *light pen* copy.
    Played like a genuine sponsor film insert or family catalog. Never break character on air.
  under_the_surface: |
    Just below the surface: a **running penis gag** (infamous domain parsing) — *lightpenisland.net*
    spoken as one word invites the ear to hear another famous pen-shop domain. Same energy as the
    opening of *Austin Powers: The Spy Who Shagged Me* — ostensibly respectable credits and copy,
    absurd subtext for anyone listening with one ear tuned to parsing. The joke runs; the face stays straight.
  delivery_references:
    - "Austin Powers: The Spy Who Shagged Me — opening credits; respectable surface, running subtext"
    - "Half-Life propaganda videos — Breencasts / Combine civic announcements; earnest institutional film, flicker, zero irony in the voice, wrongness underneath"
  how_it_plays:
    - "Read the URL twice, deadpan — *surf carefully* is the only permitted wink"
    - "Cambridge telecine jiggle sells it as 1969 bureaucracy, not comedy — or Half-Life propaganda earnestness"
    - "Brother site link is sincere respect; the penis gag is ours, not at their expense"
    - "Audience who get it, get it; audience who don't, still get light pens"
  not: "Not crass on-page copy — the gag lives in spoken URL + domain, not product descriptions"

family_site:
  tone: "Clean deadpan retro family web shop — **light** + **pen**, literally."
  not: "Not adult merchandise — family-safe light pens, styluses, and pointer toys."
  copy_rule: |
    Every product must be defensible as a *light pen*, *light* + *pen-shaped thing*, or
    **1968 demo-desk pointing & chording** (Engelbart mouse / keyset replicas, kits, maker guides).

disclaimer: |
  Repo Show sponsor emporium for Micropolis Class / PIXIE comedy. Family-friendly catalog:
  styluses, pen lights, laser cat toys, toy sabers, presentation pointers — things that emit light
  and/or are pen-shaped. Not affiliated with Cambridge University or Disney.
  Not PDP-7 Type 340 CRT light pens unless Lars boots one.

