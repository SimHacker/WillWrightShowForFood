# Cambridge gag credits — deadpan university film departments on telecine jiggle
# Post-production: process/post-production/cambridge-telecine-jiggle.yml

id: cambridge-gag-credits
type: gag
status: ready
shows: [pixie-pie-menus-pdp7]
tradition: cambridge_university_film_slate
post_production: ../../process/post-production/cambridge-telecine-jiggle.yml

beat: |
  Between segments or rolling at the tail — fake Cambridge Computing Laboratory
  department slates in ALL CAPS serif. Same After Effects motion track as the 1969
  PIXIE film. Played straight; audience reads them as real until the joke lands.
  **Ground Up Software** consulting plugs in identical deadpan — Don's eenmanszaak
  dressed as 1969 bureaucracy. The jokes write themselves.

when:
  - end_credits_roll
  - segment_bumpers
  - after_emulator_boot_fail
  - dedication_after_chm_hook
  - ground_up_consulting_stinger
  - light_pen_bureau_sponsor_spot

format:
  typography: "Serif caps — Cambridge Univ Library telecine feel"
  motion: "Parent to cambridge-telecine-jiggle driver null"
  filters: "Blur + glow — emulsion not overlay"
  duration: "3–6 seconds each; faster during roll"

ground_up_software:
  company: Ground Up Software
  role: "Don Hopkins consulting — Amsterdam eenmanszaak since 2017"
  portrayal: characters/don-hopkins/career/work-history.yml
  tone: |
    Play straight like a real university film credit. Not a hard sell — the absurdity
    of *Department of Research Simulation* and *Ground Up Software — Pie Menu Consultancy*
    on the same jiggle track as Cambridge 1969. Optional opening stinger before departments roll.
  opening_stingers:
    - "A GROUND UP SOFTWARE CONSULTING ENGAGEMENT"
    - "PRODUCED IN ASSOCIATION WITH GROUND UP SOFTWARE — AMSTERDAM"
    - "FROM THE GROUND UP — RESEARCH SIMULATION DIVISION"
  consulting_plugs:
    - line: "Ground Up Software — Department of Research Simulation"
      note: "Anchor consulting plug — pairs with department gag"
    - line: "Ground Up Software — Pie Menu Consultancy"
    - line: "Ground Up Software — Telecine Motion Tracking Services"
      wink: "Same AE track as Bumblebee edit"
    - line: "Ground Up Software — Bottom-Up Implementation Bureau"
      pun: "Dave Ackley bottom-up; company name"
    - line: "Ground Up Software — User Interface Flower Child Services"
    - line: "Ground Up Software — Distributed CAD Liaison"
    - line: "Ground Up Software — Emulator Boot Support"
      segment: lars_emulation
    - line: "Ground Up Software — After Effects Jiggle Department"
    - line: "Ground Up Software — Nightly Batch Consulting"
      pun: "Titan link; consulting hours"
    - line: "Ground Up Software — Model-Guided Medicine Advisory"
      guest: heinz-lemke
    - line: "Ground Up Software — Lots Of Copies Keep Stuff Safe Liaison"
      guest: david-rosenthal
    - line: "IF YOUR LAB STILL RUNS ON TITAN — GROUND UP SOFTWARE"
      tone: "Fake 1969 help line; end-roll stinger"
    - line: "ADDITIONAL RESEARCH SIMULATION BY GROUND UP SOFTWARE"
      tone: "Classic film credit voice — *additional animation by*"
    - line: "CONSULTING ENGAGEMENTS NOW ACCEPTED — GROUND UP SOFTWARE"
      optional: true
      placement: end_roll_only

light_pen_bureau_sponsor:
  id: light-pen-bureau-sponsor
  pairs_with: "Computing Laboratory — Light Pen Bureau"
  segment: heinz_history
  opener: "And now, a word from our sponsors."
  url: https://lightpenisland.net/
  url_spoken: "lightpenisland dot net"
  url_repeat: "I repeat, lightpenisland.net. Surf carefully."
  site_spec: lightpenisland-net.yml
  domain_status: registered
  registrar: hover
  operator: Ground Up Software
  url_note: |
    Gag domain — *light pen island* emporium (Type 340 / PIXIE). One word: lightpenisland.net.
    Parody spirit of penisland.net; not affiliated. Read URL twice, deadpan; *surf carefully* is the punchline.
  inspiration: https://penisland.net/
  inspiration_note: |
    Real deadpan custom-pen shop (infamous domain parsing). Tagline: *Your Pen Is Our Business*.
    **Light Pen Bureau** swaps pen → light pen. Play the ad completely straight on Cambridge telecine jiggle.
  ad_read: |
    Finest quality custom **light pens** for the PDP-7 graphics satellite. Thin white EZ-Grip;
    petite yellowheart wood; thick dark mahogany — we specialize in wood. Hand-crafted nearly
    three decades. Bulk orders or just one for that special Titan link. Computing Laboratory —
    **Light Pen Bureau**. Visit **lightpenisland.net** — your light pen is our business.
    **Lightpenisland dot net.** I repeat, **lightpenisland.net**. Surf carefully.
  engelbart:
    why: |
      **Mother of All Demos** (Dec 9, 1968 — Douglas Engelbart, SRI) and **PIXIE** (1969,
      Cambridge) — same zeitgeist: light pen, direct manipulation, film to prove it happened.
      Deadpan sponsor read can nod without interviewing Doug (memorial mode).
    character: characters/douglas-engelbart/
    mother_of_all_demos: "1968-12-09 — mouse, chord keyboard, hypertext, collaborative editing; demo as genre"
    pixie_parallel: "1969 — radial menus on PDP-7/340; Cambridge film; Heinz in the footage"
    sponsor_tags:
      - "Also compatible with Mother-of-All-Demos-style proof films"
      - "Augment your light pen — bootstrap sold separately"
    gag_credit_lines:
      - "Mother of All Demos — Licensed Light Pen Accessories"
      - "Stanford Research Institute — Demo Envy Division (1968)"
      - "Augment — Human Intellect Bootstrap Liaison"
    on_air_beat: |
      After sponsor read — optional one-liner from Don: *Beautiful.* Same year Engelbart showed
      the world what a demo could be, Heinz was drawing radial menus on Titan's graphics satellite.
      Not claiming PIXIE copied Augment — claiming the **light pen zeitgeist** was everywhere.
  telecine: "Same AE motion track + blur/glow as gag credits — fake 1969 sponsor film insert"
  disclaimer: "Parody sponsor spot for Repo Show comedy — family-friendly light-pen catalog only; not an endorsement of any third-party site"
  catalog: repo-shows/ideas/gags/lightpenisland-net.yml#catalog
  amazon_storefront: repo-shows/ideas/gags/lightpenisland-net.yml#amazon_storefront

