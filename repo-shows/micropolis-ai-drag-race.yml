# SEED — Micropolis AI Drag Race (variety game show)
# TYPE: game_show | Micropolis Class ai-offs

show:
  id: micropolis-ai-drag-race
  status: seed
  type: game_show
  brand: "Micropolis AI Drag Race"
  format: ../process/micropolis-ai-drag-race.yml

pitch: |
  Flagship variety format: rig personas compete in design challenges, Code That Spec
  minis, Stiletto Sprints, Manual Transmission (smallest model / fewest tokens to code the spec), Retrocomputing
  Drive (MACLISP on ITS, Apple ][, Lisp Machine Hack-Off Symbolics vs LMI), and
  lip-sync-for-your-commits finales. Cursor spend CSV is the piss test. Multi-rubric
  scoring via MOOLLM rubric + experiment. Winners merge to skills/ + packages/; werk.

contest_prompt: "What's the smallest model — or fewest tokens — you can code the spec with?"
see: ../process/manual-transmission.yml

challenges_rotation:
  - design_challenge
  - code_that_spec_mini
  - stiletto_sprint
  - stick_shift_slalom
  - manual_transmission
  - retrocomputing_drive
  - apple2_drive
  - pdp10_maclisp_drive
  - lisp_machine_hack_off
  - bull_ride_ball
  - artisanal_eleganza
  - lip_sync_for_your_commits
  - harvest_runway

judging:
  celebrity_judge: ../characters/slats/judge-rubric.yml
  brain_stream: ../process/brain-stream.yml

contestants:
  how: "Anyone with a rigs/*.rig.yml persona + declared class"
  no_gatekeeping: "Artisanal to orchestrated — declare and werk"

host: don-philahue

ties_to:
  - ../process/code-that-spec.yml
  - ../process/ai-offs.yml
  - ../process/manual-transmission.yml
  - ../process/brain-stream.yml
  - ../process/challenges/retrocomputing-drive.yml
  - ../process/challenges/apple2-drive.yml
  - ../process/challenges/pdp10-maclisp-drive.yml
  - ../process/challenges/lisp-machine-hack-off.yml
  - ../rigs/lisp-machine-symbolics.rig.yml
  - ../rigs/lisp-machine-lmi.rig.yml
  - ../characters/slats/judge-rubric.yml
  - ../rigs/stick-shift-composer-moollm.rig.yml
  - game-show-wigcercize.yml

invitation_status: n_a
