    - "Jason Shankel — characters/jason-shankel/ + repo-shows/jason-shankel/ (AI + skills episode)"
    - "Matthew Sibigtroth — characters/matthew-sibigtroth/ + repo-shows/matthew-sibigtroth/ (original StoryMaker!)"
    - "Ken Kahn — characters/ken-kahn/ + repo-shows/ken-kahn/ (AI blocks; Snap! + skills episodes)"

