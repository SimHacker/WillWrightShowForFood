  README.md:     "Overview + framing + the Flower-Child icon."
  invitation.md: "The markdown invitation email to Will (DRAFT — Don to edit/send)."
  invitation-gpt55-draft.md: "Alternate concise-weird friend-to-friend draft after the whirlwind call."
  invitation-opus-draft.md: "THE BIG-PICTURE draft (deliberately not single-page): Proxi ⇔ Simopolis ⇔ Sims bridge → serial-endosymbiosis über-character; the powers-of-ten → his-own-games map (Home/Sims=content+LLM-dreaming, City/SimCity, Earth/SimEarth-Gaia, Space/Spore, Proxi=the character/AI layer; + Sims 1-4 versions & Spore's own levels); the Streets-of-SimCity continuation + 'we should federate'; the shared-situation / raise-funs-in-parallel pitch; and the JOIN ask (WillWrightShowForFood repo gag). Margulis↔Lovelock↔SimEarth loop."
