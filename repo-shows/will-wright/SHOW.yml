sources:
  winograd_1996:
    dir: sources/1996-04-26-winograd-interfacing-to-microworlds/
    what: "Will's 1996 Winograd-seminar talk (postmortems + the first public Dollhouse demo). README (framing + the 'taken aback → Dollhouse' moment + threads it seeds) + transcript.md + medium-article.md."
    use: "The kickoff can OPEN by replaying the pivotal moment — the student's question that unspooled The Sims. Could anchor a whole show, maybe several (see episodes.yml)."
    note: "Faithful capture of Will's own words (heartbeat: source, don't paraphrase). Stanford Archives: non-commercial use with attribution + Don's transcript."

the_angle:
  ask_will_about_his_own_words: "The richest angle: play Will's 1996 words (+ Don's and the students' questions + his answers) and ask — what did he get RIGHT, what WRONG?"
  what_he_got_right: "A LOT. Simlish = the Peanuts 'mwa mwa mwa' adult talk he described; plugin objects 'advertising'; net-shared user content; data portability; the hobby model. Almost every GOAL OF THIS PROJECT was his 1996 goal."
  what_he_got_wrong_or_open: "'No hope' simulating people (the illusion worked far better); multiplayer 'easier than AI' (then TSO happened); 3D-as-fad (he flipped)."
  the_sims_online: "Good + bad — the 'graphic MUD' he mused about in 1996, made real in 2002. Real irrational people vs. simulated rational ones."
  ucc_community: "User-created content sites: SimFreaks, SimSlice, Simprov/SimBabes, ZombieSim, Transmogrifier, RugOMatic, IFFPencil2, FreeTheSims..."
  seeds: suggested-questions.yml   # the seed question list audience votes on by copying into their characters

