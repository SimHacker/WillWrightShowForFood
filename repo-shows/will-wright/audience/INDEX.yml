seating_model:
  # SEATS ARE NOT CHARACTERS. Balcony/box/front-row/pit are PLACES. Only characters exist in the
  # audience; each declares its own `seating:` property (seat, adjacent, attending_with, earned_by).
  # The box_seats/balcony blocks below are a COMPUTED VIEW of those declarations — not the source.
  source_of_truth: "each character's seating: property (schema: ../../../schemas/audience-character.yml#seating)"
  this_block_is: derived_view
  groups:
    simfreaks-simslice:
      members: [heather-alvey, steve-alvey, fictional-zombie-sim]
      seat: front_row
      note: "Honored creators attending together + the ZombieSim they brought; plug their sites"

box_seats:
  # Seating is organic recognition for donating BEFOREHAND — never a paywall (free = general
  # admission, picked on merit). Better seats = more camera time, called on first, guest eye
  # contact. Spec: ../../../process/ticket-pr.yml#donations (seating). COMPUTED from char props.
  policy:
    general_admission: "Free; ask from anywhere; surfaced on merit"
    earns_better_seats: "optional pre-show donation"
    advantages: [more_visibility, called_on_first, named_in_roll]
    not_buyable_with: "in-show § Simoleons (play-money only)"
  front_box_left:
    members: [fictional-museum-curator, phil-salvador]   # fiction beside real archivist
    note: "Fictional Curator beside the real archivist who inspired them — tribute made literal"
  front_row:
    group: simfreaks-simslice
    members: [heather-alvey, steve-alvey, fictional-zombie-sim, fictional-little-computer-person, fictional-seaman]
    note: "Honored creators + the Sims ancestor + Seaman (asking for Yoot)"
  orchestra_pit:
    members: [fictional-transmogrifier, bot-slats]
    note: "UGC hums in the pit; Slats call-in / RoboResurrection sidekick (no longer balcony)"
  floating:
    members: [fictional-broken-robot]
    note: "No fixed seat — crashes in and is dragged off"
  balcony:
    duo: sims-balcony
    left: fictional-tragic-clown   # 🤡 weeping heckler
    right: fictional-grim-reaper   # 💀 deadpan finality
    homage: "Statler & Waldorf — Sims-culture: Tragic Clown 🤡 + Death 💀"
    running_gag: true
