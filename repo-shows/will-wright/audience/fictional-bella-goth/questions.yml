  sparingly — greeting + one exclamation, not whole questions. schemas/language-simlish.yml.
  NOTE: every "Don Philahue ..." line in audience files is a behavioral instruction that gets
  aggregated INTO his character constitution (characters/don-philahue/) — programming how he
