why_him:
  fnord_origin: "It started with **fnord** — Scott's 1990 Brown thesis, a functional language for describing higher-dimensional geometry (co-written with Nick Thompson; the workhorse for Thomas Banchoff's 4D art). The deep root of describing generative form as data — and a perfect Discordian in-joke (the word you're conditioned not to see)."
  electric_sheep: "Electric Sheep (1999– ): thousands of computers worldwide collaboratively render; humans vote; a genetic algorithm breeds the favorites. 'The collective dream of a cyborg mind.'"
  flame: "Invented + open-sourced the Fractal Flame algorithm (1992; flam3). On a Paul Simon cover and Hawking's The Grand Design; SIGGRAPH 2008 'Evolve' identity."
  hifi_dreams: "Dreams in High Fidelity — an evolving painting; MoMA, Google, Adler Planetarium."
  infinidream: "2026 reboot: Generation 248, 1080p/60fps, phone remote, generative-AI platform, open source."

dream_segments:
  - "fnord — the origin: resurface Scott's 1990 functional geometry language (with Nick Thompson, behind Banchoff's 4D art) and trace the through-line fnord → Flame → Sheep → Infinidream (describe form as data, then render + evolve it). Plus the Discordian joke: the language named after the word you can't see."
  - "Read the original Flame papers together; run flam3 / Electric Sheep live and watch the flock evolve."
  - "Collective intelligence: voting, genetics, distributed rendering — the cyborg mind, then and now."
  - "From hand-authored math to AI image generation: what Infinidream changes, and what it keeps."
  - "Iterated graphical systems + feedback: cellular automata (CAM6), Sandspiel, video feedback, music-reactive visuals."
  - "Reunion variant: Don + Scott (the still-active duo — collaborating since 2006) get the crew back together; invite Brian Eno, Will Wright, and Doug Hilsinger. Don last saw Brian/Doug in 2006."
  - "Storytelling banter — the 1990 Mountain View scene: Don's '6Heads' house (housemates Nick Thompson/SGI, who introduced them, and Steve Zellers/Sun + Dave Winer's Frontier; Joy Mountford next door), everyone's first post-college jobs. Ask Spot to tell HIS post-graduation story and how the two converged in that zeitgeist — filling in what they never knew."

