catalog:
  id: simprov
  title: SimProv
  kind: legacy_playset
  status: republishing

creators:
  - Don Hopkins
  - Heather Alvey (SimFreaks)
  - Steve Alvey (SimSlice)
  - SimBabes artists
  - Donna (premium set pieces)

what: |
  SimProv — composable playsets and orchestration objects for staging stories
  in The Sims. Magnum opus: the **SimProv Wedding Playset** — unfinished in the
  2000s, rising again for the Steam Sims 1 generation.

flagship: SimProv Wedding Playset

objects:
  - name: Crowd Sitter
    source: ../characters/will-wright/sources/2018-04-23-sims-crowd-sitter/
    role: "Gather guests, seat them, manage overflow"
  - name: Cupid
    role: "Speed-dating cheat — prerequisite romance for marriage"
    demo: ../../repo-shows/ideas/gags/speed-dating-with-cupid.yml
  - name: Buddha statue
    role: "Suppress needs for large wedding crowds"
  - name: Hope Chest + wedding consultant
    role: "Onboarding, catalogs, narrative scaffolding"
  - name: Donna premium set pieces
    role: "Beds, buffet, tables, dolls — craft layer"
  - name: Dumbold Voting Machine
    source: ../characters/will-wright/sources/2018-04-24-dumbold-voting-machine/
    role: "Procedural rhetoric — 2004 time capsule (not wedding kit)"

assets:
  - path: ../../media/sims-simfreaks-content-gameplay-README.md
    note: "SimProv sets mixed with SimFreaks in-game shots"
  - path: ../../media/sims-simantics-objects-README.md
    note: "Pie menus, master controllers — orchestration toolkit"

narrative:
  - ../../repo-shows/will-wright/INTRO-NARRATIVE.md
  - ../characters/will-wright/media/sims-series-family-manifesto.md

platform:
  hosted_on: ../micropolis-home/
  note: "Playset + composable objects publish as hosted CARD collections"

related_catalogs:
  - ../simfreaks/
  - ../simslice/
