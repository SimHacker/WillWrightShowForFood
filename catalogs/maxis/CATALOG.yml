# Maxis catalog — metadata only, pointers to content everywhere
# NOT a mirror of EA retail assets. CARDs + backstories + object IDs + where to find binaries.

meta:
  id: maxis-catalog
  kind: metadata_catalog
  policy: |
    Record titles, dates, object IDs, expansion pack membership, killer-download backstories,
    and canonical URLs (Steam, Internet Archive, donhopkins.com, Hidden Palace, TCRF).
    Do not commit retail installers or leaked dumps to git.

sections:
  - id: get_the_game
    summary: "Legal base game — Steam re-release recommended on every show"
    doc: ../get-the-sims-on-steam.md
    steam_url: https://store.steampowered.com/app/3314070/The_Sims/

  - id: official_releases
    summary: "Base game + expansion packs — store pages, Steam app IDs, IA items when legal"
    examples:
      - "The Sims (2000) — Steam"
      - "Livin' Large, House Party, … — expansion metadata grid"

  - id: killer_downloads
    summary: "Memorable Maxis.com / originalsims.com downloads — one article per interesting object"
    examples:
      - "Killer Hamster — backstory article TODO"
      - "Halloween tombstones / dumbold waiter — tie to originalsims Wayback"

  - id: base_objects
    summary: "Every base-game object — metadata + preview source pointer"
    preview_sources:
      - "Native IFF parse + sprite render (planned — replaces ShowNTell scrape)"
      - "ShowNTell ActiveX era — [`../characters/will-wright/sources/2004-01-08-showntell-activex-preview/`](../characters/will-wright/sources/2004-01-08-showntell-activex-preview/)"
      - "Live game scrape (legacy Simplifier path until IFF pipeline proven)"

  - id: expansion_objects
    summary: "Per-pack object tables — same schema as base_objects + pack_id"

  - id: prototypes
    summary: "Link-only — steering committee, alpha, SimRefinery, Spore protos"
    hub: "../characters/will-wright/sources/1999-01-06-sims-alpha-prototype/"

  - id: business_sims
    summary: "SimRefinery, SimHealth, MBS lineage"
    hub: "../characters/will-wright/sources/simrefinery-recovery/"

object_record_schema:
  fields:
    - object_id
    - name
    - pack
    - category
    - iff_resource_refs
    - preview_url
    - content_location  # steam_install | ia | donhopkins | wayback | local_don_archive
    - article_slug
    - backstory

pipeline:
  iff_reader:
    status: planned
    host: "Micropolis Home TypeScript in Angel WebView2 + FileBridge to local .far"
    note: "Read .iff directly; WebGPU render — Transmogrifier / ShowNTell parity without ActiveX"
  sqlite_catalog:
    status: spec
    path: "../../apps/micropolis-angel/CATALOG-DB-SCHEMA.yml"
    regenerate: "Scan owned install + user roots via TypeScript IFF parser — NOT SimsObjects.xml import"
    compare_only: "TheSims/SimsKit/Transmogrifier/SimsObjects.xml — validation diff, unknown quality"
    lineage: "Sim Obliterator / vitamoo — full credit in schema doc"
  simplifier_crawl:
    status: spec
    path: "../../apps/micropolis-angel/SIMSKIT-LINEAGE.yml#simplifier"
    note: |
      Port navigation+inject from Simplifier C++; scrape **preview images only** during catalog crawl.
      Names/descriptions from XML+iff — NOT glyph OCR. Retire crawl when WebGPU previews ship.
  simplifier:
    status: spec
    path: "../../apps/stream-gateway/simplifier.yml"
    note: "Inject for crawl + lifecycle + stream; OCR demoted to bootstrap fallback"

ties_to:
  - path: ../CATALOGS.yml
  - path: ../characters/will-wright/sources/2004-01-08-showntell-activex-preview/
  - path: ../characters/will-wright/media/sims-series-micropolis-publishing-vision.md
  - path: ../../process/licensing-micropolis-enterprise.yml
