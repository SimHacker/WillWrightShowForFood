  lifetime_subscription:
    example: zombiesims
    price: "$9.99 lifetime (2026 checkout page)"
    for: "Original fan labor — expansion-scale packs + SimSlice back-catalog"
  vip_convenience:
    example: thesimsresource
    price: "~$24/yr or ~$3/mo (VIP — verify shop page)"
    for: "Ad-free, speed, basket, CC Manager — content still free without VIP"
  ads_and_free:
    example: modthesims
    for: "Free files; site funded by ads + community labor"
  creator_storefront:
    example: [simfreaks, simslice]
    for: "Direct support of named artists; prices vary by product"
  donation_hobby:
    example: donhopkins_hn_giveaway
    for: "Free SimProv archive; tip via ZombieSims / Patreon / show lift — non-extractive"

