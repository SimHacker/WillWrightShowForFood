# STEAM COMMUNITY GUIDES — Micropolis Home discovery (web hub + Repo Shows)
steam_community_guides:
  spec: micropolis-home/steam-community-guide.yml
  model: valve_community_guide
  requires: "Legal copy of The Sims 1 (Steam Legacy Collection recommended); must own game to publish"

  one_line: |
    Player-authored Steam Guides on The Sims hub — informational playbooks linking to Micropolis Home
    (browser) and Repo Shows. Not a separate store app.

  what_it_is:
    catalogs_and_tools:
      - "Micropolis Home web URL — create · publish · share (primary product, no install)"
      - "Federated UCC pointers: SimFreaks, SimSlice, SimProv, Zombie Sims, MTS, TSR, SneakySims, Maxis metadata, IA archives"
      - "Clean-room web tools: SimShow preview, Transmogrifier, install helpers, Exchange revival"
    repo_shows_channel:
      - "Discover + promote Micropolis Class Repo Shows — flagship Will Wright kickoff + guest network"
      - "Live/VOD, GitHub repo browse, TicketPR audience ingress, episode harvest (skills, code, homefun)"
      - "Sims history + bridge episodes (Simopolis hub → Stardew, Proxi, Spore, Mind Mirror, …)"
    not: "A game; a warez bundle; implied EA endorsement; a replacement for creator storefronts; an Electron wrapper"

  what_to_avoid:
    - "Implied EA endorsement or Plumbob branding in guide art"
    - "Re-hosting paid creator content without agreement"
    - "Bundling EA game files or expansion IFF packs"

  ea_alignment_pitch:
    short: |
      Fan guides for players who own Sims on Steam → drives Legacy Collection discovery → documents
      26-year fan culture → revives Exchange → promotes making/playing games the right way.
    long: get-the-sims-on-steam.md

  native_tools_later:
    product: micropolis-home/micropolis-angel.yml
    name: MicropolisAngel
    note: |
      Windows Steam Software companion — Simplifier showcase, catalog capture, machinima, OBS/Twitch,
      Exchange revival gateway. NOT a web wrapper. Announce after Micropolis Home bootstraps audience.

  rollout_order:
    1: "Web Micropolis Home + public Will Repo Show + catalog CARD dirs"
    2: "ModTheSims + Steam Community Guide + YouTube (UCC installs + show clips)"
    3: "MicropolisAngel on Steam Software (Windows) — Simplifier + catalog + streaming stack"
    4: "EA conversation only after traction + Heather/Steve/MTS relationships warm"

  simprov_on_steam:
    sell: "Risky as paid SKU — fan objects, unclear EA tooling lineage for some assets"
    free: "Aligned — HN giveaway pattern; link from guide; disclaimer; buy-game-first"
    wrap: "Guide + web hub list SimProv as federated catalog — downloads from Micropolis Home or creator CDN"

# FEDERATION PRINCIPLE (Heather & Steve show)
non_extractive_lift:
  rule: "Send fans to SimFreaks / ZombieSims subscriptions — Micropolis Home is rails, not a loot box"
  show: ../../repo-shows/heather-steve-alvey/SHOW.yml#support_them

