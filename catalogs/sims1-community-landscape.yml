# Sims 1 community landscape & distribution strategy
# Companion to Micropolis Home federation. Not legal advice — document facts + posture.

meta:
  id: sims1-community-landscape
  scope: sims_1_only
  last_reviewed: 2026-06-30
  steam_game: https://store.steampowered.com/app/3314070/The_Sims/
  buy_first: get-the-sims-on-steam.md

# EA / LICENSE — what actually constrains you
legal_layers:
  transmogrifier_eula:
    summary: |
      EA Tools EULA (2000): personal **noncommercial** use; fan materials on personal noncommercial
      sites with required EA disclaimer; no redistribution of the Tool; EA may revoke anytime.
    repo: ../../characters/don-hopkins/career/contracts/transmogrifier-ea-tools-eula.txt
    notes: ../../characters/don-hopkins/career/contracts/transmogrifier-distribution-license-notes.md
  clean_room_tools:
    summary: |
      **Micropolis Home** reimplements SimShow / Transmogrifier / RugOMatic **clean-room in the
      browser** — not redistribution of EA's Windows binary. Different legal object than mirroring
      the 2000 installer.
  ucc_objects:
    summary: |
      SimProv, SimFreaks, SimSlice, Zombie Sims objects are **fan-created content** (Don, Heather,
      Steve, SimBabes, Donna, community). Copyright in the objects; game is the runtime players must
      own. Free distribution with EA disclaimer matches decades of community practice.
  do_not_assume:
    - 'Nobody remembers the license — EA legal still exists; status quo ≠ permission'
    - '26 years later auto-expires EA tool grants — it does not'
    - 'Selling EA assets or implying endorsement — high short-term C&D risk'
  do_assume:
    - 'Free fan UCC + required disclaimer + buy Sims on Steam = aligned with Transmogrifier EULA fan-posting clause and MTS/TSR norms'
    - Companion app that **requires** owned game and **drives Steam sales** = long-run EA-friendly story (see get-the-sims-on-steam.md)

# ACTIVE SIMS 1 SITES (2025–2026 snapshot — verify before linking)
sites:
  subscription_and_tips:
    - id: zombiesims
      url: https://zombiesims.com/
      model: "Free newbie tier + **$9.99 lifetime** unlocks Zombie Sims + SimSlice archive"
      creators: [Heather Alvey, Steve Alvey]
      note: "SimFreaks migration in progress (2025–2026); SimSlice files temporarily centralized here"
      federated: ../zombie-sims/

    - id: simfreaks
      url: https://www.simfreaks.com/
      model: "Long-running creator storefront; server migration; Discord for site requests"
      creators: [Heather Alvey]
      federated: ../simfreaks/
      note: "Cool Sites list — directory of legacy Sims 1 URLs"

    - id: simslice
      url: http://www.simslice.com/
      model: "Creator site; SliceCity flagship; downloads often via ZombieSims during migration"
      creators: [Steve Alvey]
      federated: ../simslice/

  free_community_hubs:
    - id: modthesims
      url: https://www.modthesims.info/f/662/
      model: "Free downloads; ads; forum. **Sims 1 section alive** but site center of gravity is Sims 2–4"
      scale: "~462M posts site-wide; Sims 1 is a legacy forum branch"

    - id: thesimsresource
      url: https://www.thesimsresource.com/downloads/browse/category/sims1/
      model: "All content free; **VIP ~$3/mo or ~$24/yr** for ad-free, fast/basket downloads, CC Manager"
      sims1: "Legacy category maintained; business is Sims 4-first"

    - id: sneakysims
      url: https://sneakysims.net/
      model: "Free hub; no account required; CC archive DB + SneakyLib modding tools; aggregates dead sites"
      note: "2025 EA Legacy Collection spike; preservation-focused — parallel mission to Micropolis Home"

    - id: thesimsdepot
      url: http://www.thesimsdepot.com/sims-1/downloads/
      model: "Free; archives EA **Get Cool Stuff** + ts1depot creations + tool directory"
      tie: "Killer downloads / official Maxis web objects — see ../maxis/"

  tools_and_wikis:
    - { name: IFF Pencil 2, role: SimAntics editing }
    - { name: SimPose, role: posing }
    - { url: "https://modthesims.info/wiki.php?title=SimAntics", name: MTS SimAntics wiki }

  legacy_directories:
    note: "SimFreaks Cool Sites; The Sims Depot 'Additional Sims 1 Sites' — Dincer Hepguler, Seven Deadly Sims, Simlogical, Around the Sims, etc."
    yahoo_groups: "Mostly offline; recover via Internet Archive + Saving The Sims / CTO Sims preservation efforts"

