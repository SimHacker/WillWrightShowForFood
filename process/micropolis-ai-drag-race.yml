# MICROPOLIS AI DRAG RACE — flagship game-show variety format
# Markup: DRAG-RACE.md (generated — pnpm run facades) | Show seed: ../repo-shows/micropolis-ai-drag-race.yml

meta:
  id: micropolis-ai-drag-race
  status: seed
  type: [game_show, variety, ai_off, micropolis_class]
  brand: "Micropolis AI Drag Race"
  tagline: "Start your engines — may the best rig werk, commit, and merge."
  homage: [RuPauls_Drag_Race, Drag_Queen_Olympics, Code_That_Spec]

pitch: |
  A Micropolis Class variety show: contestants bring RIG PERSONAS (Let's Make a Deal
  costumes + rigs/*.rig.yml). Your rig declares languages, tools, platforms — emulators
  count as platforms. Retrocomputing AI drag races welcome. Prove with Cursor spend logs,
  lip-sync thoughtful commits, merge technique DNA back into the organism. Declare class
  — don't exclude. It's just a game. Werk.

host:
  options: [Don_Philahue, Flower_Child_Don, guest_MC]
  lines:
    - "Gentlemen, start your engines — and may the best rig win!"
    - "The library is open — RTFR!"
    - "Shantay, you stay — PR merged. Sashay away — branch closed."

challenges:
  design_challenge:
    what: "Given a spec CARD — city tile, skill, bridge, show seed — werk a look + implementation"
    deliver: "Branch + README runway + yaml backbone"
  code_that_spec_mini:
    see: code-that-spec.yml
    audience_chant: "CODE THAT SPEC!!!!!"
  stiletto_sprint:
    what: "Shortest honest token/time bid that still ships — heels optional, constraint mandatory"
  stick_shift_slalom:
    what: "Model-switch course — spend log proves clean shifts through the cliff road"
  manual_transmission:
    see: manual-transmission.yml
    tagline: "What's the lowest cost / smallest model you can solve the problem with?"
    audience_chant: "CODE THAT SPEC!!!!!"
    overlay: brain-stream.yml
  bull_ride_ball:
    what: "Wrangle one cheap model through hallucination chaos — show the retries, werk anyway"
  artisanal_eleganza:
    what: "Zero tokens — hand-crafted yaml so fierce it doesn't need AI"
    flair_variant: "Or apple2-drive — APPLESOFT/INTEGER BASIC on the ][ — see challenges/apple2-drive.yml"
  apple2_drive:
    see: challenges/apple2-drive.yml
    family: challenges/retrocomputing-drive.yml
    tagline: "Apple ][ instance — declare languages, tools, platform, emulator"
    example_rig: ../rigs/apple2-flair-lap.rig.yml
  retrocomputing_drive:
    see: challenges/retrocomputing-drive.yml
    tagline: "Retrocomputing AI drag races — your rig picks language, tools, and platform"
    note: "apple2-drive + pdp10-maclisp-drive are flagship instances"
  pdp10_maclisp_drive:
    see: challenges/pdp10-maclisp-drive.yml
    tagline: "Write in MACLISP on a PDP-10 emulator running ITS!"
    example_rig: ../rigs/pdp10-maclisp-flair-lap.rig.yml
  lisp_machine_hack_off:
    see: challenges/lisp-machine-hack-off.yml
    tagline: "Symbolics vs LMI — Lisp Machine Hack-Off"
    example_rigs: [../rigs/lisp-machine-symbolics.rig.yml, ../rigs/lisp-machine-lmi.rig.yml]
  lip_sync_for_your_commits:
    what: "thoughtful-commitment commits — narrate WHY on stream; cursor-mirror playback"
  harvest_runway:
    what: "Final — merge PR, abstract to skills/ + packages/, present the organism graft"

judging:
  celebrity_judge:
    slats: ../characters/slats/judge-rubric.yml
  panel: [slats, ai_scorecard, human_taste, spreadsheet_ref]
  criteria:
    - "Taste — eleganza, clarity, humor, constructionist generosity"
    - "Cost to ship — tokens, spend, wall-clock vs bid"
    - "Commitment — did you werk the spec and merge back?"
    - "Replication — forward SETUP.md alone; recipient LLM fetches latest yaml from GitHub and idempotently installs"
  scoreboard: showmaker-network.yml#competitions
  proof: ai-offs.yml

contestant_packet:
  required:
    - "rigs/<persona>.rig.yml — full lifecycle + costume"
    - "rigs/<persona>.SETUP.md — Rig DNA: emailable head, raw GitHub yaml URL, LLM idempotent install (template: rigs/_TEMPLATE.SETUP.md; schema: schemas/rig-setup-dna.yml)"
    - "components: languages, tools, platforms, emulators (if retro) — your choices"
    - "Declare rig_classes honestly"
    - "PR branch — the runway"
  optional:
    - "Screencast werk"
    - "Cursor spend export + cursor-mirror composer id"
    - "Code That Spec bid line"

personas:
  rule: "Your rig IS your drag persona — camp + honesty"
  examples:
    artisanal_queen: "NO AI sash, pencil crown, yaml nails"
    bull_rider: "Retry-log chaps, hallucination hair"
    stick_shift: "Sequin shift map, tachometer earrings"
    apple2_driver: "Disk ][ tiara, INTEGER BASIC sash — apple2-drive instance"
    retro_driver: "Platform badge + emulator gloves — retrocomputing-drive family"
    pdp10_maclisp: "Teletype sash, Tourist badge — MACLISP on ITS"
    symbolics_camp: "Ivory tiara — Genera Dynamic Windows"
    lmi_camp: "NuBus cape — Lambda SDU boot realness"
    orchestrated: "MCP tiara, MOOLLM cape, Composer scepter"

episode_structure:
  seed: "Single challenge episode OR season arc in repo-shows/"
  merge: "Winners graft skills/packages; losers sashay with honor if they documented the ride"

ties_to:
  - code-that-spec.yml
  - ai-offs.yml
  - manual-transmission.yml
  - brain-stream.yml
  - challenges/apple2-drive.yml
  - challenges/retrocomputing-drive.yml
  - challenges/pdp10-maclisp-drive.yml
  - apple2-emulator-stack.yml
  - pdp10-its-stack.yml
  - lisp-machine-stack.yml
  - showmaker-network.yml
  - ../schemas/rig-schema.yml
  - ../rigs/README.md
  - SimHacker/MicropolisCore

