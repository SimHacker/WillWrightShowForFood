# Artifact scoping — colocate by reusable scope (placement constitution girder)
# Canonical summary: repo-show-format.yml#placement_constitution
# Audience exception: ticket-pr.yml#where_not

meta:
  id: character-colocation
  also_called: [artifact-scoping, placement-constitution]
  one_line: |
    Characters own person stuff. Shows reference. Packages hold code. Rooms are navigable maps —
    shows are rooms too. CARD + ROOM + SIMULATION cardify interfaces. Postel: flexible layout, clean links.
  tagline: "Scope → directory. Reference → don't duplicate."

postel: |
  MOOLLM accepts messy human layout; emit conservative yaml and stable paths. LLMs navigate
  by directory listing, names, and links — lean into that. No single mandatory rooms/ tree;
  repo-shows/, characters/, process/, packages/ are all valid room hosts.

# SCOPES — who owns what
placement:
  characters:
    path: characters/<slug>/
    owns:
      - "Portrait — CHARACTER.yml, CARD.yml, README.md, invitation.md, GLANCE.yml/md"
      - "Person artifacts — PDFs, photos, catalogs, correspondence (prefer flat media/)"
      - "sources/ when many primary-source bundles belong to one person"
    why: |
      One guest, many shows. Opening characters/<name>/ should pleasantly surprise them —
      their README, their media, their papers — not an empty stub pointing elsewhere.
    on_show: "SHOW.yml lists guests; segments link ../../characters/<slug>/media/..."

  repo_shows:
    path: repo-shows/<episode-slug>/
    owns:
      - "Episode — SHOW.yml, README.md, segments, venue/, audience/ (TicketPR)"
      - "Episode-only framing — lineup, segment order, one-off bits with no reusable home"
      - "Show-as-room files — CARD.yml, GLANCE.yml, ROOM.yml, SIMULATION.yml (cardify the episode)"
    does_not_own: |
      Long-lived person artifacts. Do not colocate guest PDFs/catalogs/galleries with the show
      when characters/<slug>/ is the reusable scope — even if prep started in the show dir.
    show_room_note: |
      Show-rooms are collected under repo-shows/, not required to live in a top-level rooms/ dir.
      A planted show is a directory you cd into — MOOLLM room skill applies directly.

  packages:
    path: packages/
    owns: "Reusable code (@wwsff/*) — TypeScript, Python, WASM from harvests"
    when: "Homefun PR merges; extract general library; leave narrative in characters/"

  shared_rooms:
    what: |
      Navigable context shared by many shows — independent of any one episode.
      Examples: process/, skills/, schemas/, catalogs/, venue/VENUE.yml graphs.
    role: "Frequent destinations; shows link through; not copies of character-owned media"

  audience_per_episode:
    path: repo-shows/<show>/audience/<you>/
    rule: "TicketPR journal is per attendance — NOT characters/"
    files: [CHARACTER.yml, CARD.yml, GLANCE.yml, SIMULATION.yml, questions.yml, costume.yml]
    spec: ticket-pr.yml

# CARDIFY — MOOLLM interfaces on directories
cardify:
  what: "GLANCE = nav/metadata SSOT · CARD = interface/ads · read both · README for humans"
  description_scaffolding: repo-show-format.yml#description_scaffolding
  upstream: "Experiment here; promote to moollm skills/card + skills/glance when proven"
  applies_to: [characters, repo-shows, audience_ticketpr, venue_subdirs, shared_rooms]
  show_directory_minimum: [SHOW.yml]
  show_directory_recommended: [README.md, CARD.yml, GLANCE.yml]
  show_directory_optional: [ROOM.yml, SIMULATION.yml, SEGMENTS.yml, venue/, audience/]
  glance_ssot: [title, iconic, description, keywords, navigation, read_order, see_also_categorized]
  glance_omit: [methods, abilities, advertisement_blocks, simulation_runbooks]
  card_interface: [room, methods, abilities, compose_with]
  card_omit: [see_also_nav, read_order, keywords, title, description]
  card_must_point: glance.yml
  readme_should_include: [teaser_from_glance_description, sniff_card_glance, nav_from_glance_at_bottom]
  audience_template: repo-shows/_TEMPLATE/audience/
  show_template: repo-shows/_TEMPLATE/
  moollm_room_skill: https://github.com/SimHacker/moollm/tree/main/skills/room/SKILL.md

readme_index_policy:
  decision: "No human INDEX.md. Index in README (or linked sub-scroll .md for very long galleries)."
  heavenly_links:
    rule: "Human-facing markdown links target README.md — GitHub renders formatted article without raw dir listing above."
    not: "Do not link humans to bare directory URLs unless explicitly popping out to raw listing."
    pop_out_footer: "*Raw directory:* [browse files in this folder](./)* — optional one-liner at README foot"
    yaml_exception: "ROOM.yml exits and MOOLLM navigation children may keep directory paths — filesystem rooms, not GitHub URLs."
  glance_readme_nav:
    rule: "GLANCE.yml owns navigation, read_order, see_also — agent SSOT. README renders the same skeleton as human nav chrome (table + ↑ footers)."
    readme_must: "Sniff line (CARD · GLANCE); Navigation table mirroring GLANCE children/siblings; ↑ back-links to parent README; pop-out footer on hubs"
    two_way: "Child README ↑ links to parent; parent README Navigation table links to child README.md; GLANCE see_also stays yaml paths for agents"
  github_ux: |
    Directory URL = brutalist listing + README below. README-only URL = heavenly layer (curated index, prose).
    Link humans to README.md; offer ./ pop-out when they need the raw file listing.
  roles:
    README.md: "Human article — what this pile is, curated tables, sub-scroll links"
    GLANCE.yml: "Agent nav SSOT — read_order, see_also"
    INDEX.yml: "Machine registries ONLY — verify scripts, invitation status, show graphs"
    INDEX.md: "Do not create; migrate into README sections; delete redirect stubs"
  when_readme_indexes:
    object_pile_only: "Short prose + sample table or pop-out to ./ for exhaustive listing"
    group_has_story: "Prose first; curated table — not a 167-row manifest"
    very_long_gallery: "README themed section + sibling sub-scroll (.md) — still no INDEX.md"

# TOPOLOGIES — shows arranged as maps, not flat lists
topologies:
  note: "ShowMaker network + room exits + source date stacks — any layout that helps navigation"
  patterns:
    sequence:
      what: "Ordered episodes — forebear → flagship → topical"
      examples: [repo-shows/INDEX.yml, showmaker-network.yml, episodes.yml]
    map:
      what: "Room graph with exits — venue, lobby, balconies"
      examples: [repo-shows/will-wright/venue/VENUE.yml, venue/ROOM.yml]
    grid:
      what: "Quadrant grids — ne/nw/sw/se cells, sparse OK"
      spec: https://github.com/SimHacker/moollm/tree/main/skills/room/TOPOLOGY.yml
    vertical_stack:
      what: "Time strata — ../../characters/will-wright/sources/<YYYY-MM-DD-slug>/ stacked by era"
      examples: [characters/will-wright/sources/]
  simulation_in_show: |
    SIMULATION.yml at show or audience level — games, MSPO RPG, inter-character protocols,
    running gags during/after air. Don Philahue hot-loads audience SIMULATION.yml stacks live.

# MEDIA ROOM (characters)
media_room:
  path: characters/<slug>/media/
  pattern: "Flat README scroll + co-located files; big-endian related names (cs547-* for Terry)"
  examples:
    - characters/will-wright/media/
    - characters/terry-winograd/media/

# CROSS-REFERENCE
cross_reference:
  allowed: "Any show links any character media — guest on bill or not"
  prefer: "One canonical path, many referrers"
  anti_pattern: "Duplicate person PDFs under repo-shows/"

migration:
  done:
    - "CS547 catalog → characters/terry-winograd/media/cs547-*"
    - "Will Wright sources/ → characters/will-wright/sources/ (from repo-shows/will-wright/)"
    - "Will Wright assets/ → characters/will-wright/media/ (flattened; big-endian; no type subdirs)"
    - "Will Wright catalogs/ → top-level catalogs/ (syndicated feeds; get-the-sims-on-steam.md)"
    - "Media stubs — Gosling, Shneiderman, Myers, Kay, Gingold, Phil Salvador, Scott flam3 TODO"
  candidates: []

catalogs_room:
  path: catalogs/
  owns: "Syndicated UCC feeds — SimFreaks, SimSlice, SimProv, Micropolis Home, Maxis metadata"
  rule: "Repo-level; shows and characters link through — not owned by will-wright show or character"
  steam: get-the-sims-on-steam.md

see_also:
  - repo-show-format.yml#placement_constitution
  - ticket-pr.yml
  - character-endosymbiosis.yml
  - showmaker-network.yml
  - ../schemas/portrayal-standards.yml#guest_directory
  - ../packages/README.md
