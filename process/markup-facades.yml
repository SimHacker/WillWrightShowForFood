# Markup facade registry — yaml sources → generated markdown views
# Schema: ../schemas/markup-facade.yml

meta:
  id: markup-facades
  generator: ../scripts/generate-markup-facades.py
  invoke: "pnpm run facades"
  rule: |
    Yaml girders are canonical compact data. Registered *.md facades are human views —
    lazy refresh on demand; never edit by hand in registry outputs.
  rendering:
    phase: instance_first
    now: "LLM authors quality instances; deterministic script bulk-refreshes cheap views"
    target: "LLM reads yaml + depends_on + render profile — constraint system later"
    deterministic: "../scripts/generate-markup-facades.py — tree walk, no merge, no tone"

facades:
  - id: repo-show-format
    source: repo-show-format.yml
    output: FORMAT.md
    title: "Repo Show format"
    depends_on:
      - showmaker-network.yml
      - ai-offs.yml
      - brain-stream.yml

  - id: micropolis-ai-drag-race
    source: micropolis-ai-drag-race.yml
    output: DRAG-RACE.md
    title: "Micropolis AI Drag Race"
    depends_on:
      - code-that-spec.yml
      - manual-transmission.yml
      - ai-offs.yml
      - brain-stream.yml
      - challenges/retrocomputing-drive.yml
      - challenges/apple2-drive.yml
      - challenges/pdp10-maclisp-drive.yml
      - challenges/lisp-machine-hack-off.yml
      - ../repo-shows/micropolis-ai-drag-race.yml

  - id: ai-offs
    source: ai-offs.yml
    output: AI-OFFS.md
    title: "AI-offs"
    depends_on:
      - manual-transmission.yml
      - orchestration-gold.yml
      - brain-stream.yml
      - model-branching.yml
      - rig-feedback.yml

  - id: manual-transmission
    source: manual-transmission.yml
    output: MANUAL-TRANSMISSION.md
    title: "Manual Transmission"
    depends_on:
      - ai-offs.yml
      - brain-stream.yml
      - stick-shift-protocol.yml

  - id: homefun-grading
    source: homefun-grading.yml
    output: HOMEFUN.md
    title: "Homefun grading"
    depends_on:
      - ai-offs.yml

  - id: brain-stream
    source: brain-stream.yml
    output: BRAIN-STREAM.md
    title: "Brain stream"
    depends_on:
      - ../apps/stream-gateway/

  - id: orchestration-gold
    source: orchestration-gold.yml
    output: ORCHESTRATION-GOLD.md
    title: "Orchestration gold"
    depends_on:
      - model-branching.yml
      - ai-offs.yml

  - id: vision
    source: vision-and-ambition.yml
    output: VISION.md
    title: "Vision and ambition"
    depends_on:
      - showmaker-network.yml
      - live-repo.yml
    # render: { mode: llm, tone: longform, merge_depends_on: true }  # future — instance-first now

  - id: retrocomputing-drive
    source: challenges/retrocomputing-drive.yml
    output: challenges/RETROCOMPUTING.md
    title: "Retrocomputing Drive"
    depends_on:
      - challenges/apple2-drive.yml
      - challenges/pdp10-maclisp-drive.yml
      - challenges/lisp-machine-hack-off.yml
      - apple2-emulator-stack.yml
      - pdp10-its-stack.yml
      - lisp-machine-stack.yml
      - ../schemas/rig-setup-dna.yml
      - ../rigs/_TEMPLATE.SETUP.md

  - id: entryways-museum-map
    source: entryways.yml
    output: entryways/README.md
    title: "Museum map — entryways hub"
    render: { mode: llm, tone: invitation, verbosity: standard }
    depends_on:
      - cross-links.yml
      - ../ENTRYWAYS.md
      - ../TRAILS.md
    note: "Instance-first — per-doorway pages in entryways/*.md; not bulk-regenerated by pnpm facades"

  - id: cross-links-trails-index
    source: cross-links.yml
    output: ../TRAILS.md
    title: "Trails index"
    render: { mode: llm, tone: invitation, verbosity: standard }
    depends_on:
      - entryways.yml
    note: "Instance-first — per-trail pages in trails/*.md"

see_also:
  - { path: INDEX.yml, why: "Process spec registry" }
  - { path: cross-links.yml, why: "Narrative trails — where to wander next" }
  - { path: ../schemas/markup-facade.yml, why: "Facade contract" }
  - { path: ../skills/INDEX.yml, why: "MOOLLM skills harvest registry" }
