    - { id: procedural_beauty, human: trails/procedural-beauty.md, pitch: "Generative art + runnable artifacts — Perlin, Debevec, Levin, Cerveny" }
    - { id: maxis_sims_lineage, human: trails/maxis-sims-lineage.md, pitch: "SimCity → Dollhouse → The Sims → Spore — the genealogy + 167 source images" }
    - { id: the_card_game, human: trails/the-card-game.md, pitch: "Stack guest CARDs as MTG verbs — combos across guests; Slats judges" }
    - { id: cs547_seminar_lineage, human: trails/cs547-seminar-lineage.md, pitch: "Winograd's Stanford CS547 → Will's 1996 talk → Gosling's 1995 talk → the Repo Show" }
    - { id: augmentation_and_hypertext, human: trails/augmentation-and-hypertext.md, pitch: "Engelbart's augmentation + Nelson's hypertext + Weiser's calm tech → Player-in-the-Middle (memorial mode)" }

trails_pitch_wacky:
  note: "Get weird — put after the serious stuff. Reactor: crazy-idea-jam.yml / CRAZY-IDEA-JAM.md"
  items:
    - { id: stupid_fun_forward, human: trails/stupid-fun-forward.md, pitch: "RoboResurrection, soul bridges, cells that travel between games — Stupid Fun Club energy aimed at the future" }

rooms_pitch:
  human: entryways/rooms.md
  rooms:
    - { path: ../repo-shows/CARD.yml, title: "Shows", pitch: "Planted episodes + seeds — will-wright flagship" }
    - { path: ../characters/CARD.yml, title: "Guests", pitch: "Invitations + CARD.yml per person — portrayal ethics" }
    - { path: CARD.yml, title: "Process", pitch: "Format, drag race, retro, vision — yaml girders" }
    - { path: ../rigs/CARD.yml, title: "Rigs", pitch: "Personas you wear to compete — yaml + SETUP DNA" }
    - { path: ../skills/INDEX.yml, title: "Skills", pitch: "Harvest landing — repo-show + upstream MOOLLM" }
    - { path: ../schemas/CARD.yml, title: "Schemas", pitch: "Portrayal, rigs, invitations — validation contracts" }

