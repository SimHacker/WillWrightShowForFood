  note: "Sideways leaps — full pages in trails/*.md and TRAILS.md"
  items:
    - { id: repo_show_spine, human: trails/repo-show-spine.md, pitch: "The show IS the repo — RTFR, play on your rig, harvest skills back" }
    - { id: constructionist_lineage, human: trails/constructionist-lineage.md, pitch: "Winograd 1996 → Will kickoff → Papert/Kay K-lines → open Micropolis" }
    - { id: drag_race_and_ai_offs, human: trails/drag-race-and-ai-offs.md, pitch: "Game-show formats — Slats judges, ai-offs scores the spend" }
    - { id: retrocomputing_drive, human: trails/retrocomputing-drive.md, pitch: "One spec, many platforms — SETUP DNA is the viral piece" }
    - { id: retro_guests_real_wire, human: trails/retro-guests-real-wire.md, pitch: "Lars boots ITS; Thomas wires FujiNet — emulated meets real wire" }
    - { id: live_production, human: trails/live-production.md, pitch: "Brain stream overlay + Philahue audience bus" }
    - { id: moollm_compose, human: trails/moollm-compose.md, pitch: "WWSFF as microworld plugin — skills inherit from shows" }
    - { id: rig_personas, human: trails/rig-personas.md, pitch: "download → install → configure → replicate → mash up" }
    - { id: schemas_and_ethics, human: trails/schemas-and-ethics.md, pitch: "Contracts before characters — portrayal and rig shape" }
    - { id: archive_and_provenance, human: trails/archive-and-provenance.md, pitch: "Public bud vs private archive — export log, primary sources, honest status" }
    - { id: game_design_lineage, human: trails/game-design-lineage.md, pitch: "Toys, possibility space, player types — Wright, Yoot, Bartle, Librande, Gingold" }
    - { id: direct_manipulation, human: trails/direct-manipulation.md, pitch: "See it, touch it, change it live — Shneiderman, Myers, Victor, Winograd" }
