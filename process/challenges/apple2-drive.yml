# APPLE ][ DRIVE — retrocomputing instance (Micropolis AI Drag Race / flair lap)
# Family: retrocomputing-drive.yml — rig = languages + tools + platform (emulator counts)
# Stack background: apple2-emulator-stack.yml (DonHopkins authoritative layers)

meta:
  id: apple2-drive
  status: seed
  family: retrocomputing-drive
  type: [drag_race_challenge, flair_class, emulated_runtime, real_hardware_ok]
  tagline: "Drive the Apple ][ — INTEGER BASIC if you dare"
  class: flair
  celebrity_judge: ../characters/slats/judge-rubric.yml

pitch: |
  Same spec CARD as everyone else — declare your full rig: languages (APPLESOFT, INTEGER,
  6502, FORTH…), tools (apple2js, cc65, Cursor…), platform (real ][ iron or emulator).
  Emulators are platforms. Cursor + MOOLLM drive whichever stack you pick. Hot-write a disk,
  boot on Emularity, or bring real hardware to the runway. Slats judges werk.

audience_chant: "CODE THAT SPEC!!!!! (on the ][)"

challenge_lanes:
  flair_showoff:
    declare: flair_class
    judges: [Slats, audience, brain_stream]
    pick_one_or_more:
      - "HELLO WORLD in APPLESOFT floating-point BASIC — boot in browser, photo for the runway"
      - "INTEGER BASIC if you dare — no floats, all nerve"
      - "FORTH or 6502 asm victory lap on real or emulated hardware"
      - "Hot-write a character byte into live disk buffer — Don's signature move (see stack L0)"
      - "Slats RoboResurrection tie-in — run legacy Slats binary in emulator on stream"
    slats: "Werk the spec on the ][ — or sashay with honor and a GOTO 20 story"

  measurement_vertical:
    declare: stick_shift_or_artisanal
    judges: [spreadsheet, rubric, human]
    spec_cards:
      L0_disk_io: "Read/write one sector on in-memory .dsk — demo + test"
      L1_dos33: "Catalog a DOS 3.3 disk — list one file"
      L2_driver_seed: "Parse one known game data block (Mind Mirror seed, etc.)"
    note: "Each layer independently shippable — aligns with fundable stack goals"

rig_declaration:
  required_in: rigs/<persona>.rig.yml
  setup: rigs/<persona>.SETUP.md
  components:
    languages: "Target + host — e.g. INTEGER_BASIC on ][, Rust on host cross-assembling 6502"
    tools: "apple2js, cc65, xa, disk editors, Cursor, MOOLLM"
    platforms: "apple2_real | apple2_emulated"
    emulators: "apple2js, MAME, Emularity — declare version; optional if real iron"

how_it_runs:
  host_drops: "Spec CARD — e.g. 'Print MICROPOLIS CLASS on the ][' or 'Touch sector 0'"
  contestant:
    - "Declare flair vs measurement lane + full rig (languages, tools, platform, emulator)"
    - "rigs/<persona>.rig.yml — reproducible toolchain in components"
    - "rigs/<persona>.SETUP.md — others reproduce and mod without you in the room"
    - "Implement on branch — screencast or browser link on PR"
    - "thoughtful-commitment — Thinking ref; homefun grading applies"
  proof:
    - "Working demo URL or recording"
    - "Optional: Cursor spend CSV if AI-assisted"
    - "cursor-mirror composer id"

example_rig_persona:
  file: ../rigs/apple2-flair-lap.rig.yml
  setup: ../rigs/apple2-flair-lap.SETUP.md
  costume: "Disk ][ tiara, INTEGER BASIC sash, Slats resurrection cape optional"

stack_background:
  see: apple2-emulator-stack.yml
  emulator: apple2js
  collaborators: [Thomas Cherryhomes, Steve Wozniak dream guest, Internet Archive Emularity]

