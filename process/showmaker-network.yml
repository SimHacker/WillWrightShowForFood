# SHOWMAKER NETWORK — graph of shows, links, and publications
#
# Literally a network: nodes = show objects (CARD dirs), edges = typed links.
# Audience runs shows on their branches; PRs link new nodes into our graph.

meta:
  id: showmaker-network
  status: seed
  type: [graph, publication_network, storymaker_for_shows]

what: |
  A ShowMaker network — interrelated show proposals and finished shows as first-class
  objects. Not a linear playlist: a GRAPH you can browse, fork, and extend.

nodes:
  show_object:
    shape: "repo-shows/<name>/ — SHOW.yml + GLANCE + README + optional pitch video CARD"
    branch_as_object: "family-album-cards pattern — `<Type>_<id>` on branches"
  character:
    shape: "characters/<name>/ — portrayal + question-ads"
  technique:
    shape: "skills/ — bred MOOLLM skills from harvest"

edges:
  types: [flows_from, guest_of, implements, bridges_to, competes_with, nests_inside]
  storage: "yaml links in INDEX.yml + REPO-SHOWS.yml + per-show ties_to"
  pr_adds_edge: "Contributor PR adds node + one or more edges — we merge into index"

your_show:
  steps:
    - "Fork or branch"
    - "Plant a show seed (SHOW.yml + README)"
    - "Run your Repo Show on your rig — any automation level"
    - "Document techniques — yaml backbone + markdown facade"
    - "PR back to link your show object + edges into the network"
  declare_your_class:
    rule: "Don't exclude — declare and have fun. It's just a game."
    parallel: |
      Same shape as sports categories (weight class, age bracket, amateur vs pro): the answer
      isn't blanket exclusion — it's honest declaration and fair comparison within class.
      Rig wars shouldn't be culture-war exclusion either. Artisanal, intentional, vibe,
      orchestrated — pick your lane, say so in your PR, compete on taste and power.
    not_a_no_brainer_elsewhere: |
      Don's view: the trans-in-sports fight is mostly a no-brainer misfire — declare category,
      don't ban people from the game. We apply that here: every rig class welcome if declared.
    honesty: "Misdeclare your class and the audience votes with thumbs — that's the ref"
    token_budget_tiers:
      principle: |
        Declare your model tier and token budget — tight-budget wranglers get real recognition.
        Wrangling a smaller model to a better solution is skill — like staying on a bull ride:
        thrashing through hallucinations and retries and having a good time of it.
      compare_within_class: "Premium-tier vs budget-tier vs artisanal — fair comparison only inside declared class"
      budget_skill: |
        People on tighter token budgets who steer cheap/fast models to elegant output demonstrate
        craft every bit as much as hand programmers. Document the ride — retries, recoveries, wins.
      split_rig_strategy: |
        Valid pattern: spend on high-level planning (expensive model), execute designs on budget
        model (e.g. Cursor Composer 2.5 Fast) — knock implementation out of the park, tokens left
        for the month. Declare both tiers in your rig report.
      host_note_2026-06: |
        Don building this repo on Composer 2.5 Fast right now — eating it up, knocking designs
        out of the park, shitloads of tokens left after prior spend on high-level planning.
      report_usage: |
        Great to report token usage and spending — we compare how efficiently or extravagantly
        you arrived at a solution (err, measuring dick sizes — sorry, cost-to-ship metrics).
        Declare class + report numbers; compare fair within tier.
      stick_shift_model_switching:
        also_called: [model_clutch, stick_shift_rig]
        metaphor: |
          Driving stick shift along a winding ocean cliff — read the road, shift models at the
          right moment, don't grind gears or ride the clutch. Efficient multi-model routing is skill.
        proof: |
          All of it shows up in the Cursor spend log — timestamped model switches per phase.
          Export the spreadsheet; pair with cursor-mirror timeline. We score smooth shifts vs stalling.
        vs_bull_ride: "Bull ride = wrangle one tier through chaos; stick shift = orchestrate many tiers cleanly"
  no_gatekeeping: "All rig classes welcome — declare honestly. Extra respect for artisanal programmers, budget bull riders, AND stick-shift model switchers."
  share_your_rig: "PR rigs/<slug>.rig.yml — extensible schema: download/install/configure/use/replicate/mash_up (schemas/rig-schema.yml)"

publication:
  vision: vision-and-ambition.yml
  facade: VISION.md
  layers:
    - "GitHub renders README — browse without account"
    - "YouTube pitch cards — thumbs + donations as visible votes (show-proposal-network)"
    - "Repo graph — INDEX.yml, CARD.yml, two-way navigation"
  automation_roadmap:
    - "Scaffold show CARD from template"
    - "Generate link PR body from show metadata"
    - "Validate yaml + representation-ethics on PR"

competitions:
  declare_not_exclude: "Don't ban rigs — declare class, compete fair, have fun. It's just a game."
  scoreboard:
    what_we_judge:
      - "Cost to ship — tokens, spend, wall-clock: efficiency vs extravagance (report honestly)"
      - "Solution quality — taste, power, clarity, humor (how good was the result?)"
      - "Integration — merge back into the evolving organism via PR"
      - "Abstraction — reusable parts lifted into skills/ and packages/ for other organisms"
    ai_offs_proof: "cursor-mirror session + Cursor spend export + thoughtful-commitment commits — see ai-offs.yml"
    cost_to_ship: |
      Report token usage and spending. We compare how efficiently or extravagantly you arrived
      at the answer — in addition to judging how good that answer was. Artisanal = zero tokens;
      budget bull ride = tight spend + high taste; premium slop = declare and take your lumps.
  taste_and_power: "Compare implementations within declared class — artisanal vs vibe vs orchestrated vs budget-tier"
  budget_bull_ride: |
    Tight token budget + small/fast model wrangled to a better solution = bull-ride skill.
    Hallucinations, retries, recoveries — show the ride; audience respects the wrangling.
  stick_shift: |
    Stick shift on a winding ocean cliff — switch models efficiently through the curves.
    Premium for the hairpin, budget for the straightaway, artisanal for the final mile.
    Every shift = thoughtful-commit — see stick-shift-protocol.yml.
    Proof lives in the Cursor spend log (timestamped shifts); cursor-mirror shows whether you
    shifted smooth or ground gears. Declare multi-model routing; compete on elegance of shifts.
  stick_shift_protocol: stick-shift-protocol.yml
  code_that_spec:
    see: code-that-spec.yml
    tagline: |
      NAME THAT TUNE → CODE THAT SPEC. "I can code that spec in two million tokens!"
      Audience: "CODE THAT SPEC!!!!!" Bid tokens or time; prove with spend log + PR.
    rig_costumes: "Let's Make a Deal — visualize your rig as a costume; declare class"
    stiletto_sprint: "Drag Queen Olympics energy — maximum flair under constraint; sprint the spec"
  micropolis_ai_drag_race:
    see: micropolis-ai-drag-race.yml
    brand: "Micropolis AI Drag Race — flagship variety format"
    tagline: "Start your engines — rig personas werk specs; spend log judges; merge or sashay"
    celebrity_judge: ../characters/slats/judge-rubric.yml
    challenges: [design_challenge, code_that_spec_mini, stiletto_sprint, manual_transmission, lip_sync_for_your_commits, harvest_runway]
  manual_transmission:
    see: manual-transmission.yml
    contest_prompt: "What's the smallest model — or fewest tokens — you can code the spec with?"
    tagline: "Rubik's-cube scoring — many rubrics at once; spend CSV = piss test"
    origin: "Scooped twice from creative misunderstanding — Don may mumble on purpose"
    overlay: brain-stream.yml
    moollm: [rubric, experiment]
    credits: Mike Gallaher
  brain_stream:
    see: brain-stream.yml
    tagline: "Spy on the brain — prompts, thinking, GH links on the broadcast bus"
    app: ../apps/stream-gateway/
  model_branching:
    see: model-branching.yml
    tagline: "Snapshot chat, fork model at any bubble, compare trajectories — orchestration gold²"
  man_vs_machine: "Delightful adversarial play — not anti-AI, not anti-hand, not anti-budget; pro-declaration"
  breed_winners: "Merge technique DNA from winning branches — horizontal gene transfer via git"

evolving_organism:
  metaphor: "The repo federation is one organism evolving — shows are organelles; PRs merge DNA"
  merge_back: "Judge the solution, then integrate it — PR merges tissue into main timeline"
  abstract_reusable:
    skills: "Protocols → skills/ — MOOLLM skills other organisms compose"
    packages: "Code → packages/ — @wwsff/* shared library for other repos and shows"
    rule: "Extract what's reusable; don't leave genius trapped on a dead branch"
  see: ../packages/README.md

nesting:
  metaphor: serial_endosymbiosis + powers_of_ten
  examples:
    - "home in city in world in galaxy in universe in PC in home"
    - "character organelle in game organelle in show organelle in federation repo"
  git: "Branches = nested timelines; PRs = merge DNA; issues = cross-world quests"

ties_to:
  - repo-show-format.yml
  - ai-offs.yml
  - code-that-spec.yml
  - micropolis-ai-drag-race.yml
  - manual-transmission.yml
  - brain-stream.yml
  - rig-feedback.yml
  - ../repo-shows/INDEX.yml
  - ../repo-shows/REPO-SHOWS.yml
  - ../schemas/guest-invitation-status.yml
  - SimHacker/DonHopkins/projects/micropolis-moollm/process/show-proposal-network.yml
  - SimHacker/DonHopkins/projects/micropolis-moollm/process/character-endosymbiosis.yml
