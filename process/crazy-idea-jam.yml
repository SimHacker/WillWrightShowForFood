# CRAZY IDEA JAM ‚Äî the forward-thinking reactor (public, curated)
# The wackiest, most imaginative, most forward-thinking ideas in the show ‚Äî the stuff that
# makes Will lean in. Curated public-safe from Don Hopkins' own crystallized design notes
# (SimHacker/DonHopkins crystallized/DESIGN-WISDOM.yml + AI-MANIFESTO.yml) and the show seeds
# that already live in this repo. Tight blurbs here; deeper girders linked per idea.
#
# Tone: joyful, irreverent, a little blasphemous ‚Äî Stupid Fun Club energy. Keep it kind.
# Human facade: CRAZY-IDEA-JAM.md | Trail: cross-links.yml#stupid_fun_forward

meta:
  id: crazy-idea-jam
  status: jam (living seedbed ‚Äî ideas graduate into shows, schemas, skills)
  authored_by: don-hopkins
  one_line: "AI proposes; the PLAYER disposes ‚Äî now let's get weird with it."
