# CRAZY IDEA JAM — the forward-thinking reactor (public, curated)
# The wackiest, most imaginative, most forward-thinking ideas in the show — the stuff that
# makes Will lean in. Curated public-safe from Don Hopkins' own crystallized design notes
# (SimHacker/DonHopkins crystallized/DESIGN-WISDOM.yml + AI-MANIFESTO.yml) and the show seeds
# that already live in this repo. Tight blurbs here; deeper girders linked per idea.
#
# Tone: joyful, irreverent, a little blasphemous — Stupid Fun Club energy. Keep it kind.
# Human facade: CRAZY-IDEA-JAM.md | Trail: cross-links.yml#stupid_fun_forward

meta:
  id: crazy-idea-jam
  status: jam (living seedbed — ideas graduate into shows, schemas, skills)
  authored_by: don-hopkins
  one_line: "AI proposes; the PLAYER disposes — now let's get weird with it."
  idea_sources: "Ideas come from EVERYONE — not just AI. Humans, the audience, Will especially, Don even, famous over-reachers like Peter Molyneux, and you. Anyone can propose; the PLAYER disposes."
  human: CRAZY-IDEA-JAM.md
  upstream_full: SimHacker/DonHopkins/projects/micropolis-moollm/crystallized/DESIGN-WISDOM.yml

# THE CROWN JEWEL
ideas:

  data_portability_crown_jewel:
    emoji: "💎"
    blurb: |
      The CROWN JEWEL of Will's 1996 Stanford talk — the goal he named and the one STILL
      not shipped: characters, homes, cities, objects, ideas and MEMORIES moving between
      games and universes. Every bridge we build (Stardew, Proxi, Spore, Shattered, …someday
      Wizardry) is one implementation facet of this single jewel. That's why they're so cool.
    non_destructive: "Bridging is non-destructive + regenerable: the soul-file is canonical, runtimes are ephemeral. Send a character to die in a dungeon, regenerate at will."
    ties: [../characters/will-wright/sources/1996-04-26-winograd-interfacing-to-microworlds/README.md]

  character_endosymbiosis:
    emoji: "🦠"
    blurb: |
      A cross-game character is a eukaryotic CELL. Each game it passes through gets engulfed
      as a nested-membrane ORGANELLE — a sub-tree with its own "DNA" (that game's schema) —
      gaining powers at every step, all in parallel. The über-character projects DOWN into a
      game to play, syncs the diff back UP into only that game's organelle; the whole tree
      keeps its SHAPE. Properties DIFFUSE between sibling organelles along semi-permeable
      channels. Organelles can be EMULATED legacy binaries (Mind Mirror and Little Computer
      People in an Apple ][ emulator). Lynn Margulis's serial endosymbiosis as the data model 
      for the crown jewel.
    progenitor: "SPORE prefigured this — pond→creature→tribe→civ→space — but lacked one identity TRAVELLING between layers with its history. The Spore bridge gets a per-LEVEL end: one self reincarnated cell→fish→gazelle→human→town→ship."
    ties: [../characters/will-wright/CARD.yml]

  identity_threads_through:
    emoji: "📖"
    blurb: |
      We sure do STATS — attributes cross between worlds too. But the magic is that IDENTITY
      threads through every game: a creature reincarnated fish→gazelle→human→town→ship shares
      almost no attributes across forms, yet it's the same SELF, and its lived story is the thread
      the stats hang on. The Sims FAMILY ALBUM is the canonical history artifact: import a Stardew
      life into The Sims as a physical photo-album BOOK you shelve, read on the couch, and leave
      out for guests.

  player_in_the_middle:
    emoji: "🛂"
    blurb: |
      Syncing between games is itself a GAME — never automate it silently. The PLAYER sits in
      the middle: a benevolent, intentionally-not-gendered-in-the-middle, the customs officer at
      each semi-permeable membrane, steering what flows where. AI proposes channels and
      diffusions and transformations; the human disposes — approve / attenuate / block / remix. Curation of the
      flow IS the character's evolution.
    archetype_gallery: "The player as gatekeeper-transformer: Maxwell's Daemon, the 'Papers, Please' customs agent (a bridgeable game!), Saint Peter's Gates, Satan's Back Door, the psychopomps at the Bifröst — a person judging what crosses, made into gameplay."
    constitutional: "PITM is our human↔AI manifesto: center PEOPLE, not the machine. Pairs with no-ai-slop (don't let AI hollow out the WORK) and no-ai-soul (don't let AI hollow out the AUTHOR — the soul stays with the people)."
    upstream: SimHacker/DonHopkins/projects/micropolis-moollm/crystallized/AI-MANIFESTO.yml

  import_the_virtue_filter_the_vice:
    emoji: "🧪"
    blurb: |
      To learn from someone problematic, IMPORT them as a filtered persona-organelle: keep-
      channels diffuse the virtues (re-aimed at our mission); a "bullshit + exploitation
      filter" channel stays DISABLED so the vices stop at the membrane. We play the game we're
      designing — endosymbiosis applied to OURSELVES, Don as player-in-the-middle. First test:
      MrBeast TENACITY (kept) minus hype/exploitation (filtered), channeled into constructionism.

  sync_config_is_gameplay:
    emoji: "🔧"
    blurb: |
      Bring content-management and configuration INTO the world AS a game. Wiring the cross-game
      sync constraint network is a green-field of casual mini-games — patch-building / widget workshop / factory automation
      / tycoon play. Players build and SHARE bridge configs like Widget Workshop (Maxis 1995) or
      Max/MSP patches. Includes cross-VERSION bridging: the WEDDING ALBUM round-tripping a couple
      through Sims 1⇔2⇔3⇔4, each edition a clean non-destructive organelle.

  robo_resurrection:
    emoji: "🤖⛪"
    blurb: |
      SLATS LIVES! The first RoboResurrection. Read the old Stupid Fun Club robot-brain code on
      the show, revive it live (AI-assisted), and Slats CALLS IN — his own face, his own voice —
      says shit, gets interviewed, gets reprogrammed, gets interviewed AGAIN. The diff is the
      drama. Do it on EASTER SUNDAY. Start a cult. "It seemed to be the thing to do at the time."
    robopoetry_ceremony: "Interpret Slats' recorded voice-synth stream-of-thought as lyrical robopoetry and sing along — a seriously, respectfully presented religious ceremony with Stupid Fun Club irreverence."
    ties: [../repo-shows/will-wright/slats-reincarnation.yml, ../characters/slats/CARD.yml]

  phoneloper:
    emoji: "🗣️"
    blurb: |
      Quintessential Stupid Fun Club prototyping: a toy/tool Don built in 2003 for Will Wright's
      Stupid Fun Club to create and edit expressive speech "Phonelopes." It takes CMU's Flite
      synthesizer, exports the diphone/pitch/timing as editable XML, and lets you DRAG the
      diphones around, bend the pitch and amplitude tracks, stretch durations, and even load an
      audio file to "rotoscope" (phonescope) a natural pitch curve onto synthetic speech. Hold
      the spacebar and it SINGS — accidental granular-synthesis musical instrument. Python +
      Tkinter + SWIG + Flite + Edinburgh Speech Tools — a standalone expressive-speech toy,
      exactly the toy-first, play-to-discover spirit Will loves.
    not_the_slats_voice: |
      Phoneloper is its own thing — NOT the Slats voice lineage. Slats spoke via IBM ViaVoice
      first, then Microsoft SAPI and several voices including Cepstral. Synthesizer genealogy:
      Festival (the big Scheme/Lisp-scripted synthesizer, CSTR Edinburgh) → Flite (CMU's small
      embedded C version) → Cepstral (the commercial embedded-voice product in that lineage).
      Phoneloper happens to ride on Flite for its diphones, but it's an editor, not Slats' voice.
    video: "https://www.youtube.com/watch?v=qy5cqV8ypIs"
    status: "Source releasable — Don will add it to this monorepo soon"
    ties: [../characters/don-hopkins/career/stupid-fun-club.yml, ../repo-shows/will-wright/slats-reincarnation.yml]

  amsterdam_coffeeshops_app:
    emoji: "🍃"
    blurb: |
      An iPhone app Don built in 2009 with photos and info about every coffeeshop in Amsterdam,
      hacked at the Bluebird coffeeshop on the way home from his TomTom day job — solo, for fun,
      to teach himself iPhone and web-server programming. Complex, never released, decades out of
      date now — but a fun idea Don would love to REINCARNATE and reinvent. Behind it: a spreadsheet
      database of every Amsterdam coffeeshop that drove the app.
    became_bongo_bingo: "The same database powered BONGO BINGO (see below) — and together they were the PROGENITOR of StoryMaker / Bar Karma / Urban Safari."
    pivotal_moment: |
      Don showed this app and his iLoci (Memory Palace) talk at an Amsterdam meetup where Will
      Wright was present. Will looked at it and realized it was EXACTLY what he needed for what he
      wanted to do with CurrentTV and other projects, and said: "Hey, by the way, I'm leaving EA —
      want to work together again, remotely?" Don said yes, left TomTom, and went back to Stupid
      Fun Club projects. They then built several client/server iterations together — including
      MediaWiki plugins and a Unity app. (This is how Don rejoined Will.)
    video: "https://www.youtube.com/watch?v=nG90XG3STz8"
    vibe: "No words — look-and-feel + Amsterdam coffeeshop ASMR (chatter, distorted music)"
    leads_to: [bongo_bingo, creationtv_storymaker, urban_safari_gps_storytelling]
    ties: [../characters/don-hopkins/career/stupid-fun-club.yml]

  bongo_bingo:
    emoji: "🚲🎯"
    blurb: |
      A web game wired to the **Foursquare API** on top of Don's all-Amsterdam-coffeeshops
      database: you get a BONGO BINGO card of randomly chosen coffeeshops, then BIKE around town
      checking in at each one — GPS-verified by your phone's coordinates. At each check-in you say
      whatever you like about what you tried, feeding your notes back into the coffeeshop
      spreadsheet metadata. Geolocated, social, generative — and the true PROGENITOR of StoryMaker
      / Bar Karma / Urban Safari. Built solo at TomTom for fun; ripe to reincarnate.
    progenitor_of: [creationtv_storymaker, urban_safari_gps_storytelling]
    ties: [../characters/don-hopkins/career/stupid-fun-club.yml]

  creationtv_storymaker:
    emoji: "📺"
    blurb: |
      CreationTV — an iPhone prototype Don built for Will Wright at the Stupid Fun Club — grew
      into StoryMaker, the collaborative branching-storytelling system behind CurrentTV's Bar
      Karma: the first online community-developed network television series. Branching narrative,
      voted and built by the audience, aired on real TV. A direct ancestor of audience-as-cast and
      questions-as-PRs in the Repo Show.
    full_stack: |
      MediaWiki front-end server + Python back-end; Flash StoryMaker client embedded in the wiki;
      geolocated scenes with Google Maps + KML overlays; admin CMS; iPad app (MapKit); Facebook
      app with album import/export; voice-synth story reading; and a Unity3D 3D branching-story
      visualizer. Same server, many clients.
    videos:
      creationtv: "https://www.youtube.com/watch?v=Nb_-J1lv-B8"
      storymaker_comprehensive: "https://www.youtube.com/watch?v=_2yEHs_WLzQ"
    bar_karma: "https://en.wikipedia.org/wiki/Bar_Karma"
    vibe: "Abstract, mesmerizing interface play — no voice, just look-and-feel"
    archival_lead:
      gold: |
        The REAL Bar Karma production database — the StoryMaker corpus of community submissions,
        producer-selected outlines, voted storyboards, and how they turned into shot episode
        scripts — would be gold for a Repo Show segment. Probably locked up tight, but worth asking.
      who_to_ask:
        - { who: "Will Wright", why: "Co-creator; StoryMaker designer" }
        - { who: "Peter Swearengen", why: "StoryMaker Producer (verified spelling)" }
        - { who: "Albie Hecht / Worldwide Biggies", why: "Executive producer; production company" }
        - { who: "Laura Knight", why: "Supervising Producer" }
        - { who: "David Cohn", why: "Current TV Executive in Charge" }
      facts:
        run: "Current TV, 12 episodes, Feb 11 – Apr 29, 2011; produced by Worldwide Biggies; filmed at Ironbound Film Studios, Newark NJ"
        community: "~2,000+ contributors recruited from Will's Facebook; 30+ credited on episode 1"
      status: "lead — not yet asked; rights/ownership unknown (Current TV / Worldwide Biggies era)"
    ties: [../characters/don-hopkins/career/stupid-fun-club.yml, ../characters/matthew-sibigtroth/]

  mediagraph:
    emoji: "🎵🥧"
    blurb: |
      A Unity3D music-navigation prototype Don built for Will Wright at the Stupid Fun Club:
      arrange all your songs on a map, connect them with ROADS, and flick down the roads to hop
      the network. Each song has a pie menu (radius, biome) and its own cellular-automata "biome"
      that grows and competes with its neighbors (CA at Will's request). It uses one kind of
      nested hierarchical pie menu to build and edit another kind of geographic networked pie menu
      — pies as a map/graph, not a tree.
    video: "https://donhopkins.medium.com/mediagraph-demo-a7534add63e5"
    ties: [../characters/don-hopkins/career/stupid-fun-club.yml]

  iloci_memory_palace:
    emoji: "🏛️"
    blurb: |
      iLoci — an iPhone app + server based on the **Method of Loci** (the ancient Memory Palace
      technique): build a network of "locations" (rooms) instead of menus, edit by dragging and
      "kissing" them together to connect/disconnect, attach images, notes, URLs, and a built-in
      web browser. Really a **pie-menu network editor**. Don built it BEFORE the Stupid Fun Club,
      at TomTom, at the Bluebird, then gave a talk at Mobile Dev Camp Amsterdam (Nov 28, 2008).
      Part of the through-line DreamScape (1995) → iLoci → MediaGraph → Micropolis → MOOLLM.
    video: "https://www.youtube.com/watch?v=03ddG3jWF98"
    ties: [../characters/don-hopkins/career/work-history.yml]

  dreamscape_scriptx:
    emoji: "🌀"
    blurb: |
      The ancestor of it all: DreamScape, Don's Kaleida Labs ScriptX demo at the **1995 Apple
      WWDC** — rooms + objects connected in an editable map (bump room icons together to link
      them), parts you plug together like Mr. Potato Head, dynamic physics, and a Netscape bridge
      that publishes the live world as interlinked web pages. Demoed live without crashing. Origin
      of Don's mantra **"a nurturing environment, not a killer app."** Rooms-that-kiss-to-connect
      reappears in iLoci, MediaGraph, and MOOLLM.
    video: "https://www.youtube.com/watch?v=5NytloOy7WM"
    ties: [../characters/don-hopkins/career/work-history.yml, vision-and-ambition.yml]

  simopolis_soul_bridge_afterlife:
    emoji: "👻"
    blurb: |
      A two-way, round-trippable SOUL LEDGER between LucasArts' Afterlife and The Sims. Souls
      are a portable resource that crosses the membrane (player-in-the-middle again) — heaven and
      hell as upstream supply for downstream worlds. The bridge IS the gameplay.
    ties: [../repo-shows/heather-steve-alvey/afterlife-zombie-bridge.yml]

  hell_is_full_zombie_sims:
    emoji: "🧟"
    blurb: |
      "Hell is full." Debit damned souls by religion from an Afterlife save and spawn matching
      ZombieSims waves with interchangeable SimFreaks / SimSlice skins; round-trip the outcomes
      back to the hell ledger. Scale toward They Are Billions horde pressure. Interview the
      zombie suppliers: artisanal, farm-grown, soil-to-spike? SimFreaks & SimSlice spouses = 
      original and renounded Sims 1 content creators from the very beginning, 
      artisan label on the jar, SFC alumni; the hell save = the industrial supply chain.
    ties: [../repo-shows/heather-steve-alvey/afterlife-zombie-bridge.yml]

  github_as_mmorpg_multiverse:
    emoji: "🌌"
    blurb: |
      The show artifact IS a public repo, so treat GitHub as a multiplayer multiverse: branches
      are parallel universes, PRs are timeline merges, issues are the HN-style tavern, and every
      viewer gets their own playspace. Repossess "repo" from the tow-truck — Repo Man / Woman /
      Bot honorifics; MMORPG quest levels onboard kids via web-editor PRs; badges via Actions.

  self_times_moollm:
    emoji: "🪞"
    blurb: |
      Self invented prototype-based objects and adaptive simplicity; MOOLLM reimagines that
      lineage for the LLM era — directories as prototypes, skills as inheritable behavior, the
      Stage Magic Principle as the semantic image pyramid, Idea Scavenging as persistent
      characters. Build it live with David Ungar; artisanal hand-programming vs intentional AI.
    ties: [../repo-shows/david-ungar-self-moollm.yml]

  yoot_boot_and_seaman:
    emoji: "🐟"
    blurb: |
      A clean-room successor to the Yoot lineage (working name YOOT BOOT — decided WITH Yoot, on
      air) and the spirit of Seaman: a talking creature that remembers you, judges you, and
      insults you between life lessons. The most forward-thinking thing about 1999 Seaman was
      that it treated the player as someone worth being rude to. BOOT is BOAT in Dutch.
    he_designs_we_code: "The collaboration model: Yoot designs it WITH us, we code it for him, he helps any way he likes — a new clean simulator (tower, boat, cruise liner, spaceship, submarine, whatever)."
    seaman_llm: "Reincarnate Seaman for the LLM era — memory + attitude is exactly what LLMs do well. It's certainly time."
    no_promises: "Yoot Tower itself is in a delayed/unknown licensing state — discussed only in the abstract, with no pressure on Yoot."
    ties: [../characters/yoot-saito/yoot-tower-discussion.yml, ../repo-shows/yoot-saito/SHOW.yml]

  simulator_effect:
    emoji: "🧠"
    blurb: |
      Will Wright's Simulator Effect (apophenia): players imagine the sim is vastly deeper than
      it is — a magical misunderstanding you must NOT talk them out of. Games run on two
      computers: the shallow tame one on the desk and the deep wild one in the player's head.
      The trick of optimizing games is offloading simulation into the player's brain. Rule of
      thumb: never simulate more than one layer below what the player can observe.

  full_nutrient_cycle:
    emoji: "🌱"
    blurb: |
      Land → Seed → Crop → Ingredient → Food → Body → Shit → Land. We cover the WHOLE loop as
      cellular automatists (rules on cells and objects, cycling through different phases like
      Chaim Gingold's SimCity diagrams illustrate in his book Making SimCity). 
      Water = donations; fertilizer = tokens.
      A Nurturing Environment, not a Killer App — the Flower Child nurtures; the buyout extracts.

  educational_data_literacy:
    emoji: "📊"
    blurb: |
      Make the sim EXPORT its guts. Earth-science professor Upmanu Lall (Columbia) wanted SimCity
      to spit out spreadsheets so students from any department would run experiments, analyze the
      data, and learn science through a game they relate to. Modern version: Micropolis & Yoot
      Tower stream raw + cooked telemetry and events into time-series DBs and d3 / Grafana
      dashboards — the engaging hook that teaches general data-literacy. Don wrote the proposal
      (OPTIMUS) in ~2002; it went nowhere until open-sourcing for OLPC finally made it possible.
    ties: [../characters/don-hopkins/career/simcity-lineage.yml]

  scriptable_simulators:
    emoji: "🧩"
    blurb: |
      Push ALL the UI out of the engine and let players reprogram the rest. emscripten + embind
      let you SUBCLASS the C++ game engine in JavaScript — so zones, agents, robots, monitors and
      data exporters are plug-ins, not recompiles. Then wire visual programming (Snap! / Blockly,
      Sandspiel-style) on top so kids live-code the simulation. Don already proved it with SWIG +
      Python: PacBot follows the roads eating traffic; the Church of Pacmania worships and attracts
      PacBots and feeds them. The SimAntics VPL spirit from The Sims — but easy to use and extend.
    ties: [../characters/don-hopkins/career/simcity-lineage.yml]

  towers_in_micropolis:
    emoji: "🏙️"
    blurb: |
      The concrete crown-jewel facet that makes everyone grin: embed multiple YOOT TOWERS inside
      your Micropolis city. Same era, same Maxis lineage, shared WASM / emscripten / embind /
      SvelteKit infrastructure — two open games sharing one stack so a tower can be a building in a
      city. Data portability you can point at.
    ties: [crazy-idea-jam.yml#data_portability_crown_jewel, ../characters/yoot-saito/]

  engelbart_keyset_3d_replica:
    emoji: "🖱️⌨️"
    blurb: |
      Democratize the Mother of All Demos desk. Publish **free Engelbart mouse + five-finger chord
      keyset models** (STL/STEP) — anyone can FDM print, cast resin, or add metal inserts. Sell SWAG:
      clicky non-functional toys, cat-toy mice, mini ornaments. Premium **working Bluetooth HID**
      kits — real mouse + real chord keyboard, PCBs, arm mount, fiberboard-style palm rest. Open
      files stay free forever; lightpenisland.net sells convenience and assembled kits. Preservation
      by proliferation — put the 1968 desk back in everyone's hands.
    preservation_framing: "Open models + maker kits + museum-shop SWAG — education and hands-on history"
    ties:
      - ../repo-shows/ideas/gags/lightpenisland-net.yml#engelbart_division
      - ../characters/douglas-engelbart/memorial.md
      - ../repo-shows/remembering-douglas-engelbart.yml

  cellular_automata_as_drm:
    emoji: "🫠"
    blurb: |
      The 1991 free-but-not-free demo: play the Unix SimCity for five minutes, and if you haven't
      bought a license the cellular automata wake up and MELT your city. DRM as generative art — the
      same CA rules (heat diffusion, EcoLiBra, Life, Brian's Brain) that later became the hypnotic
      "Space Inventory" you can just watch for hours. Punishment and beauty from the same engine.

  pie_menus_put_out_fires:
    emoji: "🥧🔥"
    blurb: |
      A live on-air bit about the interface shaping the thinking. UI critic Don Norman complained
      that pie menus made SimCity TOO easy — build a city fast without thinking, oops, nuclear
      meltdown, merrily on your way. Don's reply: "Linear menus caused the meltdown. The round menus
      put the fires out." Gestural, mouse-ahead pie menus turned a slow city-builder into a fast
      twitch game. Demonstrate it; argue about whether ease helps or hurts learning.
    ties: [../characters/don-hopkins/CARD.yml]

graduation:
  note: "Ideas leave the jam by becoming something runnable."
  paths:
    - "→ a show seed in ../repo-shows/"
    - "→ a schema in ../schemas/"
    - "→ a harvested skill in ../skills/ (cauldron)"
    - "→ a trail node in cross-links.yml"

