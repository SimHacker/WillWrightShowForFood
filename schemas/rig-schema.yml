# RIG SCHEMA — extensible rig definitions (download → mash up)
# Instances: ../rigs/<name>.rig.yml | template: ../rigs/_TEMPLATE.rig.yml

meta:
  id: rig-schema
  version: 0.2   # 0.2 adds optional `stage` block — multi-computer screencasting/streaming rigs
  extensible: true
  purpose: |
    Rigs are first-class objects — not vibes in a README. Each rig is a yaml document
    with lifecycle instructions so anyone can download, install, configure, use, replicate,
    and mash up your stack. Ship colocated SETUP.md as viral Rig DNA — emailable, sniffable
    markdown with canonical GitHub URLs and an LLM idempotent install/upgrade protocol that
    preserves user data. Declare class for fair ai-offs comparison.

rig_document:
  filename: "rigs/<slug>.rig.yml"
  setup: "rigs/<slug>.SETUP.md"
  setup_required: true
  setup_template: _TEMPLATE.SETUP.md
  setup_dna_schema: rig-setup-dna.yml
  setup_dna: |
    SETUP.md is standalone DNA: sniffable head (why/what/CTA), raw GitHub URLs for latest
    rig yaml, LLM protocol (idempotent, preserve .rig/<slug>/state.yml), human detail below.
  required_top_level: [rig, lifecycle]
  optional_top_level: [extends, components, stage, declare, proof, costume, mash_up_targets, see_also]

rig:
  fields:
    id: { type: string, required: true, pattern: "kebab-case slug" }
    name: { type: string, required: true, example: "Stick Shift Cursor + MOOLLM" }
    version: { type: string, default: "0.1" }
    author: { type: string, example: "github handle or character dir" }
    extends: { type: path, optional: true, example: "rigs/base/cursor-orchestrated.rig.yml" }
    rig_classes:
      type: array
      items: { enum: [artisanal, intentional, conscientious, vibe, orchestrated, budget_bull_ride, stick_shift] }
      required: true
    description: { type: string, required: true }

lifecycle:
  description: "Ordered instructions — shell commands, links, or numbered steps"
  phases:
    download:
      required: true
      what: "Get sources — clone repos, install apps, fetch models, export templates"
      shape: { steps: array, scripts: array, urls: array }
    install:
      required: true
      what: "Dependencies — pnpm, pip, brew, Cursor extensions, MCP packages"
      shape: { steps: array, scripts: array, verify: string }
    configure:
      required: true
      what: "Wire it — .cursor/rules, moollm hot.yml, MCP json, env vars, model defaults"
      shape: { steps: array, files: array, env: object }
    use:
      required: true
      what: "Day-to-day — how you actually work; when to switch models; which skills loaded"
      shape: { steps: array, workflow: string, contexts: array }
    replicate:
      required: true
      what: "Someone else reproduces your rig from scratch on a clean machine"
      shape: { steps: array, checklist: array, estimated_time: string }
    mash_up:
      required: false
      what: "Combine with other rigs — extends, compose-with, fork-and-graft instructions"
      shape: { extends: array, compose_with: array, graft: array, warnings: array }

components:
  optional: true
  fields:
    editor: { type: object }
    models: { type: array, note: "name, tier, when_to_use" }
    mcp_servers: { type: array }
    skills: { type: array, note: "Anthropic + MOOLLM paths" }
    repos: { type: array, note: "workspace compose-with" }
    moollm: { type: object, fields: [plugin_yml, hot_yml, skills_loaded] }
    languages:
      type: array
      note: "Contestant choice — host language, target language, show-off lane (Rust cosplay on host OK if demo runs on declared platform)"
    tools:
      type: array
      note: "Assembler, emulator front-end, disk utils, Cursor, MOOLLM — whatever you drive with"
    platforms:
      type: array
      note: "Where the spec runs — real hardware id, native OS, or retro target name"
    emulators:
      type: array
      optional: true
      note: "When platform is retro via emulation — apple2js, MAME, VICE, Emularity; declare version"

stage:
  optional: true
  added: 0.2
  purpose: |
    Describe the PHYSICAL screencasting/streaming setup: one or many computers, their
    displays, what gets captured, how feeds move between machines (NDI/capture card),
    the OBS compositing, overlay layout (incl. partial overlays over an app), and stream
    targets. Flexible enough for a solo single-machine rig OR a multi-computer rig.
  fields:
    machines:
      type: array
      note: "One entry per computer. Single-machine rigs have one."
      item:
        id: { type: string, example: "mac-main | legion-encoder" }
        role: { type: array, items: { enum: [source, capture, encoder, streamer, control, playback, guest] } }
        os: { type: string, example: "macOS 15 | Windows 11" }
        cpu: { type: string }
        gpu: { type: string, example: "Apple M-series | NVIDIA RTX (NVENC)" }
        displays:
          type: array
          item: { id: string, resolution: string, scaled: string, shows: "what app runs full-screen here" }
        runs: { type: array, note: "apps/services on this machine (Cursor, OBS, gateway, GUI, summarizer)" }
    capture_sources:
      type: array
      note: "What pixels/audio are captured and how."
      item:
        id: string
        kind: { enum: [display_capture, window_capture, browser_source, ndi, capture_card, audio, virtual_cam] }
        on_machine: { type: string, note: "machine id" }
        target: { type: string, example: "Cursor screen | GUI URL | game window" }
        alpha: { type: string, enum: [native, chroma_key, none], note: "browser_source=native; screen/window=none→chroma_key for transparency" }
        notes: { type: string }
    transport:
      type: array
      note: "How feeds move between machines."
      item:
        kind: { enum: [ndi, srt, rtmp, capture_card, usb, virtual_cam, lan_http] }
        from: { type: string, note: "machine id / source id" }
        to: { type: string, note: "machine id" }
        link: { type: string, example: "wired gigabit ethernet" }
        bitrate_note: { type: string, example: "full NDI 1080p60 ~100-150 Mbps" }
    obs:
      type: object
      fields:
        on_machine: { type: string }
        encoder: { type: string, example: "NVENC | Apple VT | x264" }
        canvas: { type: string, example: "1920x1080", note: "downscale retina to canvas — perf lever" }
        websocket: { type: object, fields: [enabled, port, controlled_by], note: "obs-websocket for scripted VJ control" }
        scenes: { type: array, item: { name: string, sources: array, layout: string } }
        plugins: { type: array, example: "[DistroAV, Move Transition, Advanced Scene Switcher, StreamFX]" }
    overlay_layout:
      type: array
      note: "How overlays are composed — incl. PARTIAL overlays that cover only part of an app."
      item:
        id: string
        source: { type: string, note: "browser_source / capture id" }
        covers: { type: string, example: "Cursor chat history pane (NOT the input bar)" }
        leaves_exposed: { type: string, example: "Cursor input box (native model switcher/attach)" }
        scale_zoom: { type: string, example: "docked | fullscreen-on-demand" }
        mode_ref: "apps/stream-gateway/overlay-viewer.yml#rendering.modes"
    stream_targets:
      type: array
      item:
        platform: { enum: [twitch, youtube, kick, restream, local_record, none] }
        protocol: { enum: [rtmp, rtmps, srt, whip, file] }
        surfaces: { type: array, note: "obs_baked | companion_web_app | twitch_extension (apps/stream-gateway/SPEC.yml#delivery_surfaces)" }
    brain_stream:
      type: object
      optional: true
      note: "If this rig taps Cursor for a brain stream."
      fields:
        gateway: { type: string, example: "apps/stream-gateway" }
        tap: { type: string, example: "cursor-mirror watch --live (apps/stream-gateway/cursor-tap.yml)" }
        summarizer: { type: string, example: "local Ollama model (free) — semantic mips" }
        privacy_gate: { type: string, example: "deep-snitch + path-strip before bus" }

declare:
  optional: true
  fields:
    token_budget_bid: { type: string, example: "2M tokens for this spec" }
    wall_clock_bid: { type: string }
    honesty: { type: string, note: "Misdeclare and audience is the ref" }

proof:
  optional: true
  fields:
    setup_md: { type: path, required_for_challenges: true, example: "rigs/<slug>.SETUP.md", note: "Viral Rig DNA — emailable; canonical raw URLs; LLM idempotent install; must match rig yaml" }
    cursor_spend_export: { type: string }
    cursor_mirror_composer: { type: string }
    thoughtful_commit_shas: { type: array }

costume:
  optional: true
  lets_make_a_deal: { type: string, note: "Visual metaphor for Code That Spec" }

extension:
  how: |
    - extends: path to parent rig — merge lifecycle (child overrides)
    - mash_up.graft: list of rig ids to combine with instructions
    - New rig_classes: add to enum + document in repo-show-format.yml (schema version bump)
  registry: ../rigs/INDEX.yml

validation:
  tool: "pnpm run verify:yaml (syntax); future: scripts/verify-rig-schema.mjs"
  pr: "New rigs via PR: rigs/<slug>.rig.yml + rigs/<slug>.SETUP.md + line in rigs/INDEX.yml"

see_also:
  - rig-setup-dna.yml
  - ../rigs/README.md
  - ../rigs/_TEMPLATE.rig.yml
  - ../rigs/_TEMPLATE.SETUP.md
  - ../rigs/brain-stream-dual-laptop.rig.yml   # first `stage` rig — Mac+Legion Cursor/OBS overlay
  - ../apps/stream-gateway/SPEC.yml            # delivery surfaces + capture/compositing
  - ../process/repo-show-format.yml
  - ../process/rig-feedback.yml
  - ../process/ai-offs.yml
  - ../process/code-that-spec.yml
