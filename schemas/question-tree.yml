# Question tree — audience character I/O queues and graphtal discussion
# questions.yml is primarily an OUTPUT queue (what this character asks).
# Answers and thread growth append as children under the question node that was asked.
# Girder: ../process/ticket-pr.yml#character_queues · Template: ../repo-shows/_TEMPLATE/audience/questions.yml

meta:
  id: question-tree
  version: 0.1
  one_line: |
    Each audience character owns a question tree in questions.yml — flat list at root,
    nested children for answers, me-too, quorum, and branching discussion (HN-shaped).

character_queues:
  output:
    file: questions.yml
    what: |
      Questions this character wants posed — to a named guest, a specific audience member,
      or the open floor (`to: any`). Root-level `questions:` entries are the output queue.
    fired_by:
      - question-advertisements (CARD ASK-QUESTION, relevance scoring)
      - Don Philahue on stream
      - autonomous audience sim (MSPO — character asks while author offline)
  input:
    what: |
      Inbound attention — other characters' questions addressed TO you appear as refs or
      get mirrored under THEIR tree with `to: <your-id>`. Your replies belong as `children`
      on their question node (preferred) or as `kind: answer` with cross-ref.
    optional_file: inbound.yml
    note: |
      Most threads stay in the ASKER's questions.yml. Input queue is optional — for
      characters who want a personal inbox of @mentions without duplicating full trees.

tree_shape:
  model: graphtal
  analogy: |
    Like Hacker News or a forum thread: one top-level question, replies nested underneath,
    arbitrary depth. Git commits append nodes — history is the audit trail.
  owner: asker
  rule: |
    The character who asked owns the canonical thread file. Everyone else's contributions
    are `children` nodes with `by:` attribution — never orphan answers in a third file
    without a cross-link.

question_node:
  required: [id, text]
  optional:
    to: "guest or character id — will-wright, don-hopkins, any, richard-bartle, …"
    theme: "short tag for CARD scoring / show segments"
    status: "open | asked | answered | deferred | withdrawn"
    asked_at: "ISO8601 — when surfaced on air or in sim"
    segment: "show segment id or timestamp anchor for time-shift playback"
    spirit_source: "citation when draft question — not a quote (see richard-bartle)"
    prior_reading: "urls or repo paths guest should read before answering"
  children: "array of thread nodes — answers, discussion, follow-ups"

thread_node:
  kinds:
    answer:
      what: "Response from the addressee (guest) or designated answerer"
      required: [kind, by, text]
      recommended: [at, on_air, segment]
      show_protocol: |
        When an autonomous audience character asks on air and the guest answers, append
        an `answer` child under that question in the ASKER's questions.yml — attribute
        `by:` to the speaker (will-wright, don-hopkins, …). Commit during or immediately
        after the segment; PR optional for guest-authored merges.
    follow_up:
      what: "A new question in the same thread — same speaker or another"
      required: [kind, by, text]
      note: "May nest its own children (sub-thread)"
    me_too:
      what: "+1 / amen / same question from another character — lightweight pile-on"
      required: [kind, by]
      optional: [text]
    quorum:
      what: "Explicit group sentiment — several voices agreeing without separate me_too spam"
      required: [kind, by, text]
      optional: [members]
      members: "list of character ids in the quorum"
    discussion:
      what: "Side comment, tangent, or cross-talk — not necessarily answering the question"
      required: [kind, by, text]
    answer_draft:
      what: "Curator or sim draft pending guest review — label clearly, not a quote"
      required: [kind, by, text, draft: true]

  common_fields:
    by: "character id — palm, will-wright, richard-bartle, fictional-bella-goth, …"
    at: "ISO8601 timestamp"
    on_air: "boolean — true if spoken on live stream"
    segment: "episode segment slug or VOD timestamp"
    sim: "boolean — true if generated by autonomous audience sim without human author online"
    children: "nested thread nodes — arbitrary depth"

status_lifecycle:
  open: "Queued — not yet asked on air"
  asked: "Surfaced — awaiting answer"
  answered: "At least one answer child present — thread may still grow"
  deferred: "Guest asked to return later"
  withdrawn: "Asker retracted — keep node for history, hide from ads"

cross_character:
  rule: |
    Character B may append to Character A's question tree via PR (preferred) or sim protocol.
    Set `by: B` on the child node. B may ALSO note the thread in B's own questions.yml:
  optional_mirror:
    - id: ref-7
      ref: "../palm/questions.yml#1"
      my_stance: me_too
      text: "Optional one-liner in B's voice"

playback:
  mspo: |
    Time-shift viewers expand question nodes to read answers and discussion that grew after
    live air — the tree is a replay layer on the episode.
  don_philahue: |
    Orchestrator prefers unanswered `status: open` questions for call-on; after answer,
    CARD ads may fire on `follow_up` children.

examples:
  worked: ../repo-shows/will-wright/audience/palm/questions.yml
  template: ../repo-shows/_TEMPLATE/audience/questions.yml
  draft_menu: ../repo-shows/will-wright/audience/richard-bartle/questions.yml

see_also:
