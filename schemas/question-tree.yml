# Question tree — sparse show-orchestration trees with optional GitHub pointers
# questions.yml is each character's curated queue — SSOT for what the orchestrator focuses on.
# repo_pointer (whole repo/module) and discussion (issue/comment) are separate optional attachments.
# Girder: ../process/ticket-pr.yml#character_queues · Template: ../repo-shows/_TEMPLATE/audience/questions.yml

meta:
  id: question-tree
  version: 0.7
  one_line: |
    Recursive question trees in questions.yml — orchestration SSOT. Nodes may attach repo_pointer
    (whole repo/module), discussion (issue/comment), and context_lasers (typed pointer arrays).

orchestration:
  ssot: |
    Each character's questions.yml tree is first-class and authoritative for SHOW ORCHESTRATION.
    Don Philahue, CARD ASK-QUESTION, and producers read merged sparse trees — not every GitHub
    issue in the wild. Unreferenced nodes are valid: pure YAML text drives the queue with no
    external lookup.
  sparse_mirror: |
    A questions.yml tree may cherry-pick parts of a sprawling issue thread: root question points
    at the issue; sub-questions (children) point at specific comments worth air time. The full
    GitHub discussion stays on GitHub; the repo holds only what passed review or a producer pushed
    into a character's queue.
  curation:
    - audience TicketPR adds nodes + optional refs
    - show producer promotes good refs into featured character queues
    - PR review gates what the orchestrator sees
  shared_issues: |
    Multiple audience members may attach the SAME ref (same repo/issue/comment). Each character
    keeps their own tree node — local `question` text, `stance`, segment priority — while the
    GitHub thread is shared. Votes (👍, +1) on the issue count globally; YAML records who curated
    that ref for this show.

persistence_policy:
  ephemeral:
    channels: [twitch_chat, youtube_chat, hacker_news_comments]
    note: "Not in orchestration trees unless curated into questions.yml."
  persistent:
    medium: github_issues
    rule: |
      Durable public discussion lives on GitHub Issues (any repo). Bind with `discussion` on a
      question node when this character wants the orchestrator to follow that thread. Point at
      repos/modules with `repo_pointer` — separate from where the thread lives.
    note: |
      Opening an issue does NOT auto-enter the show queue — something must point at it from a
      questions.yml tree (or producer merge).

github_ref:
  repo_url:
    rule: |
      Every `repo` field is an absolute HTTPS GitHub repo-root URL — clickable for humans,
      parseable for tools. Not `owner/name` slugs, not `moollm/…` paths.
    canonical_form: "https://github.com/SimHacker/moollm"
    with_path: |
      Structured pointers pair repo URL + repo-relative `path`:
      { repo: https://github.com/SimHacker/moollm, path: examples/adventure-4/pub/arcade }
    tool_parse: |
      Orchestrator extracts owner/name from URL for GitHub API; builds tree/blob URLs from
      repo + path + ref. Legacy `owner/name` slug normalizes to https://github.com/owner/name.
  split: |
    Two optional pointers per question node — do not conflate:
    `repo_pointer` = whole repo, module, namespace, or bare directory tree (no issue).
    `discussion` = issue id + optional comment id (where the thread lives).
  repo_pointer:
    optional: true
    one_per_node: true
    cross_repo: true
    what: |
      Point at an entire GitHub repo as a module — or a path within it as namespace/object.
      MOOLLM root, adventure-4/pub/, a bare nested repo, MicropolisCore, anything in git.
      No issue required. Use context_lasers for finer beams inside the repo.
    forms:
      url: "https://github.com/SimHacker/moollm — whole repo"
      tree: "https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/pub/arcade — namespace"
      structured:
        repo: https://github.com/SimHacker/moollm
        path: examples/adventure-4/pub/arcade
        ref: main
      label: "human one-liner — why this repo/module"
    examples:
      - { url: https://github.com/SimHacker/moollm, label: "Whole MOOLLM microworld" }
      - { repo: https://github.com/SimHacker/moollm, path: examples/adventure-4/pub, label: "Gezelligheid Grotto pub" }
  discussion:
    optional: true
    one_per_node: true
    cross_repo: true
    what: |
      Bind durable conversation — issue with optional comment anchor. The `repo` field is which
      GitHub repo hosts the issue (may differ from repo_pointer). Separate from pointing at code.
    forms:
      structured:
        repo: https://github.com/SimHacker/WillWrightShowForFood
        issue: 42
        comment: 1234567890
      url:
        - "https://github.com/owner/repo/issues/N"
        - "https://github.com/owner/repo/issues/N#issuecomment-1234567890"
      legacy:
        ref: "normalizes to discussion { repo, issue, comment? } — repo must be HTTPS URL when structured"
        issue: "shorthand — issue number or full issue URL (repo from URL or default WWSFF root URL)"
    resolution: |
      When discussion is set, orchestrator MAY fetch the issue thread. YAML node still frames
      the question locally. repo_pointer and discussion may both be set (e.g. point at moollm
      pub/arcade AND discuss on a WWSFF issue about Palm's high score).

context_lasers:
  what: |
    Optional lasers on any question node — multiple pointers at once. Each laser aims at something
    in git (any repo). The question text is what you ask on air; lasers are what you point at.
  alias: [context_laser, lasers, pointing_at]
  cardinality: many_per_node
  cross_repo: true
  shapes:
    flat_array: |
      context_lasers: [ laser, laser, … ] — each entry carries `type` (or legacy `kind`).
    typed_arrays: |
      context_lasers:
        directory: [ … ]      # whole room / object / ensemble
        interface: [ … ]      # one CARDIFY facet of a dir
        file: [ … ]           # specific file (prose, yaml, code)
        line: [ … ]           # line range or anchor within a file
        issue: [ … ]          # optional — distinct from node `ref`; laser at issue as context
      Orchestrator normalizes typed buckets → flat list with `type` injected. Either shape valid.
  laser_types:
    directory:
      implies: |
        The whole MOOLLM room / object — full ensemble of interfaces (CARD, GLANCE, CHARACTER,
        README, SIMULATION, ROOM, …) and subdirs beneath. Wide beam: "this entire thing."
      resolve: "tree/…/path/to/dir/ — listing + README + all interface files + children"
      fields: [url, repo, path, ref, label, note]
    interface:
      implies: |
        One CARDIFY interface file — a particular *aspect* of the directory, not the whole object.
        CARD = abilities/ads; GLANCE = nav SSOT; CHARACTER = body/soul; README = human facade;
        SIMULATION = runbook; ROOM = exits/topology; questions = orchestration queue; …
      resolve: |
        path/to/dir/ + interface: CARD → path/to/dir/CARD.yml
        Or explicit blob URL to the interface file. Optional `facet` narrows inside that file.
      fields: [url, repo, path, interface, facet, ref, label, note]
      interface_values: [CARD, GLANCE, CHARACTER, README, SIMULATION, ROOM, QUESTIONS, COSTUME, MEDIA, invitation]
    file:
      implies: "Single file — essay, source bundle README, license PDF, …"
      fields: [url, repo, path, anchor, lines, facet, label, note]
    line:
      implies: "Region inside a file — #L10-L25 or heading anchor"
      fields: [url, repo, path, lines, anchor, label, note]
  forms:
    url_string: |
      Bare HTTPS URL — preferred when GitHub already encodes the address:
      - tree/…/dir/ → directory laser (whole ensemble)
      - blob/…/CARD.yml → interface laser (CARD aspect of parent dir)
      - blob + #L10 or #L10-L25 (line range)
      - blob/…/file.md#heading-anchor
      - commit-SHA permalinks, issues, pulls, diffs, gists
    structured:
      type: "directory | interface | file | line — aliases: kind (legacy)"
      url: "full GitHub URL when you have one"
      repo: "https://github.com/owner/repo — repo root; required in structured lasers when not using url alone"
      path: "repo-relative dir or file path"
      interface: "CARD | GLANCE | CHARACTER | … — with dir path, resolves to dir/INTERFACE.yml"
      ref: "branch, tag, or commit SHA — default main"
      lines: "42 or [10, 25]"
      anchor: "markdown heading slug"
      facet: "sub-address within file — YAML key path, CARD ability id, GLANCE read_order entry"
      label: "why this laser matters"
      note: "read aloud vs skim"
  directory_vs_interface:
    rule: |
      Same dir, two intents:
      - type: directory on characters/palm/ → whole Palm object (read CARD + GLANCE + CHARACTER + README + dreams/ …)
      - type: interface, path: characters/palm/, interface: CARD → only the abilities/advertisement aspect
      Narrowing: add facet on interface laser — e.g. CARD + facet: abilities.PHILOSOPHIZE
  github_addressing:
    line: "#L42 — single line; #L10-L25 — inclusive range"
    permalink: "Use commit SHA in URL when the laser must survive branch renames"
    directory: "tree/…/path/to/dir/ — whole folder as context"
    heading: "blob/…/README.md#ticketpr-seats — section anchor"
    diff: "pull/NNN/files#diff-… — PR file region"
    raw: "raw.githubusercontent.com/… — fetch plain text for line slicing"
  orchestration: |
    Don Philahue follows lasers before ASK-QUESTION. discussion = where the thread lives;
    lasers = what the question is about. Directory lasers load ensemble context; interface
    lasers load one facet.
  examples:
    flat:
      - question: "About Palm's whole being vs just his ask ability"
        to: will-wright
        context_lasers:
          - type: directory
            url: https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/characters/animals/monkey-palm
            label: "Whole monkey-palm room"
          - type: interface
            repo: https://github.com/SimHacker/moollm
            path: examples/adventure-4/characters/animals/monkey-palm
            interface: CARD
            facet: methods.PHILOSOPHIZE
            label: "CARD aspect only — PHILOSOPHIZE"
    typed:
      - question: "Did your Sims feel their bars filling?"
        to: will-wright
        context_lasers:
          directory:
            - url: https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/pub/stage/palm-nook/study
              label: "Whole study shelf"
          interface:
            - repo: https://github.com/SimHacker/moollm
              path: examples/adventure-4/characters/animals/monkey-palm
              interface: CHARACTER
              facet: representation.self_aware_ai
          file:
            - https://github.com/SimHacker/moollm/blob/main/examples/adventure-4/pub/stage/palm-nook/study/the-inner-state-question.md
          line:
            - url: https://github.com/SimHacker/moollm/blob/main/examples/adventure-4/pub/stage/palm-nook/study/palm-on-being-palm.md#L1-L40
              label: "Opening — navigation through possibility space"

character_queues:
  output:
    file: questions.yml
    shape: |
      Root `questions:` array. Each entry is a question node; nodes may nest `children` as
      sub-questions (same schema, recursive). Sub-questions may each carry their own `ref`.
    fired_by:
      - question-advertisements (CARD ASK-QUESTION, relevance scoring)
      - Don Philahue on stream
      - show producer push into character queue
      - autonomous audience sim (MSPO — character asks while author offline)
  input:
    what: |
      Replies to you belong on the asker's GitHub ref (comment there) and/or as a sub-question
      node in their tree with `to: <your-id>`. Optional inbound.yml for @mention inbox.
    optional_file: inbound.yml

tree_shape:
  model: graphtal
  node_type: question
  recursion: |
    questions → [question_node, …]
    question_node.children → [question_node, …]   # sub-questions, same schema
  analogy: |
    Sparse show-orchestration tree. May mirror a slice of a GitHub issue thread: parent ref →
    issue; child refs → specific comments. Or entirely YAML with no GitHub attachment.
  owner: |
    Each character owns their questions.yml — their curated view. Shared refs do not merge files;
    orchestrator merges at read time.

question_node:
  required_for_orchestration: [question, to]
  required_alt: [text, to]
  optional:
    repo_pointer: "whole repo or namespace — repo field is https://github.com/owner/repo URL"
    discussion: "{ repo: https://github.com/owner/repo, issue, comment? } — issue thread; see github_ref.discussion"
    ref: "legacy — normalizes to discussion"
    issue: "legacy shorthand — normalizes to discussion"
    answer: "Optional local summary — orchestration hint, not canonical over GitHub"
    id: "Stable anchor for cross-refs within this character's tree"
    to: "will-wright, don-hopkins, any, richard-bartle, …"
    theme: "CARD scoring / show segment tag"
    status: "open | asked | answered | deferred | withdrawn"
    asked_at: "ISO8601 — surfaced on air or in sim"
    segment: "episode segment slug or VOD anchor"
    spirit_source: "draft citation — not a quote (richard-bartle menus)"
    prior_reading: "urls or repo paths guest should read first"
    stance: "me_too | amplify | dissent — when sharing someone else's ref"
    by: "who curated this node — character id or @github handle"
    context_lasers: "flat array or typed { directory, interface, file, line } — see context_lasers"
    children: "array of question_node — sub-questions, each with optional ref and lasers"
  bare_bones: |
    Minimum useful node — no ref, no children:
    { question: "…", to: will-wright, status: open }
  with_lasers: |
    # typed arrays — directory = whole object; interface = one CARDIFY facet of that dir
    context_lasers:
      directory:
        - url: https://github.com/SimHacker/moollm/tree/main/examples/adventure-4/characters/animals/monkey-palm
      interface:
        - { repo: https://github.com/SimHacker/moollm, path: examples/adventure-4/characters/animals/monkey-palm, interface: CARD, facet: methods.PHILOSOPHIZE }
      file:
        - https://github.com/SimHacker/moollm/blob/main/…/the-inner-state-question.md
  with_ref: |
    { question: "My framing", to: will-wright,
      repo_pointer: { repo: https://github.com/SimHacker/moollm, path: examples/adventure-4/pub/arcade },
      discussion: { repo: https://github.com/SimHacker/WillWrightShowForFood, issue: 42 },
      children: [
        { question: "This comment was gold", to: will-wright,
          discussion: { repo: https://github.com/SimHacker/WillWrightShowForFood, issue: 42, comment: 9876543210 } }
      ] }

thread_node:
  note: |
    Legacy YAML-only reply archive under a question — use when mirroring on-air dialogue into git
    without a GitHub ref, or for VOD sync. Prefer sub-question nodes + refs for new work.
  kinds: [answer, follow_up, me_too, quorum, discussion, answer_draft]
  common_fields:
    kind: required
    by: "character id or @github-handle"
    text: "reply text when not using sub-question shape"
    ref: "optional — same github_ref shape if archiving a specific comment"
    at: ISO8601
    on_air: boolean
    segment: slug
    sim: boolean
    children: nested thread_node or question_node

cross_character:
  same_ref: |
    Character A and Character B both may set ref.issue: 42 (same or different comment). Each
    file records that character's orchestration entry. Global vote weight from GitHub reactions;
    per-character priority from their YAML status/segment/theme.
  example:
    palm:
      - question: "From a simulated person's motive bars…"
        discussion: { repo: https://github.com/SimHacker/WillWrightShowForFood, issue: 42 }
    fictional-bella-goth:
      - question: "Mortimer keeps asking this at load screens"
        stance: me_too
        discussion: { repo: https://github.com/SimHacker/WillWrightShowForFood, issue: 42, comment: 111 }

github_discussion:
  votes:
    how: [issue_reactions, "+1 / me too comments"]
    scope: global on the shared ref target
    orchestrator: may boost nodes whose refs have high vote counts when merging trees
  answers: "Guest replies on the issue; optionally mirrored as sub-question with ref.comment"

status_lifecycle:
  open: "In queue — not yet asked on air"
  asked: "Surfaced — awaiting answer"
  answered: "Guest replied (on ref and/or local answer field)"
  deferred: "Return later"
  withdrawn: "Retracted — keep node for history"

playback:
  mspo: |
    Time-shift viewers walk sparse YAML trees; refs link out to full GitHub threads.
  don_philahue: |
    Reads merged questions.yml forests only — refs tell him where to look on GitHub when needed.

examples:
  worked: ../repo-shows/will-wright/audience/palm/questions.yml
  template: ../repo-shows/_TEMPLATE/audience/questions.yml
  draft_menu: ../repo-shows/will-wright/audience/richard-bartle/questions.yml

see_also:
  - ../process/ticket-pr.yml
  - audience-character.yml
  - ../repo-shows/_TEMPLATE/audience/CHARACTER.md
