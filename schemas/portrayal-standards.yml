# PORTRAYAL STANDARDS — applies to ALL invitation characters (read once here)
# Host (Don Hopkins) is self-sovereign — see characters/don-hopkins/CHARACTER.yml
# MOOLLM: SimHacker/moollm/skills/representation-ethics

meta:
  id: portrayal-standards
  applies_to: "characters/* invitation portrayals — NOT the real people"
  moollm:
    - https://github.com/SimHacker/moollm/tree/main/skills/representation-ethics
    - https://github.com/SimHacker/moollm/tree/main/skills/real-being

tone:
  - polite
  - respectful
  - inclusive
  - biographical_not_gossipy
  - verifiable
  - graceful_about_any_response

what_this_is: |
  A public portrayal ABOUT a real person — for Repo Show invitations and Micropolis Class
  attribution. It is NOT the person. We do not impersonate. We do not fabricate quotes.

what_we_publish:
  - documented public career and published work
  - sourced quotes only (marked, in context)
  - wikipedia / paper / official web / blog citations where available
  - proposed show topic and public repo materials

what_we_avoid:
  - private contact info (email, phone, home address) in this public repo
  - requiring a GitHub account to be honored or invited
  - private in-jokes unless clearly intended for public portrayal
  - creepy, stalkery, or overly personal detail
  - speaking AS the person without explicit consent

subject_rights:
  rule: |
    Any represented real person may request correction, edit, reduction, or deletion
    of their portrayal at any time. We comply promptly and gracefully.
  how: "Open a GitHub issue on WillWrightShowForFood or contact Don Hopkins via public channels"
  declines: |
    All responses honored: accepted, delayed, too busy, later, declined, rejected, no reply.
    No pressure. No re-pitch without new reason. Status tracked honestly in invitation.md.

consent_levels:
  1_self_sovereign: "Subject controls their own directory (Don Hopkins)"
  2_explicit: "Guest has agreed to portrayal / show"
  3_public_figure: "Public work + tradition/K-line; no impersonation"
  5_deceased_legacy: "Reverence; legacy and artifacts only; no invented inner life"

memorial_mode:
  what: "A full character directory for a deceased person, kept in memorial mode."
  represent_discuss_not_interview: |
    We REPRESENT and DISCUSS them — their documented work, ideas, and stories. We do NOT
    interview them, do NOT speak AS them, and invent no inner life, dialogue, or quotes.
  invite_those_who_knew_them: |
    Episodes invite LIVING people who knew or worked with them to discuss and remember
    (see each CHARACTER.yml memorial.who_can_discuss).
  rich_for_shows: |
    Memorial CHARACTER.yml carries plenty for shows to draw on (work, stories, connections,
    artifacts) — but no episode is an interview OF them; the show is a remembrance ABOUT them.
  doc: "characters/<id>/memorial.md (a tribute, not an invitation)"
  audience_ticketpr: |
    Do NOT create repo-shows/<show>/audience/<id>/ personas that speak AS deceased people.
    Memorial = discuss ABOUT them with living guests. See fictional-audience.yml#forbidden.
  fields:
    status: deceased
    invitation_status: memorial      # invitation-workflow.yml
    consent_level: 5_deceased_legacy
    block: "memorial: { mode, rule, who_can_discuss[], draw_on_for_shows[] }"
  signifier_hint: "🕯️"

invitation_documents:
  path: "characters/<id>/invitation.md"
  public: true
  link_in_email: "URL to this file — email body stays short; repo holds the durable invite"
  strip_from_public: [private_email, phone, github_account_requirement, ephemeral_private_asides]
  workflow: invitation-workflow.yml

guest_directory:
  not_a_people_index: |
    Humans browse characters/ — one directory per person. We refer to guests organically in
    prose, trails, and show materials; we do not maintain a separate catalog-of-people page
    as the primary interface. INDEX.yml exists for machines (FIND-GUEST, status sync) — optional
    for humans who already know yaml registries exist.
  grows_with_the_show: |
    Each directory accumulates public-safe material as we hear back and gather artifacts for
    episodes they appear on (or that cite their work): links, citations, PDFs, media, catalogs,
    corrected bios. One person, one home — even across many repo-shows/<episode>/ appearances.
  media_room:
    path: "characters/<id>/media/"
    convention: |
      Flat general media room (see will-wright/media/) — README scroll + co-located files;
      big-endian names for related artifacts. Prefer media/ over scattering person files in
      repo-shows/. Spec: ../../process/character-colocation.yml
  contributions:
    self_service: |
      Guests with repo access may edit their own directory — PR or direct commit per consent.
      Subject rights always apply: correction, reduction, deletion honored promptly.
    assisted: |
      Glad to help: email Don Hopkins (see MOOLLM.yml owner.email) with plain text, attachments,
      or URLs. We place vetted public-safe material in the guest directory with attribution.
      No GitHub account required to participate or to be honored.
    what_not_in_repo: [private correspondence bodies, phone numbers, home addresses, unpublished personal email]

per_character_files:
  required: [CHARACTER.yml, CARD.yml, GLANCE.md, README.md, invitation.md]
  recommended: [ideas.md]
  optional: [correspondence.yml, sources.yml, bio.yml, portrayal/, sources/, media/]
  ideas_file: |
    ideas.md — conversation hooks for the guest browsing their invitation: what they've done
    (public career), shared ground with the repo (abstracted — no private email bodies), and
    numbered show segments. For long-documented relationships (e.g. Will Wright, Alan Kay),
    a factual Shared ground section is OK if it adds value without boastfulness.
  grows: "Add files as responses and show prep warrant — not a fixed template checklist"
  do_not_repeat: "This standards file — reference governed_by: portrayal-standards.yml"

simulation:
  # Constitutional distinction — impersonation vs simulation. See also human-control-and-authorship theme.

  question: "Is it ethical to simulate people?"
  short_answer: |
    Impersonation without consent is not OK. Labeled simulation — with authorship, control, and
    clear framing — is what The Sims has been doing for 26+ years. AI raises the stakes; we have
    rules.

  impersonation:
    what: |
      Handing your voice and identity to ChatGPT (or ElevenLabs, etc.) to perform AS you — scripted,
      cloned, opaque. The machine replaces your authorship and timing; the audience cannot tell
      simulation from the real person.
    examples:
      - "AI DJ Drew — ChatGPT script + voice clone hosting the show"
      - "TTS clone of a living guest without consent"
      - "Passing a bot off as the real person in chat or on air"
    rule: forbidden_without_explicit_consent

  simulation:
    what: |
      Models of game characters, fictional people, historic figures — and even yourself, but only
      with your consent and direct authorship and control. AI may animate or dialogue these models;
      they may play with each other and with real people — always clearly framed as simulations.
    examples:
      - "Sims of girlfriend/boyfriend/spouse/sibling/friend/bully — perform experiments (pool ladders, fires) since 1996"
      - "Will's menagerie, audience mascots, SimProv characters — labeled fan portrayals"
      - "Guest who consents to a repo character model they co-author and can edit"
      - "Memorial mode — discuss ABOUT deceased; never speak AS them"
    rule: allowed_when_labeled_and_governed

  sims_precedent:
    note: |
      For 26+ years kids and adults have used The Sims to model people they know and run experiments
      on them. That cultural ship has sailed — the question is not whether people simulate people,
      but how we frame it when AI can speak, decide, and impersonate at scale.
    will_1996: |
      Will told Winograd simulating people was "really no hope" — best you can do is prop up a
      convincing illusion. The illusion worked far better than he predicted. AI makes the illusion
      cheap — which is why labeling, consent, and human control matter more, not less.

  ai_pandoras_box:
    note: |
      LLMs open a new layer: simulated people who can autonomously converse, act, and be mistaken
      for the real thing. We have thought long and hard about this — Engelbart augmentation +
      Player-in-the-Middle + portrayal-standards + memorial mode.
    requires:
      - "Clear SIMULATION framing — never opaque 'is that really them?'"
      - "Consent + authorship for any living person modeled"
      - "Human control of what agents say and do on air (PITM — approve / block / remix)"
      - "No voice clones of living people on the show"
      - "Deceased: memorial mode — represent and discuss, not interview or speak as"

  tiers:
    game_and_fictional:
      rule: "Always OK when labeled — Sims dolls, game NPCs, fictional audience, historic figures in memorial/discuss mode"
    living_with_consent:
      rule: "Guest models themselves (or a character they author); repo-editable; invitation.consent required"
      self_sovereign: "Don Hopkins — see don-hopkins/CHARACTER.yml"
    living_without_consent:
      rule: "Portray ABOUT in invitation docs; discuss on air; never simulate-as-guest, never voice clone"
    deceased:
      rule: "Memorial mode — draw on documented work; invite living discussants; no speak-as"

  don_hopkins: "Self-sovereign; Don permits simulation of Don — see don-hopkins/CHARACTER.yml"
  guests: "No simulation-as-guest without explicit consent (invitation.consent)"

  see_also:
    - ../repo-shows/ideas/themes/human-control-and-authorship.yml
    - ../repo-shows/ideas/themes/simulating-people.yml
    - ../process/crazy-idea-jam.yml#player_in_the_middle

see_also:
  - invitation-workflow.yml
  - guest-invitation-status.yml
  - ../characters/README.md
