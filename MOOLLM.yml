# WillWrightShowForFood — MOOLLM plugin repository (PUBLIC)
# Compose with SimHacker/moollm in Cursor.

plugin:
  name: WillWrightShowForFood
  id: wwsff
  type: repo-show-world
  version: 0.1.0
  visibility: public
  description: |
    Public Repo Show world — Will Wright kickoff + guest constellation.
    Polyglot monorepo: MOOLLM microworld content + MicropolisCore-style apps/packages.
  owner:
    github: SimHacker
    email: dhopkins@DonHopkins.com
  compose_with:
    - https://github.com/SimHacker/moollm
    - https://github.com/SimHacker/MicropolisCore
  entry_points:
    glance: GLANCE.yml
    card: CARD.yml
    readme: README.md
    for_bots: FOR-BOTS.md
    setup: SETUP.md
    kernel: kernel/moollm-plugin.yml

monorepo:
  node: "pnpm workspace — apps/* packages/* (MicropolisCore pattern)"
  python: requirements.txt + .venv
  verify: "pnpm run verify"
  layout:
    content: [repo-shows, characters, skills, kernel, schemas, process, examples]
    code: [apps, packages, scripts]
